stion":"ブランド・エクイティ（ブランド資産）を構築するための具体的な施策について述べよ。","explanation":"ブランド資産の構築には、(1)高品質の製品・サービス提供による知覚品質の向上、(2)一貫した広告・プロモーション、(3)顧客経験の向上、(4)社会的責任活動の実践、(5)顧客ロイヤルティプログラムの導入などが挙げられます。長期的で継続的な投資が必要です。","choices":null,"correctAnswer":"ブランド資産の構築には、(1)高品質の製品・サービス提供による知覚品質の向上、(2)一貫した広告・プロモーション、(3)顧客経験の向上、(4)社会的責任活動の実践、(5)顧客ロイヤルティプログラムの導入などが挙げられます。長期的で継続的な投資が必要です。"},{"id":39,"category":"マーケティング","question":"顧客ニーズの把握と市場調査の重要性について述べよ。","explanation":"市場調査により、顧客の潜在ニーズやニーズの変化を把握できます。定量調査（統計分析）と定性調査（インタビュー）を組み合わせて実施することで、市場機会を発見し、製品開発やマーケティング戦略の策定に活かすことができます。","choices":null,"correctAnswer":"市場調査により、顧客の潜在ニーズやニーズの変化を把握できます。定量調査（統計分析）と定性調査（インタビュー）を組み合わせて実施することで、市場機会を発見し、製品開発やマーケティング戦略の策定に活かすことができます。"},{"id":40,"category":"経営戦略","question":"ダイナミック・ケイパビリティの説明として最も適切なものはどれか。","explanation":"ダイナミック・ケイパビリティは、環境の急速な変化に対応するため、既存資源を再構成し、新たな能力を構築する企業の動的な能力です。","choices":["企業の静的な資源である","急速に変化する環境に適応し、経営資源を再編成する能力","技術開発能力のみを指す","競合企業のベンチマーク能力"],"correctIndex":1},{"id":41,"category":"経営戦略","question":"イノベーションの分類で、既存技術の改善や改良を指すものは何か。","explanation":"インクリメンタル・イノベーションは既存製品やプロセスの段階的な改善です。これに対し、ラジカル・イノベーションは根本的な革新を指します。","choices":["ラジカル・イノベーション","インクリメンタル・イノベーション","ディスラプティブ・イノベーション","インキュベーション"],"correctIndex":1},{"id":42,"category":"経営戦略","question":"垂直統合戦略における「前方統合」とは何か。","explanation":"前方統合（Forward Integration）は、製造業者が自社の下流にある販売・流通企業を買収して統合することです。後方統合は原材料供給企業の買収です。","choices":["原材料の供給業者を買収すること","小売業者や流通業者を買収すること","競合企業を買収すること","海外企業を買収すること"],"correctIndex":1},{"id":43,"category":"経営戦略","question":"多角化戦略における「関連多角化」と「無関連多角化」の主な違いはどれか。","explanation":"関連多角化は既存事業との技術、マーケティング、流通などの相乗効果を期待します。無関連多角化はそのような関連性を求めません。一般的に関連多角化のリスクが低いとされます。","choices":["関連多角化は低リスク、無関連多角化は高リスク","関連多角化は既存事業との相乗効果が期待でき、無関連多角化は期待しない","無関連多角化はより成功率が高い","関連多角化は海外展開のみに適用される"],"correctIndex":1},{"id":44,"category":"経営戦略","question":"経営戦略立案における「ミッション」の役割として最も適切なものはどれか。","explanation":"ミッションは企業の存在理由と価値観を表明し、ビジョンやセンターとともに経営戦略の基礎となります。これが戦略立案の出発点となります。","choices":["1年間の売上目標を定める","企業の存在意義と基本的価値観を示す","日々の業務の手順を示す","競合企業の分析方法を示す"],"correctIndex":1},{"id":45,"category":"経営戦略","question":"バリューチェーン上の各プロセスの関係性について説明する場合、最も重要な概念は何か。","explanation":"バリューチェーン分析では、各活動間の結びつき（リンケージ）を理解し、全体として顧客価値を最大化することが重要です。","choices":["部門間の競争","プロセス間のリンケージと相互関係","販売価格の設定","競合企業との価格比較"],"correctIndex":1},{"id":46,"category":"組織論","question":"フラット組織の利点として最も適切なものはどれか。","explanation":"フラット組織は階層を減らし、管理層を削減することで、意思決定が迅速になり、従業員の自主性と責任感が高まります。","choices":["管理層が多く統制が強化される","従業員の自主性と機動力が高まる","責任の所在が曖昧になる","組織規模の大小にかかわらず適用できる"],"correctIndex":1},{"id":47,"category":"組織論","question":"リーダーシップにおける「変革型リーダーシップ」の特徴として適切なものはどれか。","explanation":"変革型リーダーシップは、リーダーのカリスマ性と鼓舞力により、部下のモチベーションを向上させ、組織の変革を推進します。","choices":["現状維持を強調する","カリスマ性を持ち、部下に大きな変化をもたらすビジョンを示す","細かい管理監督に重点を置く","報酬と罰に基づいて部下を動かす"],"correctIndex":1},{"id":48,"category":"組織論","question":"職務拡大（job enlargement）と職務充実（job enrichment）の主な違いはどれか。","explanation":"職務拡大は同一水準の職務を横方向に増やし、職務充実は責任と自己決定の機会を与える縦方向の充実を図ります。","choices":["職務拡大は横方向、職務充実は縦方向の内容変化である","職務拡大はモチベーション向上に有効である","職務充実は業務量を増やすのみである","両者に実質的な違いはない"],"correctIndex":0},{"id":49,"category":"組織論","question":"組織学習における「シングル・ループ学習」と「ダブル・ループ学習」の違いはどれか。","explanation":"シングル・ループ学習は目標達成方法を改善する学習、ダブル・ループ学習は基本的前提や目標そのものを問い直す深い学習です。","choices":["シングル・ループ学習は法則をも問い直す学習である","ダブル・ループ学習は自己の基本的前提や目標を問い直し改革する学習である","両者に実質的な違いはない","シングル・ループ学習のみが組織学習である"],"correctIndex":1},{"id":50,"category":"組織論","question":"360度フィードバック制度の主な目的は何か。","explanation":"360度フィードバックは、複数の立場からの意見を集約し、個人に自己認識をもたらし、人材育成と組織開発を支援する手法です。","choices":["上司による部下評価を厳密にする","上司、同僚、部下、顧客など複数視点からの評価により、個人の自己認識と発展を支援する","給与決定の唯一の方法である","従業員の懲罰に用いる"],"correctIndex":1},{"id":51,"category":"マーケティング","question":"消費者行動におけるProblem Recognition（問題認識）とは何か。","explanation":"問題認識は購買決定プロセスの最初の段階であり、消費者がニーズやウォンツを自覚し、何かを購入する必要性を感じる段階です。","choices":["消費者が購買決定を後悔する状態","消費者が現在の状態と理想状態のギャップを認識する段階","製品に欠陥がある問題","消費者の支払い能力の問題"],"correctIndex":1},{"id":52,"category":"マーケティング","question":"ポジショニング戦略において、企業が取るべき基本的なアプローチはどれか。","explanation":"ポジショニングは、ターゲット顧客の心の中で、競合企業と異なる独自で価値のある位置を確立することです。","choices":["可能な限り多くの顧客セグメントに対応すること","競合企業と同じポジションを取ること","ターゲット顧客の心の中で独自で価値のある位置を確立すること","最も安い価格のポジションを取ること"],"correctIndex":2},{"id":53,"category":"マーケティング","question":"プロダクト・ライフサイクル（PLC）における「成長段階」の特徴として適切なものはどれか。","explanation":"成長段階は導入段階に次ぎ、需要が増加し売上が急速に伸びますが、利益率は低下傾向です。競合企業の参入が増加する時期でもあります。","choices":["売上が最も高い段階である","売上が急速に増加し、競合企業が参入し始める段階","売上が減少する段階である","売上が0に近い段階である"],"correctIndex":1},{"id":54,"category":"マーケティング","question":"プロモーション・ミックスにおいて、対面による説得を主とする手法は何か。","explanation":"人的販売（Personal Selling）は営業スタッフが顧客と直接対面し、説得・交渉する手法です。他のプロモーション手法と異なり個別対応が可能です。","choices":["広告","人的販売","販売促進","パブリック・リレーション"],"correctIndex":1},{"id":55,"category":"マーケティング","question":"購買行動の種類における「習慣的購買」の特徴として最も適切なものはどれか。","explanation":"習慣的購買は関与度が低く、繰り返し購買される日用品などの購買です。消費者は深く考えず、習慣で購買を繰り返します。","choices":["高関与で問題解決的な購買である","低関与で繰り返し購買される製品である","多くの代替品を比較検討する購買である","新製品の購買である"],"correctIndex":1},{"id":56,"category":"マーケティング","question":"パッケージデザインが購買行動に与える影響として適切でないものはどれか。","explanation":"パッケージデザインは商品保存期間そのものには影響しません。視認性、ブランド認識、購買意欲への影響が主な役割です。","choices":["商品の視認性を高める","ブランドイメージの形成","保存期間の延長","購買決定に影響を与える"],"correctIndex":2},{"id":57,"category":"マーケティング","question":"新製品導入時のプロモーション戦略について、Pull戦略とPush戦略の視点から述べよ。","explanation":"Push戦略は流通業者や営業スタッフに圧力をかけて販売促進する戦略で、Pull戦略は広告宣伝で最終消費者にニーズを喚起し、消費者の引っ張りで販売を促進する戦略です。新製品導入時には両者の組み合わせが効果的です。","choices":null,"correctAnswer":"Push戦略は流通業者や営業スタッフに圧力をかけて販売促進する戦略で、Pull戦略は広告宣伝で最終消費者にニーズを喚起し、消費者の引っ張りで販売を促進する戦略です。新製品導入時には両者の組み合わせが効果的です。"},{"id":58,"category":"マーケティング","question":"カスタマー・ジャーニーの概念とマーケティング施策への応用について述べよ。","explanation":"カスタマー・ジャーニーは顧客が認識から購買、使用、評価までの一連のプロセスです。これを理解することで、各段階に応じたマーケティング施策を設計でき、より効果的な顧客接触が実現できます。","choices":null,"correctAnswer":"カスタマー・ジャーニーは顧客が認識から購買、使用、評価までの一連のプロセスです。これを理解することで、各段階に応じたマーケティング施策を設計でき、より効果的な顧客接触が実現できます。"},{"id":59,"category":"経営戦略","question":"経験曲線効果（ラーニング・カーブ）の説明として最も適切なものはどれか。","explanation":"経験曲線効果は、生産経験の蓄積により効率性が向上し、累積生産量の増加に伴って単位原価が低下する現象です。","choices":["製品の質が時間とともに低下すること","累積生産量の増加とともに単位あたりコストが低下すること","従業員の給与が増加すること","市場規模が拡大すること"],"correctIndex":1},{"id":60,"category":"経営戦略","question":"競争戦略としての「ニッチ戦略」の説明として適切なものはどれか。","explanation":"ニッチ戦略は、大企業が対応しない特定の小規模市場セグメントに資源を集中させ、そこで競争優位を構築する戦略です。","choices":["業界全体を対象にする戦略","特定の小規模で限定的な市場セグメントに特化する戦略","最大規模の市場シェアを獲得する戦略","低価格競争に特化する戦略"],"correctIndex":1},{"id":61,"category":"経営戦略","question":"企業の国際化段階における「直接投資」はどの段階に相当するか。","explanation":"国際化は一般的に輸出→ライセンシング→現地法人設立→直接投資と段階的に進みます。直接投資は最も高度な関与段階です。","choices":["輸出段階","現地での子会社設立や事業展開段階","ライセンシング段階","初期段階"],"correctIndex":1},{"id":62,"category":"経営戦略","question":"戦略的意思決定と業務的意思決定の主な違いはどれか。","explanation":"戦略的意思決定は企業全体の長期的方向性や経営資源配分を決める高次の決定であり、業務的意思決定はより低い次元での日常的決定です。","choices":["戦略的意思決定は日々の業務に関するもの","戦略的意思決定は企業全体の長期的方向性に関する高次の決定である","業務的意思決定の方が重要である","両者に実質的な違いはない"],"correctIndex":1},{"id":63,"category":"組織論","question":"組織における権力と権威の違いとして適切なものはどれか。","explanation":"権威は組織規則で公式に認められた地位に伴う権限であり、権力は実際に他者を動かすことができる影響力です。権力は必ずしも権威を伴わない場合もあります。","choices":["実質的に同じ意味である","権力は実際に他者に影響を与える力であり、権威は公式に認められた影響力である","権力は上位者のみが持つ","権威は非公式である"],"correctIndex":1},{"id":64,"category":"組織論","question":"組織内のコミュニケーションにおいて、非公式の連絡経路を何と呼ぶか。","explanation":"インフォーマル・コミュニケーションは、組織図に基づかない非公式な人間関係を通じた情報伝達で、うわさやグループ内の会話などが該当します。","choices":["フォーマル・コミュニケーション","インフォーマル・コミュニケーション","公式コミュニケーション","情報システム"],"correctIndex":1},{"id":65,"category":"組織論","question":"意思決定理論におけるサイモンの「有限合理性」の説明として適切なものはどれか。","explanation":"有限合理性は、人間の認知能力と利用可能な情報が限定されているため、完全に最適な意思決定はできず、「満足できる」解を求めるという理論です。","choices":["人間は常に完全な情報と分析能力を持つ","人間は限られた情報と認知能力の中で、満足できる解を求める","すべての企業の意思決定は最適である","感情的な意思決定は存在しない"],"correctIndex":1},{"id":66,"category":"組織論","question":"コンフリクト・マネジメントにおいて、双方の利益を最大化する解決方法は何か。","explanation":"協調（collaboration）は相手の関心と自分の関心の両方を重視し、相手と協力して問題解決に当たる対立解決方法です。","choices":["回避","協調","妥協","支配"],"correctIndex":1},{"id":67,"category":"マーケティング","question":"顧客満足度（CS）と顧客ロイヤルティの関係について、最も適切なものはどれか。","explanation":"顧客満足度はロイヤルティの重要な要因ですが、競合企業の出現や価格変動でロイヤルティが失われることもあり、十分条件ではありません。","choices":["顧客満足度が高いと必ず顧客ロイヤルティも高い","顧客満足度は顧客ロイヤルティの必要条件だが十分条件ではない","両者に関係はない","顧客ロイヤルティが顧客満足度より重要である"],"correctIndex":1},{"id":68,"category":"マーケティング","question":"顧客セグメンテーションの基準として適切でないものはどれか。","explanation":"セグメンテーション基準は顧客側の特性（デモグラフィック、サイコグラフィック、行動的）であり、企業側の特性ではありません。","choices":["人口統計学的特性（年齢、性別）","地理的特性（地域）","心理的特性（価値観、ライフスタイル）","企業の本社の地理的位置"],"correctIndex":3},{"id":69,"category":"マーケティング","question":"ダイレクト・マーケティングの特徴として適切なものはどれか。","explanation":"ダイレクト・マーケティングは、DM、メール、SNSなどを通じて企業と消費者が直接やり取りし、個別対応が可能なマーケティング手法です。","choices":["必ずテレビ広告を使用する","企業と消費者の直接的なコミュニケーション","大量宣伝を基本とする","個別対応の不可能性"],"correctIndex":1},{"id":70,"category":"マーケティング","question":"製品ライフサイクル（PLC）の衰退段階での企業戦略として最も適切なものはどれか。","explanation":"衰退段階では、需要が減少するため、コストを削減しながら段階的に事業を縮小し、新製品への資源を移行することが適切です。","choices":["大規模な広告宣伝を実施する","新製品開発に注力し、段階的に撤退を検討する","競争企業より先に市場から撤退する","価格を大幅に引き上げる"],"correctIndex":1},{"id":71,"category":"経営戦略","question":"組織の経営資源（ヒト、モノ、カネ、情報）の戦略的活用について述べよ。","explanation":"経営資源は企業戦略の実現に不可欠です。ヒト（人材育成）、モノ（設備投資、R&D）、カネ（資金調達、配分）、情報（データ活用、IT投資）を戦略的に配分・活用することで、競争優位を構築できます。資源制約の中で優先順位を決定することが重要です。","choices":null,"correctAnswer":"経営資源は企業戦略の実現に不可欠です。ヒト（人材育成）、モノ（設備投資、R&D）、カネ（資金調達、配分）、情報（データ活用、IT投資）を戦略的に配分・活用することで、競争優位を構築できます。資源制約の中で優先順位を決定することが重要です。"},{"id":72,"category":"経営戦略","question":"企業の成長段階（創業期、成長期、成熟期、衰退期）ごとの戦略的課題について述べよ。","explanation":"創業期は経営基盤の確立、成長期は規模拡大と競争優位の維持、成熟期は効率化とイノベーション、衰退期は事業転換と新分野開拓が主要課題です。各段階に応じた適切な戦略転換が企業の持続的成長を実現します。","choices":null,"correctAnswer":"創業期は経営基盤の確立、成長期は規模拡大と競争優位の維持、成熟期は効率化とイノベーション、衰退期は事業転換と新分野開拓が主要課題です。各段階に応じた適切な戦略転換が企業の持続的成長を実現します。"},{"id":73,"category":"組織論","question":"企業文化と組織風土の関係性について述べよ。","explanation":"企業文化は長期的に形成される価値観や行動規範であり、組織風土はそれが実際に表れた雰囲気や環境です。強い企業文化は良好な組織風土をもたらし、それが従業員の行動を規定し、競争力に直結します。","choices":null,"correctAnswer":"企業文化は長期的に形成される価値観や行動規範であり、組織風土はそれが実際に表れた雰囲気や環境です。強い企業文化は良好な組織風土をもたらし、それが従業員の行動を規定し、競争力に直結します。"},{"id":74,"category":"組織論","question":"組織における報酬制度設計の重要なポイントについて述べよ。","explanation":"報酬制度は、①公正性・透明性の確保、②企業戦略と整合性、③個人と組織の目標の一致、④市場競争力との均衡などが重要です。これにより従業員のモチベーション向上と組織目標の達成が可能になります。","choices":null,"correctAnswer":"報酬制度は、①公正性・透明性の確保、②企業戦略と整合性、③個人と組織の目標の一致、④市場競争力との均衡などが重要です。これにより従業員のモチベーション向上と組織目標の達成が可能になります。"},{"id":75,"category":"マーケティング","question":"デジタル化時代における消費者行動の変化について述べよ。","explanation":"インターネットやSNSの普及により、消費者は購買前の情報収集が容易になり、口コミなど第三者の意見に影響されやすくなりました。また、オムニチャネル化により消費者は複数チャネルを活用して購買決定を行うようになり、企業側は顧客データの統合分析が重要になっています。","choices":null,"correctAnswer":"インターネットやSNSの普及により、消費者は購買前の情報収集が容易になり、口コミなど第三者の意見に影響されやすくなりました。また、オムニチャネル化により消費者は複数チャネルを活用して購買決定を行うようになり、企業側は顧客データの統合分析が重要になっています。"},{"id":76,"category":"経営戦略","question":"企業の社会的責任（CSR）と企業価値の関係として最も適切なものはどれか。","explanation":"適切なCSR活動は企業ブランド価値を高め、従業員のモチベーション向上や顧客信頼の獲得をもたらし、長期的な企業価値向上につながります。","choices":["CSRは企業価値の足かせである","CSRは短期利益を減少させるのみである","CSRは長期的な企業価値向上と社会への貢献の両立をもたらす","CSRと企業価値に関連性はない"],"correctIndex":2},{"id":77,"category":"経営戦略","question":"ビジネスシステムの効率性を高めるために導入されるERP（統合基幹業務システム）の主な機能は何か。","explanation":"ERPは企業の異なる部門の情報を統合的に管理し、業務の効率化と意思決定の迅速化を実現するシステムです。","choices":["顧客データベースのみの管理","財務・会計・在庫・生産などの業務を統合的に管理","製造設備の自動化のみ","営業データの管理"],"correctIndex":1},{"id":78,"category":"組織論","question":"タレント・マネジメントの目的として適切なものはどれか。","explanation":"タレント・マネジメントは、優秀な人材を特定・育成・配置し、組織の戦略目標達成を支援するための統合的な人材管理手法です。","choices":["優秀人材の開発と配置最適化による組織競争力の向上","人員削減と効率化のみ","給与水準の最小化","職務経歴書の一元管理"],"correctIndex":0},{"id":79,"category":"マーケティング","question":"マーケティング・オートメーション（MA）の主な利点はどれか。","explanation":"マーケティング・オートメーションは、顧客データと行動分析に基づき、メール配信やリード育成などの業務を自動化し、マーケティング効率を向上させます。","choices":["営業スタッフの完全廃止","顧客行動データに基づいた自動化されたマーケティング活動と効率化","顧客とのコミュニケーション削減","広告費用の必須削減"],"correctIndex":1},{"id":80,"category":"経営戦略","question":"ビジネス・インテリジェンス（BI）ツールの役割として適切なものはどれか。","explanation":"BIツールは膨大なデータを分析・可視化し、経営層が戦略的意思決定を行う際に必要な情報を提供します。","choices":["企業秘密の暗号化のみ","大量データの分析と可視化による経営意思決定支援","販売スタッフの性能評価のみ","顧客データの削除"],"correctIndex":1},{"id":81,"category":"経営戦略","question":"オープン・イノベーションの説明として最も適切なものはどれか。","explanation":"オープン・イノベーションは、企業の内部資源と外部の知識・技術を組み合わせて、新しい製品やビジネスモデルを開発するアプローチです。","choices":["企業内部のみでの研究開発","外部の組織や個人との協業により新しい価値を創造するアプローチ","古い技術の廃止","単独での製品開発"],"correctIndex":1},{"id":82,"category":"組織論","question":"ナレッジ・マネジメント（知識管理）の目的として適切なものはどれか。","explanation":"ナレッジ・マネジメントは、組織全体で知識を共有・蓄積・活用することで、イノベーションと問題解決能力を向上させるマネジメント手法です。","choices":["従業員個人の秘密保持","組織内の知識共有と活用による競争優位の構築","情報システムの導入のみ","知識の独占"],"correctIndex":1},{"id":83,"category":"マーケティング","question":"コンテンツ・マーケティングの特徴として適切なものはどれか。","explanation":"コンテンツ・マーケティングは、ブログ、動画、ホワイトペーパーなど有用な情報を提供し、見込客との関係構築と信頼醸成を行い、長期的な顧客獲得を目指します。","choices":["短期的な売上増加のみを目指す","有用で関連性の高い情報提供を通じて顧客との信頼関係を構築する","テレビ広告に限定される","顧客ニーズの無視"],"correctIndex":1},{"id":84,"category":"経営戦略","question":"クリステンセンのイノベーションのジレンマの主な主張はどれか。","explanation":"イノベーションのジレンマは、既存事業で成功している企業ほど、既存顧客ニーズに対応することに注力し、破壊的イノベーションに対応しにくくなるという経営上の課題を指摘しています。","choices":["すべてのイノベーションは成功する","既存企業が破壊的イノベーションに対応しにくい傾向がある","新興企業は常に成功する","イノベーションは不要である"],"correctIndex":1},{"id":85,"category":"組織論","question":"企業における多様性（ダイバーシティ）の推進目的として適切なものはどれか。","explanation":"多様性の推進は、異なる視点や経験を持つ人材が協力することで、イノベーション能力が向上し、組織の創造性と競争力が高まることを期待しています。","choices":["労働基準の廃止","異なるバックグラウンドを持つ人材が創造性と問題解決能力を向上させ、競争優位を構築する","女性従業員の排除","高齢者の雇用禁止"],"correctIndex":1},{"id":86,"category":"マーケティング","question":"インフルエンサー・マーケティングの特徴として最も適切なものはどれか。","explanation":"インフルエンサー・マーケティングは、SNSなどで多くのフォロワーを持つ個人（インフルエンサー）が製品を推奨することで、ターゲット層への訴求力を高める施策です。","choices":["テレビ広告の完全代替","影響力を持つ個人がSNS等を通じて製品やサービスを推奨し、フォロワーに影響を与える施策","大企業向けのみ","顧客データの不要性"],"correctIndex":1},{"id":87,"category":"経営戦略","question":"企業の競争優位の源泉と持続性について説明せよ。","explanation":"競争優位の源泉は、技術、ブランド、人材などの経営資源や、それを活用する能力にあります。持続的競争優位は、模倣困難性、代替不可能性、組織的支援が必要です。VRIO分析により、資源の価値と希少性、模倣困難性を評価し、組織的活用が持続的優位を生み出します。","choices":null,"correctAnswer":"競争優位の源泉は、技術、ブランド、人材などの経営資源や、それを活用する能力にあります。持続的競争優位は、模倣困難性、代替不可能性、組織的支援が必要です。VRIO分析により、資源の価値と希少性、模倣困難性を評価し、組織的活用が持続的優位を生み出します。"},{"id":88,"category":"組織論","question":"リモートワークやハイブリッドワークの導入における組織的課題について述べよ。","explanation":"課題としては、①コミュニケーションの困難性、②評価の公正性確保、③組織文化の醸成困難、④労務管理の複雑化、⑤従業員のモチベーション維持が挙げられます。これらに対応するため、デジタルツールの活用、明確な評価基準設定、定期的な対面コミュニケーション、適切な労務管理ルールの確立などが必要です。","choices":null,"correctAnswer":"課題としては、①コミュニケーションの困難性、②評価の公正性確保、③組織文化の醸成困難、④労務管理の複雑化、⑤従業員のモチベーション維持が挙げられます。これらに対応するため、デジタルツールの活用、明確な評価基準設定、定期的な対面コミュニケーション、適切な労務管理ルールの確立などが必要です。"},{"id":89,"category":"マーケティング","question":"データドリブン・マーケティングの実践上の課題と対策について述べよ。","explanation":"課題としては、①データの質と信頼性、②個人情報保護とプライバシー問題、③分析人材の不足、④データサイロ化があります。対策として、データガバナンスの確立、CRMやBIツールの導入、人材育成、プライバシー規制への対応などが必要です。","choices":null,"correctAnswer":"課題としては、①データの質と信頼性、②個人情報保護とプライバシー問題、③分析人材の不足、④データサイロ化があります。対策として、データガバナンスの確立、CRMやBIツールの導入、人材育成、プライバシー規制への対応などが必要です。"},{"id":90,"category":"経営戦略","question":"サスティナビリティ（持続可能性）経営の説明として最も適切なものはどれか。","explanation":"サスティナビリティ経営は、環境保全、社会貢献、経済成長のバランスを取りながら、長期的な企業価値を実現する経営戦略です。","choices":["短期利益の最大化のみ","環境・社会・経済の持続可能な発展と企業価値の長期向上を両立させる経営","古い技術の継続使用","社会への配慮の廃止"],"correctIndex":1},{"id":91,"category":"組織論","question":"メンターシップ制度の目的として最も適切なものはどれか。","explanation":"メンターシップは、経験豊かなメンター（先輩）がメンティ（後輩）に対し、キャリア開発や職業的成長を支援する人材育成制度です。","choices":["経験豊かな先輩が後輩の職業的発展と人材育成を支援する仕組み","若手従業員の監視","給与決定の唯一の方法","離職者の増加"],"correctIndex":0},{"id":92,"category":"マーケティング","question":"カスタマー・アドボケイト（顧客擁護）制度の役割として最も適切なものはどれか。","explanation":"カスタマー・アドボケイト制度は、顧客の不満や提案を真摯に受け止め、組織内で議論し、製品・サービスの改善に活かす顧客中心の経営姿勢です。","choices":["顧客不満足の拡大","顧客不満足に対応し、顧客の声を組織に反映させ、改善につなげる仕組み","顧客苦情の隠蔽","製品品質の低下"],"correctIndex":1},{"id":93,"category":"経営戦略","question":"エコシステム戦略における企業の役割として適切なものはどれか。","explanation":"エコシステム戦略は、複数の企業やプレイヤーが相互に関係し、協業して新しい価値を創造するプラットフォームを構築する戦略です。","choices":["単独での製品開発のみ","複数企業が相互に依存し価値を共創する仕組みの構築","競合企業の排除","技術情報の完全秘匿"],"correctIndex":1},{"id":94,"category":"組織論","question":"ワーク・ライフ・バランス（WLB）推進の企業側のメリットとして適切なものはどれか。","explanation":"WLB推進により、従業員ストレスが軽減され、満足度や生産性が向上し、優秀人材の確保と離職防止につながります。","choices":["生産性の低下","従業員の満足度向上、離職率低下、生産性向上","従業員のモチベーション低下","企業競争力の低下"],"correctIndex":1},{"id":95,"category":"マーケティング","question":"ソーシャル・リスニング（社会的聞き取り）の活用目的として最も適切なものはどれか。","explanation":"ソーシャル・リスニングは、SNS、ブログ、掲示板などから顧客の意見や感情、市場トレンドを収集・分析し、マーケティング戦略に活かす手法です。","choices":["顧客情報の盗聴","SNS等を通じた顧客の声や市場トレンドの把握と分析","不正な市場操作","競合企業のスパイ活動"],"correctIndex":1},{"id":96,"category":"経営戦略","question":"デジタル・トランスフォーメーション（DX）が企業経営に与える影響について述べよ。","explanation":"DXは、デジタル技術の導入により、ビジネスモデルや業務プロセスを抜本的に変革し、顧客価値の向上と競争力強化をもたらします。例えば、データ分析による意思決定の高速化、自動化による効率化、新しいサービス提供方式の実現などが挙げられます。","choices":null,"correctAnswer":"DXは、デジタル技術の導入により、ビジネスモデルや業務プロセスを抜本的に変革し、顧客価値の向上と競争力強化をもたらします。例えば、データ分析による意思決定の高速化、自動化による効率化、新しいサービス提供方式の実現などが挙げられます。"},{"id":97,"category":"組織論","question":"アジャイル経営における組織構造と意思決定プロセスの特徴について述べよ。","explanation":"アジャイル経営は、小規模クロスファンクショナルチームによる自律的運営、短期サイクルでの意思決定、継続的改善を特徴とします。従来の階層的・長期計画型とは異なり、市場変化への迅速な対応と創意工夫が可能になります。","choices":null,"correctAnswer":"アジャイル経営は、小規模クロスファンクショナルチームによる自律的運営、短期サイクルでの意思決定、継続的改善を特徴とします。従来の階層的・長期計画型とは異なり、市場変化への迅速な対応と創意工夫が可能になります。"},{"id":98,"category":"マーケティング","question":"サブスクリプション・ビジネスモデルの利点と課題について述べよ。","explanation":"利点は、継続的な収益源の確保、顧客との長期関係構築、予測可能性の向上です。課題は、顧客解約、継続的なサービス改善の必要性、顧客獲得コストの回収期間があります。顧客ロイヤルティ維持が成功の鍵です。","choices":null,"correctAnswer":"利点は、継続的な収益源の確保、顧客との長期関係構築、予測可能性の向上です。課題は、顧客解約、継続的なサービス改善の必要性、顧客獲得コストの回収期間があります。顧客ロイヤルティ維持が成功の鍵です。"},{"id":99,"category":"経営戦略","question":"ビジネス・モデル・キャンバスの9つの要素として適切でないものはどれか。","explanation":"ビジネス・モデル・キャンバスの9要素は、顧客セグメント、価値提案、チャネル、顧客関係、収益ストリーム、主要資源、主要活動、主要パートナーシップ、コスト構造です。営業利益目標は含まれません。","choices":["価値提案","顧客セグメント","営業利益目標","パートナーシップ"],"correctIndex":2},{"id":100,"category":"組織論","question":"パーパス・ドリブン経営の説明として最も適切なものはどれか。","explanation":"パーパス・ドリブン経営は、企業が社会の中で果たすべき役割や存在意義を明確にし、それを実現することで、従業員のモチベーション向上と長期的な企業価値創造を実現します。","choices":["短期利益のみを追求する経営","企業の社会的使命（パーパス）を経営の中心に据え、長期的価値創造を目指す経営","株主利益のみを重視する経営","顧客ニーズの無視"],"correctIndex":1},{"id":101,"category":"マーケティング","question":"プロダクト・マーケット・フィット（PMF）の説明として最も適切なものはどれか。","explanation":"PMFは、開発した製品やサービスがターゲット市場の顧客ニーズに適合し、顧客満足度が高い状態です。スタートアップや新規事業の成功に不可欠です。","choices":["製品品質と市場価格の完全一致","製品が市場ニーズに合致し、顧客が満足している状態","全顧客層への販売成功","広告宣伝の多寡"],"correctIndex":1},{"id":102,"category":"経営戦略","question":"企業の長期的競争力構築における人的資本投資の重要性について述べよ。","explanation":"人的資本（従業員のスキル、知識、経験）は企業の最重要資産です。継続的な教育研修、キャリア開発支援、適切な評価報酬により、従業員の生産性と創造性が向上し、イノベーション能力と持続的競争優位が実現されます。","choices":null,"correctAnswer":"人的資本（従業員のスキル、知識、経験）は企業の最重要資産です。継続的な教育研修、キャリア開発支援、適切な評価報酬により、従業員の生産性と創造性が向上し、イノベーション能力と持続的競争優位が実現されます。"},{"id":103,"category":"組織論","question":"企業におけるコーポレート・ガバナンスの強化の必要性と具体的施策について述べよ。","explanation":"コーポレート・ガバナンスは、企業経営の透明性と説明責任を確保し、ステークホルダーの利益を保護します。具体的には、取締役会の独立性確保、監査機能の強化、利益相反取引の監視、情報開示の充実などが重要です。","choices":null,"correctAnswer":"コーポレート・ガバナンスは、企業経営の透明性と説明責任を確保し、ステークホルダーの利益を保護します。具体的には、取締役会の独立性確保、監査機能の強化、利益相反取引の監視、情報開示の充実などが重要です。"},{"id":104,"category":"マーケティング","question":"グローバル・マーケティングにおけるローカライゼーション戦略の重要性について述べよ。","explanation":"グローバル展開では、各国の文化、消費者行動、規制環境が異なります。グローバル・ブランドの一貫性を保ちながら、各市場に適応させるローカライゼーション戦略が必要です。言語、製品仕様、価格設定、プロモーションを現地化することで、顧客満足度と市場浸透が向上します。","choices":null,"correctAnswer":"グローバル展開では、各国の文化、消費者行動、規制環境が異なります。グローバル・ブランドの一貫性を保ちながら、各市場に適応させるローカライゼーション戦略が必要です。言語、製品仕様、価格設定、プロモーションを現地化することで、顧客満足度と市場浸透が向上します。"},{"id":105,"category":"経営戦略","question":"ビジネス・リスク管理における「リスク回避」戦略の説明として適切なものはどれか。","explanation":"リスク回避戦略は、高リスクの事業や取引を回避することですが、その結果、成長機会を失う可能性があります。リスク低減、リスク移転などとのバランスが重要です。","choices":["リスク発生の可能性を低減させる","リスク発生時の対応策を準備する","リスク回避を通じて事業機会を放棄する","リスクを無視する"],"correctIndex":2}],"unei":[{"id":1,"category":"生産管理","question":"セル生産方式の特徴として正しいものはどれか。","explanation":"セル生産は少人数のチームが製品全工程を完結させ、柔軟性と品質責任が高い方式である。","choices":["製品単位で一貫性のあるグループが責任を持つ方式","各工程が完全に分断された流れ型の方式","需要予測に基づいた大量生産方式","仕掛品を最大限保有する方式"],"correctIndex":0},{"id":2,"category":"生産管理","question":"JIT（ジャスト・イン・タイム）生産方式の基本原則として正しいものはどれか。","explanation":"JIT生産方式は、必要な時に、必要な量を、必要な場所に供給することで、在庫を最小化し、システム全体の効率を高める。無駄の排除と品質の向上が特徴である。","choices":["必要な時に、必要な量を、必要な場所に供給する","各工程で最大限の在庫を確保する","需要予測に基づいて大量生産を行う","サプライヤーから一括納入を受ける"],"correctIndex":0},{"id":3,"category":"生産管理","question":"MRP（資材所要量計画）の主な目的はどれか。","explanation":"MRPは最終製品需要から遡行計算して、必要な部品・材料の数量と調達時期を決定するシステムである。","choices":["需要予測から逆算して必要な部品・材料の数量と時期を計画する","全ての原材料を最大限確保する","生産量を均等にすることのみ","外注業者を増やすことに重点を置く"],"correctIndex":0},{"id":4,"category":"生産管理","question":"工程能力指数（Cpk）が1.33以上である場合の意味として正しいものはどれか。","explanation":"工程能力指数Cpkが1.33以上という基準は、統計的に不良率が0.3%程度以下に抑えられることに基づいている。これは工程が安定しており、十分な能力を持つと判断される水準である。","choices":["統計的に不良率が0.3%以下に抑えられる水準である","工程変動が規格幅の6シグマ以内に収まっている","工程の中心が規格中心と完全に一致している","全製品が規格を満たすことが確実である"],"correctIndex":0},{"id":5,"category":"生産管理","question":"設備保全の体系において、計画的な予防策を講じて設備故障を未然に防ぐアプローチを何と呼ぶか。","explanation":"予防保全は、使用時間や稼働日数などに基づいて計画的に保全を実施し、故障を防ぐアプローチ。事後保全は故障後の修理、改良保全は設計変更による改善、緊急保全は突発的故障への対応である。","choices":["予防保全","事後保全","改良保全","緊急保全"],"correctIndex":0},{"id":6,"category":"生産管理","question":"在庫管理における「安全在庫」の役割を説明せよ。","explanation":"安全在庫は、需要の変動やリード時間の遅延などの不確実性に対応するために保持される。品切れリスクを低減し、顧客サービス水準を維持しながら、総在庫コストとのバランスを取る役割を果たす。","choices":["必要な時に、必要な量を、必要な場所に供給する","最大限の在庫を確保する","大量生産を行う","一括納入を受ける"],"correctIndex":0},{"id":7,"category":"生産管理","question":"定量発注方式の最適発注量（EOQ）決定に用いられる主要な費用はどれか。","explanation":"最適発注量（EOQ）は、発注費用（発注回数が多いほど増加）と在庫保持費用（発注量が多いほど増加）の2つを考慮して、両者の合計が最小になる点を求める。","choices":["発注費用と在庫保持費用","製造原価と販売経費のみ","輸送費と検査費のみ","顧客の購買価格"],"correctIndex":0},{"id":8,"category":"生産管理","question":"品質管理における「QC7つ道具」として正しいものはどれか。","explanation":"QC7つ道具にはパレート図、特性要因図、チェックシート、管理図などが含まれ、問題解析に活用される。","choices":["パレート図、特性要因図、チェックシート、管理図など","販売計画、営業目標、市場分析、顧客満足度","生産計画、在庫管理、外注管理、原価管理","人事評価、給与管理、採用計画、教育訓練"],"correctIndex":0},{"id":9,"category":"生産管理","question":"IE（インダストリアルエンジニアリング）の動作研究の目的として正しいものはどれか。","explanation":"動作研究は作業動作を分析し、最適な作業方法を標準化することで効率性・安全性・品質を向上させる。","choices":["作業方法を合理化し無駄な動きを排除する","作業者の給与を最大化する","生産量を制限する","品質基準を緩和する"],"correctIndex":0},{"id":10,"category":"生産管理","question":"購買管理におけるサプライヤー評価の主要な評価項目を述べよ。","explanation":"サプライヤー評価の主要項目：①品質（不良率、品質実績）②納期（納期遵守率、リードタイム）③価格（単価競争力、コスト削減対応）④協力体制（技術支援、情報共有）である。これらは継続的に監視・改善される。","choices":["多品種少量生産に対応できる","単一品種の大量生産のみ可能","在庫を最大化する","需要予測が不要"],"correctIndex":0},{"id":11,"category":"生産管理","question":"製造業におけるスケジューリングの最適化目標として正しいものはどれか。","explanation":"スケジューリングの目標は、納期遵守（顧客満足度）とリードタイムの短縮（資金効率）のバランスを取ることが中心。単一目標ではなく複合的な最適化を図る。","choices":["納期遵守とリードタイム短縮のバランスを取る","生産量を最大限に増やす","全設備の稼働率を100%にする","在庫をゼロにする"],"correctIndex":0},{"id":12,"category":"生産管理","question":"工場レイアウトで「対象製品別レイアウト」が最適な生産形態はどれか。","explanation":"製品別レイアウトは多品種小ロット時に効果的で、各製品に一貫した流れを作成できる。","choices":["多品種小ロット生産","単品種大量生産","連続プロセス生産","完全受注生産のみ"],"correctIndex":0},{"id":13,"category":"生産管理","question":"WIP（進行中の仕掛品）削減の効果として正しいものはどれか。","explanation":"WIP削減によりリードタイム短縮、在庫資金解放、問題の早期顕在化が実現される。","choices":["リードタイム短縮、在庫資金解放、品質問題の早期発見","生産量の増加、設備投資の削減、顧客数の増加","従業員数の削減、売上の拡大、市場占有率の上昇","原材料価格の低下、輸送費削減、関税削減"],"correctIndex":0},{"id":14,"category":"生産管理","question":"統計的品質管理における管理図の管理限界の役割はどれか。","explanation":"管理図の管理限界（UCL・LCL）は、工程が統計的に安定した状態（管理状態）にあるかを判定するための基準。規格限界とは異なり、工程変動の正常性を監視する。","choices":["工程が統計的管理状態にあるかを判定する基準を示す","製品の良否判定の基準を示す","規格値との差を表示する","品質改善の目標値を示す"],"correctIndex":0},{"id":15,"category":"生産管理","question":"物流管理における配送効率改善の方法として最も有効なものはどれか。","explanation":"配送効率は配送順序の最適化、複数顧客積載、拠点配置により大幅に向上する。","choices":["ルート最適化、積載率向上、配送拠点の戦略的配置","配送量の削減、納期の延長、配送頻度の低下","大型車両のみの使用、配送人員の削減、運転時間延長","同一顧客への複数回配送、新規配送地域への拡大"],"correctIndex":0},{"id":16,"category":"店舗・販売管理","question":"商圏分析の主な目的として正しいものはどれか。","explanation":"商圏分析は顧客数、購買力、競争状況を調査し、立地戦略と売上予測の基盤となる。","choices":["出店地点の適切性を判断し売上予測の根拠を得る","店舗の装飾度合いを決定する","競合店の商品構成のみを調査する","従業員教育内容を決定する"],"correctIndex":0},{"id":17,"category":"店舗・販売管理","question":"商圏分析における「第一商圏」「第二商圏」「第三商圏」の定義を説明せよ。","explanation":"第一商圏：来店客の60～70%が居住する最も重要な地域（徒歩10分以内など）。第二商圏：来店客の20～30%が居住する地域（徒歩10～20分）。第三商圏：来店客の10～20%が居住する地域（それ以上）。比率は業態により変動。","choices":["品質責任が明確で柔軟性が高い","各工程が完全に分断されている","仕掛品を最大化する","需要予測のみに依存"],"correctIndex":0},{"id":18,"category":"店舗・販売管理","question":"「駅前立地」と「幹線道路沿い立地」を比較した場合、前者の主な利点はどれか。","explanation":"駅前立地は高い歩行者通行量が主要利点である一方、幹線道路沿いは自動車アクセスが優位である。","choices":["通勤客・通学客など歩行者通行量が多い","大型駐車場が容易に確保できる","テナント賃借料が相対的に安い","自動車でのアクセスが優位である"],"correctIndex":0},{"id":19,"category":"店舗・販売管理","question":"店舗設計における「動線計画」の重要性を述べよ。","explanation":"動線計画は、顧客が店舗内を移動する経路を設計し、買い回り率向上と店舗滞在時間延長を図る。入口から出口までの流れを最適化し、陳列商品への接触機会を増やし、衝動買いを促進する。","choices":["セル生産またはジョブショップ方式","ライン生産方式のみ","連続生産方式のみ","受注生産のみ"],"correctIndex":0},{"id":20,"category":"店舗・販売管理","question":"VMD（ビジュアルマーチャンダイジング）において、「ゴールデンゾーン」とは何か。","explanation":"ゴールデンゾーンは、視認性と手の届きやすさが最も優れた高さ範囲（およそ眼線から膝までの高さ）。この位置に売れ筋商品や高利益商品を配置すると販売促進効果が高い。","choices":["眼線から膝までの高さで、最も視認性と手の届きやすさが優れた位置","入口から最も近い売場スペース","顧客が最長時間滞在する売場","売上が最も高い商品カテゴリー"],"correctIndex":0},{"id":21,"category":"店舗・販売管理","question":"商品計画において、売上高目標から「売上数量」を決定するために必要な情報はどれか。","explanation":"売上高目標÷平均商品単価＝必要売上数量。この計算式から、どの商品カテゴリーにどの程度の数量が必要かを逆算できる。","choices":["平均商品単価（商品ミックス）と売上高","商品の原価のみ","競合店舗の販売数量","従業員の販売技術レベル"],"correctIndex":0},{"id":22,"category":"店舗・販売管理","question":"「品揃え戦略」における「奥行き」と「幅」の定義を述べよ。","explanation":"品揃えの「幅」：扱う商品カテゴリーの数（広い幅＝多くの商品種類）。品揃えの「奥行き」：各カテゴリー内の商品バリエーション数（深い奥行き＝サイズ、色、グレード等の豊富さ）。戦略により幅広型と奥行型を使い分ける。","choices":["生産能力が他工程より低く全体を制限","最も利益が高い工程","最も時間がかかる工程","最初の工程"],"correctIndex":0},{"id":23,"category":"店舗・販売管理","question":"POSシステムにより得られる販売データの主な活用方法はどれか。","explanation":"POSシステムは商品売上、購買パターン、在庫管理、売上予測など、多角的な経営情報をリアルタイムで提供する。","choices":["商品ごとの売上・販売数量把握と顧客購買パターン分析","従業員の勤務評価のみ","店舗の建築面積決定","テナント賃借料の交渉"],"correctIndex":0},{"id":24,"category":"店舗・販売管理","question":"バーコード導入のメリットとして正しいものはどれか。","explanation":"バーコード導入は個別識別、入力ミス削減、レジ高速化、正確なデータ収集を実現し、供給チェーン全体の効率化につながる。","choices":["入力ミスの削減、レジ処理高速化、正確な販売データ収集","商品価格の自動上昇","顧客の購買強制","従業員数の削減のみ"],"correctIndex":0},{"id":25,"category":"店舗・販売管理","question":"EDI（電子データ交換）導入による具体的な効果はどれか。","explanation":"EDIにより、発注から納品、請求まで一連のプロセスが電子化され、処理時間短縮、誤りの削減、情報共有の迅速化が実現。","choices":["注文・納品・請求などの事務処理の自動化と情報リアルタイム化","商品の品質向上","販売価格の決定のみ","従業員のシステム教育が不要になる"],"correctIndex":0},{"id":26,"category":"店舗・販売管理","question":"物流管理における「保管機能」と「流通加工機能」の役割の違いを説明せよ。","explanation":"保管機能：商品の時間的ズレ（需要と供給の時期差）を調整し、平準化を図る。流通加工機能：商品に付加価値を付与する（ラッピング、ギフト化、詰め合わせなど）。どちらも消費者価値向上に寄与。","choices":["需要変動とリード時間遅延に対応する","原価を最低限にする","回転率を低下させる","生産計画を不要にする"],"correctIndex":0},{"id":27,"category":"店舗・販売管理","question":"小売業における「返品管理」の重要性と最小化施策を述べよ。","explanation":"返品管理の重要性：返品は売上減少、物流コスト増加、顧客信頼低下につながる。最小化施策：①商品品質管理の強化②正確な商品情報提供③顧客満足度向上である。","choices":["発注費用と在庫保持費用の両方","購買価格のみ","輸送費のみ","検査費のみ"],"correctIndex":0},{"id":28,"category":"店舗・販売管理","question":"「大型商業施設」（ショッピングモール）における店舗構成の役割分担について述べよ。","explanation":"大型商業施設の店舗構成：①テナント科学（核店舗と専門店の配置バランス）②流動性の確保（導線設計）③相乗効果（テナント間の相互補完）。核店舗は集客力、専門店は利益率、飲食店は滞在時間延長に寄与。","choices":["パレート図、特性要因図、チェックシート、管理図など","販売計画のみ","営業目標のみ","市場分析のみ"],"correctIndex":0},{"id":29,"category":"店舗・販売管理","question":"まちづくり三法の主要な内容を説明せよ。","explanation":"まちづくり三法：①大規模小売店舗法の廃止②都市計画法改正（用途地域の制限強化）③中心市街地活性化法。目的は、無秩序な大型店舗立地を規制し、中心市街地の衰退を防ぎ、計画的なまちづくりを促進することである。","choices":["作業方法を合理化し無駄な動きを排除","給与を最大化する","生産量を制限する","品質基準を緩和"],"correctIndex":0},{"id":30,"category":"生産管理","question":"生産方式の選択基準として、多品種少量生産に最適な方式はどれか。","explanation":"多品種少量生産では、製品が異なるため固定的なラインが適さない。セル生産またはジョブショップ方式が柔軟に対応できる。","choices":["セル生産方式またはジョブショップ方式","ライン生産方式","ロット生産方式","連続生産方式"],"correctIndex":0},{"id":31,"category":"生産管理","question":"「ボトルネック工程」とは何か。その対策を述べよ。","explanation":"ボトルネック工程は、生産能力が他の工程より低く、全体の生産能力を制限する工程。対策：①能力向上（設備投資、人員増加）②バッチ割り当て調整③外注化④稼働率向上である。","choices":["品質、納期、価格、協力体制","従業員数のみ","経営年数のみ","所在地のみ"],"correctIndex":0},{"id":32,"category":"生産管理","question":"生産計画における「月別計画」から「週別計画」への展開で考慮すべき要素はどれか。","explanation":"月別から週別への計画展開には、需要変動、設備能力、在庫、リードタイムなど複数の要因を統合的に考慮する必要がある。","choices":["需要変動、設備能力、在庫水準、リードタイムなど","経営者の意思決定のみ","従業員の休暇日程のみ","原材料の市場価格"],"correctIndex":0},{"id":33,"category":"生産管理","question":"QCサークルの活動目標を述べよ。","explanation":"QCサークルは、第一線の作業者がチームを組み、問題解決に取り組む自発的活動。目標は品質向上、不良削減、コスト低減、安全改善など。同時に労働意欲向上と経営参加意識の醸成を図る。","choices":["納期遵守とリードタイム短縮のバランス","生産量の最大化","全設備の稼働率を100%にする","在庫をゼロにする"],"correctIndex":0},{"id":34,"category":"生産管理","question":"6シグマ活動の基本的なアプローチ（DMAIC）を説明せよ。","explanation":"6シグマのDMAIC：D（Define：課題定義）→M（Measure：測定）→A（Analyze：分析）→I（Improve：改善実施）→C（Control：管理定着）。統計的手法に基づく継続的改善で、プロセスの効率性を飛躍的に高める。","choices":["多品種小ロット生産に適している","単品種大量生産のみ","連続プロセス生産のみ","完全受注生産のみ"],"correctIndex":0},{"id":35,"category":"生産管理","question":"サプライ・チェーン・マネジメント（SCM）における情報共有の利点として最も重要なものはどれか。","explanation":"SCM情報共有により、需要変動への対応、在庫削減、納期短縮、サプライチェーン全体のコスト削減が実現される。","choices":["需要変動への敏感な対応と在庫の最適化","通信費の削減のみ","業者数の削減","設備投資の削減"],"correctIndex":0},{"id":36,"category":"生産管理","question":"設備故障における「MTBF」（平均故障間隔）と「MTTR」（平均修復時間）の定義を述べよ。","explanation":"MTBF：故障から次の故障発生まで、平均してどのくらいの時間稼働するか。MTTR：故障発生から復旧まで平均でどのくらいの時間を要するか。設備の信頼性評価に両指標が必要。","choices":["リードタイム短縮と資金効率向上","生産量の増加","設備投資の削減","市場占有率の上昇"],"correctIndex":0},{"id":37,"category":"生産管理","question":"在庫管理における「ABC分析」の用途として正しいものはどれか。","explanation":"ABC分析は、売上金額に基づいて商品を3段階に分類し、限られた管理資源を重点配分する優先順位付け手法である。","choices":["売上金額に基づいて商品を優先順位付けし、管理資源を重点配分する","販売期間を決定する","顧客満足度を測定する","従業員の評価を行う"],"correctIndex":0},{"id":38,"category":"生産管理","question":"生産性の定義として正しいものはどれか。","explanation":"生産性は、投入量（労働力、資本、原材料など）に対する産出量（製品・サービス）の比率。効率性の指標であり、生産性向上は企業競争力の強化につながる。","choices":["投入資源に対する産出の比率","生産量を最大化する能力","利益率の高さ","従業員の労働意欲の高さ"],"correctIndex":0},{"id":39,"category":"生産管理","question":"工程管理における「工程検査」と「受入検査」の役割の違いを説明せよ。","explanation":"受入検査：納入材料の品質確認（サプライヤー品質保証の確認）。工程検査：生産工程中の品質確認（工程内不良の早期発見）。工程検査で不良を早期発見することで、後工程への不良品流入を防止。","choices":["工程が統計的管理状態にあるかを判定","製品の良否を判定する","規格値との差を表示","改善目標値を示す"],"correctIndex":0},{"id":40,"category":"生産管理","question":"「かんばん方式」の基本的な運用ルールを説明せよ。","explanation":"かんばん方式は、後工程の消費から逆流的に前工程に指示を伝える。かんばん（札）枚数が固定され、かんばんがない限り前工程は生産しない。これにより、無駄な在庫生成を防ぎ、必要量の生産を実現する。JIT実現の手段。","choices":["ルート最適化、積載率向上、拠点配置","配送量の削減","大型車両のみの使用","配送頻度の低下"],"correctIndex":0},{"id":41,"category":"生産管理","question":"製造原価の低減活動において「IE活動」と「VA/VE活動」の違いはどれか。","explanation":"IE活動：既存工程の無駄排除と効率化。VA/VE活動：製品機能の最適化と不要な機能削減。両者は補完的で、並行して実施することで総合的なコスト低減が実現。","choices":["IE活動は工程改善、VA/VE活動は製品・機能の見直し","両者は同じ活動である","IE活動は設備投資、VA/VE活動は人員削減","IE活動は品質向上、VA/VE活動はコスト低減のみ"],"correctIndex":0},{"id":42,"category":"生産管理","question":"「納期短縮」に向けた生産管理上の施策を述べよ。","explanation":"納期短縮施策：①リードタイム短縮（WIP削減、並列処理）②工程の段階削減（工程統合）③ボトルネック工程の能力向上④設備・技術への投資⑤サプライヤー連携による外注納期短縮である。","choices":["出店地点の適切性と売上予測の根拠","店舗の装飾度合い","競合店の商品構成のみ","従業員教育"],"correctIndex":0},{"id":43,"category":"生産管理","question":"材料の受入検査において「サンプリング検査」を採用する主なメリットはどれか。","explanation":"サンプリング検査のメリット：①検査コスト低減②検査時間短縮③統計的手法で信頼性確保。ただし不良ロット流入のリスクをAQL（許容品質水準）で管理。","choices":["検査コスト低減、検査時間短縮、統計的不良率推定","全品検査と同じ品質保証が必ず得られる","全ての不良品を確実に発見できる","検査機器が不要になる"],"correctIndex":0},{"id":44,"category":"生産管理","question":"「セットアップ時間」の短縮が重要である理由を述べよ。","explanation":"セットアップ時間短縮により：①ロットサイズの削減が可能②複数品種への対応柔軟性向上③リードタイム短縮④在庫削減⑤設備稼働率向上が実現。特にJIT生産やリーン生産で重視。","choices":["通勤客・通学客など歩行者通行量が多い","大型駐車場が確保できる","賃借料が安い","自動車アクセスが優位"],"correctIndex":0},{"id":45,"category":"店舗・販売管理","question":"テナント構成戦略における「キーテナント」（核店舗）の役割はどれか。","explanation":"キーテナント（核店舗）は集客力の強い有力店舗。百貨店、スーパー、映画館など。集客力により周辺テナントへの利益をもたらし、施設全体の成功を左右する。","choices":["来客数が多い集客力の強い店舗","利益率が最も高い店舗","営業面積が最大の店舗","新規開店したばかりの店舗"],"correctIndex":0},{"id":46,"category":"店舗・販売管理","question":"「回転率」と「利益率」の関係について述べよ。低利益率ビジネスの戦略は何か。","explanation":"利益＝売上×利益率。低利益率ビジネスは回転率を高める必要がある。戦略：①商品供給の高速化②顧客単価向上③運営コスト削減④規模拡大による固定費按分削減である。コンビニやスーパーはこの戦略を採用。","choices":["顧客が店舗内を移動する経路を設計する","商品の価格を決定する","店員数を決める","営業時間を決める"],"correctIndex":0},{"id":47,"category":"店舗・販売管理","question":"商品の「鮮度管理」が重要である業態を2つ列挙し、理由を述べよ。","explanation":"食品スーパー、鮮魚店、青果店など。理由：①商品劣化による品質低下②消費期限超過による販売不可③顧客からの信頼低下。FIFO原則の徹底と適切な温度管理が必須。","choices":["眼線から膝までの高さで視認性と手の届きやすさが優れた位置","入口に最も近い売場","最長滞在の売場","売上が最高の商品"],"correctIndex":0},{"id":48,"category":"店舗・販売管理","question":"店舗における「顧客接点」を最大化するための施策はどれか。","explanation":"顧客接点最大化は、店員配置、情報表示、セルフサービス、デジタル技術により実現される。","choices":["店員配置最適化、商品情報充実、セルフサービス活用、デジタル技術導入","営業時間の短縮","店員数の削減","商品数の減少"],"correctIndex":0},{"id":49,"category":"店舗・販売管理","question":"販売促進手法における「プルモーション」と「プッシモーション」の違いを説明せよ。","explanation":"プルモーション（引き）：顧客を直接刺激して購買意欲を引き出す。広告、店頭販売員、POP、試食など。プッシモーション（押し）：販売チャネルや仲介者に働きかけ、商品を流通させる。営業員、リベート、販売員教育など。","choices":["平均商品単価（商品ミックス）と売上高","商品の原価のみ","競合店の販売数量","従業員の販売技術"],"correctIndex":0},{"id":50,"category":"店舗・販売管理","question":"小売店における「レジ待ち時間」が長いことの問題点と改善施策を述べよ。","explanation":"問題点：顧客満足度低下、再来店低下。改善施策：①レジスターの台数増加②セルフレジ導入③キャッシュレス決済推進④処理効率化である。","choices":["品揃えの幅は商品カテゴリー数、奥行きはカテゴリー内バリエーション数","両者は同じ意味","幅は価格帯、奥行きはサイズ","幅は地域、奥行きは季節"],"correctIndex":0},{"id":51,"category":"生産管理","question":"QC統計における「n=1」サンプルでも管理図が使用できる理由を説明せよ。","explanation":"n=1の場合、移動範囲（変動幅）を利用する。連続した2つのデータの差分を求め、その移動平均を基準に管理限界を設定。これにより、少量生産やロット生産での品質監視が可能。","choices":["商品売上、顧客購買パターン、在庫、販売動向分析","従業員の勤務評価のみ","建築面積の決定","賃借料の交渉"],"correctIndex":0},{"id":52,"category":"生産管理","question":"「生産計画と在庫計画の連携」が重要である理由を述べよ。","explanation":"両者の連携により：①需要変動への適切な対応②過剰在庫の防止③品切れリスクの軽減④資金効率の向上⑤生産効率と物流効率の同時向上。需要予測を基軸に両計画を同期させることが重要。","choices":["入力ミス削減、レジ処理高速化、正確な販売データ","商品価格の自動上昇","顧客の購買強制","従業員数の削減のみ"],"correctIndex":0},{"id":53,"category":"生産管理","question":"トレーサビリティシステムの導入目的として正しいものはどれか。","explanation":"トレーサビリティは、製品が原材料から製造、流通、販売を経て消費者に至る全過程を追跡可能にする仕組み。品質問題発生時の原因究明が可能である。","choices":["製品の原料から消費者まで追跡可能な仕組み構築","従業員の行動監視","価格決定の根拠作成","市場規模の推定"],"correctIndex":0},{"id":54,"category":"生産管理","question":"\"ムリ\"\"ムダ\"\"ムラ\"のいわゆる「3ムの排除」について説明せよ。","explanation":"ムリ（無理）：過度な負荷、非現実的なスケジュール。ムダ（無駄）：付加価値のない作業、在庫、工程。ムラ（不均衡）：品質変動、負荷の偏り。これら3つを排除することで、安全性・品質・効率の向上を実現。","choices":["注文・納品・請求などの事務処理の自動化","商品品質の向上","販売価格の決定","従業員教育が不要"],"correctIndex":0},{"id":55,"category":"生産管理","question":"自働化（自動化ではなく）の考え方を説明せよ。","explanation":"自働化：異常検知時に自動停止し、人による対応を促す仕組み。ただの自動化は異常を検知せずに継続するため不良を量産する可能性。自働化は人と機械の最適な役割分担を実現。","choices":["商品の時間的ズレを調整する（保管）と付加価値を付与する（加工）","同じ機能","相反する機能","流通コストを削減"],"correctIndex":0},{"id":56,"category":"生産管理","question":"ISO9001とTQM（総合品質管理）の関係を説明せよ。","explanation":"ISO9001は品質マネジメントシステムの国際規格で、最低限の要件を定義。TQMは経営理念として全員参加で継続的改善を目指す上位概念。ISO取得がゴールではなく、TQM活動による優位性構築が重要。","choices":["売上減少、物流コスト増加、信頼低下を防ぐ","顧客を満足させる","利益を最大化する","在庫を削減する"],"correctIndex":0},{"id":57,"category":"生産管理","question":"製造業における「外注化」の意思決定基準として重要な要因を述べよ。","explanation":"外注化判断基準：①原価比較（自製か外注か）②品質能力③納期対応力④技術機密性⑤資本投資の必要性⑥生産変動への対応である。戦略的重要性と経済性を勘案。","choices":["核店舗による集客、テナント間の相乗効果、流動性","各店舗の独立性","競争関係","価格競争"],"correctIndex":0},{"id":58,"category":"生産管理","question":"「設備評価」における「稼働率」と「効率」の定義と相違を説明せよ。","explanation":"稼働率：実際の稼働時間÷計画稼働時間。設備がどのくらい動いているか。効率：実際の処理量÷標準処理量。設備が計画通りのペースで動いているか。両者は独立しており、両方が高い必要がある。","choices":["大規模小売店舗法廃止、都市計画法改正、中心市街地活性化法","消費税増税","最低賃金上昇","環境規制のみ"],"correctIndex":0},{"id":59,"category":"生産管理","question":"サプライヤー選定での「複数業者取引」のメリットを述べよ。","explanation":"複数業者取引のメリット：①供給リスクの分散②価格競争による低減③品質・納期競争による向上④技術情報の多元化⑤交渉力の強化である。一方、管理コストと情報流出リスクが課題。","choices":["セル生産またはジョブショップ方式","ライン生産方式","ロット生産方式","連続生産方式"],"correctIndex":0},{"id":60,"category":"生産管理","question":"統計的管理における「限界サンプル」と「群別データ」の違いを説明せよ。","explanation":"限界サンプル：連続した1個の製品。群別データ：一定条件下で採取した複数個の平均値。管理図では群別データ（小群）を用いることで、工程の本質的な変化を検出しやすくなり、偽警報を削減。","choices":["全体の生産能力を制限する工程、能力向上で対応","最も利益が高い工程","最初の工程","検査工程"],"correctIndex":0},{"id":61,"category":"店舗・販売管理","question":"「顧客満足度調査」の目的と活用方法を説明せよ。","explanation":"目的：顧客ニーズの把握、サービス水準の評価、改善課題の抽出。活用方法：①経営施策の優先順位決定②従業員教育の方向性③顧客ロイヤルティの向上。継続的実施でPDCA回転につながる。","choices":null,"correctAnswer":"目的：顧客ニーズの把握、サービス水準の評価、改善課題の抽出。活用方法：①経営施策の優先順位決定②従業員教育の方向性③顧客ロイヤルティの向上。継続的実施でPDCA回転につながる。"},{"id":62,"category":"店舗・販売管理","question":"\"クロスメーチャンダイジング\"とは何か。その効果を述べよ。","explanation":"クロスメーチャンダイジングは、複数の商品カテゴリーを組み合わせて売場を構成する手法。効果：①客単価向上②買い回り率向上③顧客の買物時間延長④販売効率向上である。","choices":null,"correctAnswer":"クロスメーチャンダイジングは、複数の商品カテゴリーを組み合わせて売場を構成する手法。効果：①客単価向上②買い回り率向上③顧客の買物時間延長④販売効率向上である。"},{"id":63,"category":"店舗・販売管理","question":"\"品揃え戦略\"における\"欠品\"の影響と対策を述べよ。","explanation":"欠品の影響：売上損失、顧客満足度低下、競合店への流出。対策：①在庫管理システムの導入②売れ筋商品の予測と確保③サプライヤーとの納期協力④複数の仕入先確保である。","choices":null,"correctAnswer":"欠品の影響：売上損失、顧客満足度低下、競合店への流出。対策：①在庫管理システムの導入②売れ筋商品の予測と確保③サプライヤーとの納期協力④複数の仕入先確保である。"},{"id":64,"category":"店舗・販売管理","question":"オムニチャネル戦略とは何か。従来の小売業との違いを説明せよ。","explanation":"オムニチャネルは、実店舗、EC、スマートフォンなど複数チャネルを統合して顧客に一貫したサービスを提供。従来：チャネル独立。オムニチャネル：チャネル連携で在庫共通化、会員情報統一、配送柔軟化を実現。","choices":null,"correctAnswer":"オムニチャネルは、実店舗、EC、スマートフォンなど複数チャネルを統合して顧客に一貫したサービスを提供。従来：チャネル独立。オムニチャネル：チャネル連携で在庫共通化、会員情報統一、配送柔軟化を実現。"},{"id":65,"category":"店舗・販売管理","question":"小売店における\"内部環境分析\"の重要な項目を列挙せよ。","explanation":"内部環境分析項目：①経営資源（人材、資本、情報）②組織体制と文化③店舗施設と設備④システムと技術⑤顧客基盤と顧客満足度⑥商品仕入力と売場管理能力である。","choices":null,"correctAnswer":"内部環境分析項目：①経営資源（人材、資本、情報）②組織体制と文化③店舗施設と設備④システムと技術⑤顧客基盤と顧客満足度⑥商品仕入力と売場管理能力である。"},{"id":66,"category":"生産管理","question":"生産方式における\"流れ型レイアウト\"と\"機能別レイアウト\"の選択基準を述べよ。","explanation":"流れ型：単品種大量生産→搬送効率、リードタイム短。機能別：多品種少量→柔軟性高、リードタイム長。製品特性、生産量、多様性度合いで判断。","choices":null,"correctAnswer":"流れ型：単品種大量生産→搬送効率、リードタイム短。機能別：多品種少量→柔軟性高、リードタイム長。製品特性、生産量、多様性度合いで判断。"},{"id":67,"category":"生産管理","question":"工程管理における\"ガントチャート\"の利点と限界を説明せよ。","explanation":"利点：視覚的に工程進捗を把握、日程計画の立案が容易。限界：複雑な依存関係の表現が難しい、日程遅延時の余裕時間把握が不十分。クリティカルパス法（CPM）で補完。","choices":null,"correctAnswer":"利点：視覚的に工程進捗を把握、日程計画の立案が容易。限界：複雑な依存関係の表現が難しい、日程遅延時の余裕時間把握が不十分。クリティカルパス法（CPM）で補完。"},{"id":68,"category":"生産管理","question":"品質管理における\"ポカヨケ\"（誤り防止）の概念を説明し、実例を述べよ。","explanation":"ポカヨケは、誤りが人間の不注意で起こることを想定し、設計・工程に物理的制約を設け誤りを防ぐ。実例：部品の形状を非対称にして嵌合ミスを防止、バーコード照合で誤配件の防止など。","choices":null,"correctAnswer":"ポカヨケは、誤りが人間の不注意で起こることを想定し、設計・工程に物理的制約を設け誤りを防ぐ。実例：部品の形状を非対称にして嵌合ミスを防止、バーコード照合で誤配件の防止など。"},{"id":69,"category":"生産管理","question":"原価管理における\"標準原価\"と\"実績原価\"の関係を説明し、差異分析の目的を述べよ。","explanation":"標準原価：事前に設定した目標原価。実績原価：実際に要した原価。差異＝実績−標準。分析目的：①差異の原因究明②工程改善への示唆③経営管理の精度向上である。","choices":null,"correctAnswer":"標準原価：事前に設定した目標原価。実績原価：実際に要した原価。差異＝実績−標準。分析目的：①差異の原因究明②工程改善への示唆③経営管理の精度向上である。"},{"id":70,"category":"生産管理","question":"リーン生産の本質と導入効果について述べよ。","explanation":"本質：ムダ（無駄）の徹底排除で、最小限の資源で最大の価値を生み出す。効果：①総リードタイム短縮②在庫削減③品質向上④コスト低減⑤顧客対応力向上。トヨタ生産方式が原点。","choices":null,"correctAnswer":"本質：ムダ（無駄）の徹底排除で、最小限の資源で最大の価値を生み出す。効果：①総リードタイム短縮②在庫削減③品質向上④コスト低減⑤顧客対応力向上。トヨタ生産方式が原点。"},{"id":71,"category":"店舗・販売管理","question":"\"ニーズの段階\"（顧客ニーズの多層性）を説明し、活用例を述べよ。","explanation":"ニーズ段階：①機能的ニーズ②心理的ニーズ③社会的ニーズ。活用例：衣料品売場で機能→デザイン→ブランドで複層的価値提供。","choices":null,"correctAnswer":"ニーズ段階：①機能的ニーズ②心理的ニーズ③社会的ニーズ。活用例：衣料品売場で機能→デザイン→ブランドで複層的価値提供。"},{"id":72,"category":"店舗・販売管理","question":"商品供給チェーンにおける\"在庫の適正化\"と\"流動性\"の関係を説明せよ。","explanation":"在庫最適化：必要在庫レベルの決定。流動性：在庫の回転速度。両立：①売れ筋の流動性向上②低速商品の削減③品揃えの最適化④季節変動への対応で、総在庫削減と売上維持を同時実現。","choices":null,"correctAnswer":"在庫最適化：必要在庫レベルの決定。流動性：在庫の回転速度。両立：①売れ筋の流動性向上②低速商品の削減③品揃えの最適化④季節変動への対応で、総在庫削減と売上維持を同時実現。"},{"id":73,"category":"店舗・販売管理","question":"\"フランチャイズシステム\"の本部と加盟店の利益相反関係を説明し、対策を述べよ。","explanation":"相反関係：本部はロイヤリティ最大化、加盟店は利益最大化を目指す。対策：①透明な契約条件②適切なサポート体制③情報共有④経営支援で、長期的ウィン・ウィン関係構築。","choices":null,"correctAnswer":"相反関係：本部はロイヤリティ最大化、加盟店は利益最大化を目指す。対策：①透明な契約条件②適切なサポート体制③情報共有④経営支援で、長期的ウィン・ウィン関係構築。"},{"id":74,"category":"生産管理","question":"調達リードタイムが長い場合の対策として考えられるものはどれか。","explanation":"長期リードタイムへの対策：①事前受注制度②安全在庫増加③多元化④近地のサプライヤー開拓⑤協力による短縮である。","choices":["事前受注制度導入、安全在庫増加、サプライヤー多元化、近い仕入先開拓","納期延長","在庫ゼロ化","生産停止"],"correctIndex":0},{"id":75,"category":"生産管理","question":"生産計画における\"需要予測\"の誤差がもたらす負の影響を述べよ。","explanation":"過剰予測：過剰生産→余剰在庫→資金圧迫→廃棄損。過少予測：品切れ→売上損失→顧客流出。その他、サプライヤー対応混乱、稼働率低下、人員配置非効率。予測精度向上が重要。","choices":null,"correctAnswer":"過剰予測：過剰生産→余剰在庫→資金圧迫→廃棄損。過少予測：品切れ→売上損失→顧客流出。その他、サプライヤー対応混乱、稼働率低下、人員配置非効率。予測精度向上が重要。"},{"id":76,"category":"生産管理","question":"\"レイバー・ホービング\"とは何か。計画的配置の考え方を説明せよ。","explanation":"レイバー・ホービングは、生産量の変動に合わせて労働力を柔軟に調整する。パート・派遣活用で固定費圧低減。考え方：①予測売上に基づく人員計画②変動費化で損益分岐点低下③雇用安定性とのバランス。","choices":null,"correctAnswer":"レイバー・ホービングは、生産量の変動に合わせて労働力を柔軟に調整する。パート・派遣活用で固定費圧低減。考え方：①予測売上に基づく人員計画②変動費化で損益分岐点低下③雇用安定性とのバランス。"},{"id":77,"category":"生産管理","question":"品質不良が発生した場合に発生する\"コスト\"として適切なものはどれか。","explanation":"品質コスト体系：①予防コスト（品質管理活動）②鑑別コスト（検査費）③内部失敗コスト（不良品処理）④外部失敗コスト（クレーム対応、返品）。","choices":["予防コスト、鑑別コスト、内部失敗コスト、外部失敗コスト","販売コストのみ","輸送費のみ","広告費のみ"],"correctIndex":0},{"id":78,"category":"生産管理","question":"著しい季節変動がある製品の生産計画における課題と対策を述べよ。","explanation":"課題：ピーク期の能力不足、オフシーズンの過剰能力。対策：①平準化生産②製品多角化③外注活用④労働力調整⑤在庫戦略である。","choices":null,"correctAnswer":"課題：ピーク期の能力不足、オフシーズンの過剰能力。対策：①平準化生産②製品多角化③外注活用④労働力調整⑤在庫戦略である。"},{"id":79,"category":"店舗・販売管理","question":"食品小売業における\"食品ロス\"削減のための施策を述べよ。","explanation":"食品ロス削減施策：①需要予測精度向上②在庫管理システム導入③値下げ販売④調理食品の数量最適化⑤顧客教育である。持続可能性観点でも重要。","choices":null,"correctAnswer":"食品ロス削減施策：①需要予測精度向上②在庫管理システム導入③値下げ販売④調理食品の数量最適化⑤顧客教育である。持続可能性観点でも重要。"},{"id":80,"category":"店舗・販売管理","question":"\"カテゴリー管理\"（CME）とは何か。従来の商品管理との違いを説明せよ。","explanation":"カテゴリー管理は、商品を機能グループでまとめ、グループ単位で需給管理と利益管理を統合。従来：商品個別管理。CME：顧客視点での商品グループ化で、品揃えと在庫最適化が向上。","choices":null,"correctAnswer":"カテゴリー管理は、商品を機能グループでまとめ、グループ単位で需給管理と利益管理を統合。従来：商品個別管理。CME：顧客視点での商品グループ化で、品揃えと在庫最適化が向上。"},{"id":81,"category":"生産管理","question":"工程改善において\"5S活動\"が基盤とされる理由を説明せよ。","explanation":"5S活動（整理・整頓・清掃・清潔・躾）は生産性と品質の基盤。理由：①安全性確保②品質確保③効率向上④マインド形成⑤改善の入口である。","choices":null,"correctAnswer":"5S活動（整理・整頓・清掃・清潔・躾）は生産性と品質の基盤。理由：①安全性確保②品質確保③効率向上④マインド形成⑤改善の入口である。"},{"id":82,"category":"生産管理","question":"多工程を経由する生産システムで\"工程間バッファ\"（在庫）の役割を説明せよ。","explanation":"工程間バッファの役割：①工程間の時間的ズレ調整②前工程停止時の後工程稼働維持③不測事態への対応（納期維持）。最小化がJITで、完全ゼロは現実的困難。","choices":null,"correctAnswer":"工程間バッファの役割：①工程間の時間的ズレ調整②前工程停止時の後工程稼働維持③不測事態への対応（納期維持）。最小化がJITで、完全ゼロは現実的困難。"},{"id":83,"category":"生産管理","question":"\"原価企画\"と\"原価改善\"の相違を説明し、実施時期を述べよ。","explanation":"原価企画：製品企画・設計段階で目標原価を設定。時期：製品開発初期。原価改善：既存製品の原価削減。時期：製造・販売段階。前者は根本的削減、後者は漸進的改善。","choices":null,"correctAnswer":"原価企画：製品企画・設計段階で目標原価を設定。時期：製品開発初期。原価改善：既存製品の原価削減。時期：製造・販売段階。前者は根本的削減、後者は漸進的改善。"},{"id":84,"category":"生産管理","question":"工場の\"立地選定\"で考慮すべき重要な立地要因はどれか。","explanation":"立地要因：①市場への近接性②労働力の確保③原材料・部品の入手④インフラ整備⑤環境規制対応などを総合的に判断。","choices":["市場へのアクセス、労働力確保、原材料入手、インフラ整備","建築コストのみ","従業員の住宅地","観光地であること"],"correctIndex":0},{"id":85,"category":"店舗・販売管理","question":"小売店における\"人員配置計画\"の不適切さが招く問題を述べよ。","explanation":"問題：①ピーク時の人手不足（接客品質低下）②オフピーク時の過剰人員（人件費増加）③従業員疲弊（離職率上昇）④顧客待ち時間増加である。データに基づく柔軟な配置が重要。","choices":null,"correctAnswer":"問題：①ピーク時の人手不足（接客品質低下）②オフピーク時の過剰人員（人件費増加）③従業員疲弊（離職率上昇）④顧客待ち時間増加である。データに基づく柔軟な配置が重要。"},{"id":86,"category":"生産管理","question":"\"スケジュール競争\"（Schedule Competition）の考え方を説明せよ。","explanation":"スケジュール競争は、納期短縮を企業の競争優位性として位置付ける戦略。リードタイム短縮により、顧客需要への迅速対応が可能。多品種少量・短期トレンド対応市場では重要な競争軸。","choices":null,"correctAnswer":"スケジュール競争は、納期短縮を企業の競争優位性として位置付ける戦略。リードタイム短縮により、顧客需要への迅速対応が可能。多品種少量・短期トレンド対応市場では重要な競争軸。"},{"id":87,"category":"生産管理","question":"サプライヤーへの\"品質改善支援\"の活動内容を述べよ。","explanation":"支援活動：①不良情報フィードバック②改善提案の共有③技術者派遣④講習・教育⑤標準化促進⑥共同改善プロジェクト。下請け先育成による総合競争力向上。","choices":null,"correctAnswer":"支援活動：①不良情報フィードバック②改善提案の共有③技術者派遣④講習・教育⑤標準化促進⑥共同改善プロジェクト。下請け先育成による総合競争力向上。"},{"id":88,"category":"店舗・販売管理","question":"\"顧客満足度\"と\"顧客ロイヤルティ\"の相違を説明せよ。","explanation":"顧客満足度：購買時の期待と実績の比較。一度的。ロイヤルティ：継続購買意図と推奨意思。関係性。高い満足度でもロイヤルティが低い場合あり。感動的経験でロイヤルティ構築。","choices":null,"correctAnswer":"顧客満足度：購買時の期待と実績の比較。一度的。ロイヤルティ：継続購買意図と推奨意思。関係性。高い満足度でもロイヤルティが低い場合あり。感動的経験でロイヤルティ構築。"},{"id":89,"category":"生産管理","question":"生産ラインにおいて\"ラインバランシング\"を図る目的を説明せよ。","explanation":"ラインバランシング目的：各工程の稼働時間を均等化し、全体の生産効率を最大化する。バランスが悪いと、ボトルネック工程で全体が制限される。均等化により、待ち時間削減とスループット向上。","choices":null,"correctAnswer":"ラインバランシング目的：各工程の稼働時間を均等化し、全体の生産効率を最大化する。バランスが悪いと、ボトルネック工程で全体が制限される。均等化により、待ち時間削減とスループット向上。"},{"id":90,"category":"生産管理","question":"\"多能工化\"（多機能化）の推進が重要である理由を述べよ。","explanation":"多能工化の理由：①生産ラインの柔軟性向上②人員配置の最適化③職業適性拡大④生産変動への迅速対応⑤作業者の成長機会拡大である。教育投資が必要。","choices":null,"correctAnswer":"多能工化の理由：①生産ラインの柔軟性向上②人員配置の最適化③職業適性拡大④生産変動への迅速対応⑤作業者の成長機会拡大である。教育投資が必要。"},{"id":91,"category":"店舗・販売管理","question":"\"セルフ・サービス\"方式採用の顧客メリットと店舗メリットを述べよ。","explanation":"顧客メリット：価格低廉、迅速購買、自由な選択。店舗メリット：人件費削減、高回転率実現、顧客接触増加。課題：盗難リスク、商品表示充実、信頼醸成。","choices":null,"correctAnswer":"顧客メリット：価格低廉、迅速購買、自由な選択。店舗メリット：人件費削減、高回転率実現、顧客接触増加。課題：盗難リスク、商品表示充実、信頼醸成。"},{"id":92,"category":"生産管理","question":"品質管理における\"ばらつき\"の源泉と対応方法を述べよ。","explanation":"ばらつきの源泉：①人（技能差）→教育・標準化②材料（品質差）→サプライヤー管理③機械（設定ズレ）→定期調整④環境（温湿度）→管理強化。統計的監視で対応。","choices":null,"correctAnswer":"ばらつきの源泉：①人（技能差）→教育・標準化②材料（品質差）→サプライヤー管理③機械（設定ズレ）→定期調整④環境（温湿度）→管理強化。統計的監視で対応。"},{"id":93,"category":"生産管理","question":"下請け企業の\"受注多様化\"の利点と課題を述べよ。","explanation":"利点：経営リスク低減、稼働率向上、技術多角化。課題：設備多様化のコスト、ノウハウ分散、品質管理複雑化。戦略的選択が重要。","choices":null,"correctAnswer":"利点：経営リスク低減、稼働率向上、技術多角化。課題：設備多様化のコスト、ノウハウ分散、品質管理複雑化。戦略的選択が重要。"},{"id":94,"category":"店舗・販売管理","question":"アパレル小売業の\"シーズン管理''の重要性と留意点を述べよ。","explanation":"重要性：流行・季節に対応した品揃えで売上最大化。留意点：①予測精度（外れると過剰在庫）②期中修正柔軟性③終盤値下げ戦略④来年ノウハウ活用。在庫リスク管理が課題。","choices":null,"correctAnswer":"重要性：流行・季節に対応した品揃えで売上最大化。留意点：①予測精度（外れると過剰在庫）②期中修正柔軟性③終盤値下げ戦略④来年ノウハウ活用。在庫リスク管理が課題。"},{"id":95,"category":"生産管理","question":"提案型販売における\"営業情報システム''の活用が重要な理由を述べよ。","explanation":"重要性：①顧客ニーズ把握と提案精度向上②営業活動の見える化③営業員間の情報共有④顧客との信頼構築⑤施策の最適化。営業担当者の効率化と組織的取り組み実現。","choices":null,"correctAnswer":"重要性：①顧客ニーズ把握と提案精度向上②営業活動の見える化③営業員間の情報共有④顧客との信頼構築⑤施策の最適化。営業担当者の効率化と組織的取り組み実現。"},{"id":96,"category":"生産管理","question":"工程能力が不足する場合の\"短期対策\"と\"長期対策''を述べよ。","explanation":"短期対策：外注活用、残業実施、緊急設備導入。長期対策：設備投資、技術改善、生産方式転換。短期は費用増加・品質リスク、長期は投資精査が必要。","choices":null,"correctAnswer":"短期対策：外注活用、残業実施、緊急設備導入。長期対策：設備投資、技術改善、生産方式転換。短期は費用増加・品質リスク、長期は投資精査が必要。"},{"id":97,"category":"店舗・販売管理","question":"新規出店の\"事前調査''に含めるべき重要項目を述べよ。","explanation":"事前調査項目：①商圏分析②競合店調査③交通アクセス④駐車場利便性⑤周辺施設⑥店舗規模・費用⑦顧客属性マッチング。定量・定性両面での分析必須。","choices":null,"correctAnswer":"事前調査項目：①商圏分析②競合店調査③交通アクセス④駐車場利便性⑤周辺施設⑥店舗規模・費用⑦顧客属性マッチング。定量・定性両面での分析必須。"},{"id":98,"category":"生産管理","question":"カイゼン活動（継続的改善）が定着するための条件を述べよ。","explanation":"定着条件：①経営トップのコミットメント②全従業員参加③改善提案の迅速実行④成果の見える化⑤水平展開⑥教育・訓練体制。企業文化としての浸透が重要。","choices":null,"correctAnswer":"定着条件：①経営トップのコミットメント②全従業員参加③改善提案の迅速実行④成果の見える化⑤水平展開⑥教育・訓練体制。企業文化としての浸透が重要。"},{"id":99,"category":"生産管理","question":"原材料費が急騰した場合の経営対応として考えられる施策を述べよ。","explanation":"対応施策：①価格転嫁②代替材料検討③製品設計変更④生産効率化⑤サプライヤー交渉⑥在庫調整⑦ヘッジ取引。複合的対応で経営影響を最小化。","choices":null,"correctAnswer":"対応施策：①価格転嫁②代替材料検討③製品設計変更④生産効率化⑤サプライヤー交渉⑥在庫調整⑦ヘッジ取引。複合的対応で経営影響を最小化。"},{"id":100,"category":"店舗・販売管理","question":"既存店舗における''売上停滞''の原因診断フレームワークを述べよ。","explanation":"診断フレームワーク：①客数減→立地強化、差別化②客単価減→商品構成見直し、サービス強化③買い回り率低下→動線改善④非来店顧客層→マーケティング施策。データ分析が基本。","choices":null,"correctAnswer":"診断フレームワーク：①客数減→立地強化、差別化②客単価減→商品構成見直し、サービス強化③買い回り率低下→動線改善④非来店顧客層→マーケティング施策。データ分析が基本。"},{"id":101,"category":"生産管理","question":"サービス業における\"品質管理\"の特性（製造業との相違）を述べよ。","explanation":"相違点：①無形性（見えない品質）②消費の同時性③従業員の影響大④顧客参加⑤ばらつき大。組織的標準化と従業員教育が必須。","choices":null,"correctAnswer":"相違点：①無形性（見えない品質）②消費の同時性③従業員の影響大④顧客参加⑤ばらつき大。組織的標準化と従業員教育が必須。"},{"id":102,"category":"生産管理","question":"設備管理における\"予防保全''と''予知保全''の相違を説明せよ。","explanation":"予防保全：使用時間等の経過で計画的に保全。予知保全：振動、温度、異音など異常の兆候を検知して保全。予知保全がより効率的で高度。IoTセンサー活用で両立も可能。","choices":null,"correctAnswer":"予防保全：使用時間等の経過で計画的に保全。予知保全：振動、温度、異音など異常の兆候を検知して保全。予知保全がより効率的で高度。IoTセンサー活用で両立も可能。"},{"id":103,"category":"店舗・販売管理","question":"快適な店舗環境を実現する''店舗施設管理''の重要項目を述べよ。","explanation":"重要項目：①温度・湿度②照明③空気環境④音環境⑤清潔維持⑥安全確保。顧客体験に直結。","choices":null,"correctAnswer":"重要項目：①温度・湿度②照明③空気環境④音環境⑤清潔維持⑥安全確保。顧客体験に直結。"},{"id":104,"category":"生産管理","question":"製造業における\"環境配慮''（ISO14001等）の経営メリットを述べよ。","explanation":"メリット：①規制対応②ブランド価値向上③顧客・投資家評価向上④廃棄物削減による原価低減⑤従業員のプライド⑥新規市場開拓。社会貢献と経営効率の同立。","choices":null,"correctAnswer":"メリット：①規制対応②ブランド価値向上③顧客・投資家評価向上④廃棄物削減による原価低減⑤従業員のプライド⑥新規市場開拓。社会貢献と経営効率の同立。"},{"id":105,"category":"店舗・販売管理","question":"小売業における\"DX（デジタルトランスフォーメーション）''の実装例を述べよ。","explanation":"実装例：①セルフレジ・キャッシュレス決済②POSデータ分析③在庫管理システム④顧客アプリ⑤AR試着。業務効率化と顧客体験向上を実現。","choices":null,"correctAnswer":"実装例：①セルフレジ・キャッシュレス決済②POSデータ分析③在庫管理システム④顧客アプリ⑤AR試着。業務効率化と顧客体験向上を実現。"}],"houmu":[{"id":1,"category":"会社法","question":"株式会社の最少人数要件は次のうちどれか。","explanation":"会社法改正により、株式会社の設立には発起人1名以上で足り、株主1名でも設立可能です。取締役は1名以上であれば足りるため、株主1名以上が正解です。","choices":["発起人1名以上","発起人3名以上","株主1名以上","取締役3名以上"],"correctIndex":2},{"id":2,"category":"会社法","question":"取締役の任期は次のうちどれか。","explanation":"会社法329条により、取締役の任期は選任後2年以内に終了する事業年度のうち最終のものに関する定時株主総会の終結の時までとされています。","choices":["2年以内","3年以内","4年以内","5年以内"],"correctIndex":0},{"id":3,"category":"会社法","question":"監査役の任期は次のうちどれか。","explanation":"会社法338条により、監査役の任期は選任後4年以内に終了する事業年度のうち最終のものに関する定時株主総会の終結の時までとされています。","choices":["2年以内","3年以内","4年以内","6年以内"],"correctIndex":2},{"id":4,"category":"会社法","question":"株式会社の機関設計として、必ず設置しなければならない機関はどれか。","explanation":"会社法326条により、株式会社は株主総会と取締役を必ず置かなければなりません。取締役会や監査役の設置は法律で強制されていません。","choices":["株主総会と取締役会","株主総会と監査役","株主総会と取締役","取締役会と監査役"],"correctIndex":2},{"id":5,"category":"会社法","question":"定時株主総会の招集通知は、総会開催日の何日前までに発送する必要があるか。","explanation":"会社法299条第1項により、定時株主総会の招集通知は総会開催日の2週間前までに発送する必要があります。","choices":["3日前","5日前","2週間前","10日前"],"correctIndex":2},{"id":6,"category":"会社法","question":"株式会社の設立時における最低資本金は次のうちどれか。","explanation":"会社法改正により、株式会社設立時の最低資本金要件は廃止されました。1円以上であれば設立可能です。","choices":["100万円","300万円","1,000万円","制限なし"],"correctIndex":3},{"id":7,"category":"会社法","question":"株式会社の合併において、消滅会社の債権者は次のうちどのような権利を有するか。","explanation":"会社法447条により、消滅会社の権利義務は当然に存続会社に承継されます。債権者は存続会社に対して権利を行使できます。","choices":["合併の無効を請求できる","債権者異議手続の対象外","存続会社に対して権利義務を主張できる","原則として分割払いを要求できる"],"correctIndex":2},{"id":8,"category":"会社法","question":"株式会社の事業譲渡において、譲渡会社の債務は原則としてどのように扱われるか。","explanation":"事業譲渡は資産の譲渡であり、債務は原則として譲渡会社に留まります。これは合併と異なり、具体的な合意が必要です。","choices":["譲受会社が当然に承継する","譲渡会社に留まり承継しない","双方の合意により決定される","裁判所の判断により決定される"],"correctIndex":1},{"id":9,"category":"会社法","question":"株主代理訴訟とは何か。次のうち正しい説明はどれか。","explanation":"株主代理訴訟は、会社法360条に基づき、株主が会社に代わり、主として取締役の違法行為による会社の損害を賠償させるための訴訟です。","choices":["株主が株式会社に代わり、第三者に対して訴訟を提起する","株主が株式会社に代わり、取締役に対して損害賠償請求を行う","複数の株主が共同して訴訟を提起する","株主総会で選任された代理人が訴訟を提起する"],"correctIndex":1},{"id":10,"category":"会社法","question":"会社分割における「新設分割」と「吸収分割」の最大の違いは何か。","explanation":"新設分割は新しい会社を設立して業務を承継させ、吸収分割は既存の会社に業務を承継させます。新設分割では新会社が設立されることが本質的な違いです。","choices":["新設分割のみ債権者異議手続が必要","吸収分割では既存の会社に業務が承継される","新設分割のみ株式会社を設立する","吸収分割ではより多くの資産を移転できる"],"correctIndex":2},{"id":11,"category":"会社法","question":"取締役会の決議において、法定の定足数の人数は取締役の総数の何分の何以上か。","explanation":"会社法368条第1項により、取締役会の決議は取締役の総数の2分の1以上が出席し、その過半数で決するとされています。","choices":["2分の1以上","3分の1以上","3分の2以上","4分の3以上"],"correctIndex":0},{"id":12,"category":"会社法","question":"監査役が取締役の違法行為を発見した場合、どのような対応が義務付けられているか。","explanation":"会社法360条により、監査役は違法行為を発見した場合、その旨を株主総会に報告しなければなりません。また、不当な行為による損害の防止のため、差し止め請求もできます。","choices":["直ちに警察に通報する","株主総会でのみ報告する","株主総会に報告し、違法行為があれば差し止めることができる","取締役に直接警告するのみ"],"correctIndex":2},{"id":13,"category":"会社法","question":"会社設立時の発起人による払い込みに関する説明として正しいものはどれか。","explanation":"会社法645条により、発起人は定款で定める発起人引受株式の全部について、その発行価格を払い込まなければなりません。","choices":["全額を発起人が払い込まなければならない","一部のみ払い込むことでよい","設立登記後に払い込めばよい","指定された額を各発起人が払い込む"],"correctIndex":0},{"id":14,"category":"会社法","question":"株式の譲渡に関する説明として正しいものはどれか。","explanation":"会社法107条により、非公開会社は定款で株式の譲渡を制限することができます。定款が所有者や会社の承認を譲渡条件とすることが一般的です。","choices":["非公開会社では定款により譲渡を制限できない","公開会社では全ての株式譲渡が制限される","非公開会社では定款により譲渡を制限できる","全ての株式会社で譲渡は自由である"],"correctIndex":2},{"id":15,"category":"会社法","question":"取締役の業務執行と取締役会の権限に関する説明として正しいものはどれか。","explanation":"会社法363条により、取締役会設置会社では、取締役会が経営に関する重要事項を決定し、業務の執行を監督します。","choices":["取締役会は全ての取締役の行為を承認する権限はない","取締役会設置会社では各取締役が業務執行の決定権を持つ","取締役会設置会社では取締役会が業務執行の決定をする","取締役会はあくまで監督機関であり執行はしない"],"correctIndex":2},{"id":16,"category":"知的財産権","question":"特許権の保護期間は出願日からおおよそ何年か。","explanation":"特許法67条により、特許権の存続期間は出願日から20年とされています。この期間は中小企業診断士試験での重要な数値です。","choices":["5年","10年","20年","25年"],"correctIndex":2},{"id":17,"category":"知的財産権","question":"実用新案権の保護期間は登録日からおおよそ何年か。","explanation":"実用新案法15条により、実用新案権の存続期間は登録日から10年とされています。特許権より短い保護期間です。","choices":["3年","10年","6年","20年"],"correctIndex":1},{"id":18,"category":"知的財産権","question":"意匠権の保護期間は登録日からおおよそ何年か。","explanation":"意匠法21条により、意匠権の存続期間は登録日から15年とされています。","choices":["5年","15年","10年","20年"],"correctIndex":1},{"id":19,"category":"知的財産権","question":"商標権の保護期間は登録日からおおよそ何年か。","explanation":"商標法19条により、商標権の存続期間は登録日から10年です。ただし、更新登録により無期限に延長できます。","choices":["5年","10年","20年","無制限"],"correctIndex":1},{"id":20,"category":"知的財産権","question":"著作権の保護期間は次のうちどれか。","explanation":"著作権法51条により、著作権は著作者の死後70年間保護されます。この改正は2018年の法改正によるものです。","choices":["著作者の死後20年","著作者の死後30年","著作者の死後50年","著作者の死後70年"],"correctIndex":3},{"id":21,"category":"知的財産権","question":"特許出願の際、出願から審査請求までの期間は次のうちどれか。","explanation":"特許法48条により、出願人は出願日から3年以内に審査請求をしなければなりません。この期間内に請求がなければ出願は取り下げられたとみなされます。","choices":["1年以内","2年以内","3年以内","5年以内"],"correctIndex":2},{"id":22,"category":"知的財産権","question":"不正競争防止法における営業秘密の保護要件として正しいものはどれか。","explanation":"不正競争防止法2条6項により、営業秘密は秘密として管理されている情報であり、相応の経済的価値を有することが必要です。","choices":["非公知であれば足りる","独占的管理をされていることが必要","秘密として管理され、相応の経済的価値を有することが必要","登録をすることが必須"],"correctIndex":2},{"id":23,"category":"知的財産権","question":"パリ条約とは次のうちどれか。","explanation":"パリ条約は1883年に成立した工業所有権（特許、意匠、商標）の国際的保護を目的とする条約です。優先権制度も規定しています。","choices":["著作権の国際保護に関する条約","工業所有権の保護に関する国際条約","商標の相互保護に関する条約","特許の優先権に関する条約"],"correctIndex":1},{"id":24,"category":"知的財産権","question":"著作権の国際保護に関するベルン条約について正しい説明はどれか。","explanation":"ベルン条約は1886年に成立した条約で、加盟国の著作物に対し最小限度の保護を要求します。各国で異なる保護期間を認めています。","choices":["著作権の保護は各国で異なることを認める条約","加盟国の著作物に対し最小限度の保護を要求する条約","著作権は無期限に保護される条約","加盟国で同一の著作権保護期間を要求する条約"],"correctIndex":1},{"id":25,"category":"知的財産権","question":"特許発明の先使用権とは何か。","explanation":"特許法79条により、特許出願前から特許発明と同一の発明を実施していた者は、継続して実施できる権利（先使用権）を持ちます。","choices":["特許権者が権利行使できない権利","特許出願前から同じ発明を使用していた者が継続して使用できる権利","最初に特許出願した者が得られる権利","大学や研究機関が得られる特別な権利"],"correctIndex":1},{"id":26,"category":"民法・その他","question":"民法における契約の成立要件として正しいものはどれか。","explanation":"民法526条により、契約は申し込みと承諾の合意により成立します。書面や登録は不要（特定の契約を除く）です。","choices":["申し込みと承諾の合意があれば成立する","書面による合意が必ず必要","第三者の証人が必要","登録をすることが必須"],"correctIndex":0},{"id":27,"category":"民法・その他","question":"民法における不法行為とは何か。","explanation":"民法709条により、故意または過失により他人に損害を与えた者は、その損害を賠償する義務を負います。これが不法行為の定義です。","choices":["民法が禁止している全ての行為","故意または過失により他人に損害を与える違法行為","刑法に違反する行為","契約に違反する行為"],"correctIndex":1},{"id":28,"category":"民法・その他","question":"債権の消滅時効の一般的な期間は次のうちどれか。","explanation":"民法166条により、債権は5年間行使しない場合、消滅時効により消滅します。ただし一部に例外があります。","choices":["1年","2年","3年","5年"],"correctIndex":3},{"id":29,"category":"民法・その他","question":"売買契約における売主の責任として正しい説明はどれか。","explanation":"民法566条により、売却された動産が隠れた瑕疵を持つ場合、売主は瑕疵担保責任を負わなければなりません。","choices":["買主が使用して損害が生じた場合も責任を負う","瑕疵担保責任は契約で免責できない","引き渡した商品に隠れた瑕疵があれば責任を負う可能性がある","全ての契約で無条件に責任を負う"],"correctIndex":2},{"id":30,"category":"民法・その他","question":"消費者保護法における特定商取引法の適用対象外はどれか。","explanation":"特定商取引法は訪問販売、通信販売、電話勧誘販売などを規制しますが、一般的な店舗での購入は対象外です。","choices":["訪問販売","通信販売","電話勧誘販売","店舗での購入"],"correctIndex":3},{"id":31,"category":"民法・その他","question":"個人情報保護法における個人情報とは次のうちどれか。","explanation":"個人情報保護法2条により、個人情報は生存する個人に関する情報であって、特定の個人を識別できるものとされています。","choices":["法人の情報のみ","生存する個人に関する情報で、特定の個人を識別できるもの","全ての個人情報","企業内部の情報"],"correctIndex":1},{"id":32,"category":"民法・その他","question":"独占禁止法における不当な取引制限とは何か。","explanation":"独占禁止法3条により、複数の事業者が相互に価格や数量などを制限する合意を行うことを不当な取引制限として禁止しています。","choices":["企業が単独で価格を決定すること","複数の事業者が相互に取引を制限する契約のこと","政府が価格を規制すること","商品の流通を制限することのみ"],"correctIndex":1},{"id":33,"category":"民法・その他","question":"独占禁止法における私的独占とは何か。","explanation":"独占禁止法2条3項により、私的独占は事業者が単独に、または少数の事業者が相互に協力して行う競争妨害行為を指します。","choices":["複数の企業による協力行為","事業者が単独に競争相手の事業を妨害する行為","政府による価格規制","企業結合による市場支配"],"correctIndex":1},{"id":34,"category":"民法・その他","question":"不正競争防止法における商品等表示の無断使用に関する説明として正しいものはどれか。","explanation":"不正競争防止法2条1項により、他人の商品等表示と同一または混同を生じさせるような商品等表示の使用は不正競争として禁止されます。","choices":["全ての商品表示の使用は禁止される","他人の商品等表示と同一または混同を生じさせる表示の使用は禁止される","独自開発した表示は常に保護される","登録をしなければ保護されない"],"correctIndex":1},{"id":35,"category":"会社法","question":"株式会社の定款の記載事項として必須事項に含まれるものはどれか。","explanation":"会社法27条により、定款の絶対的記載事項は目的、商号、本店の所在地、設立に際して出資される財産の価額、発行する株式の総数などです。","choices":["役員の氏名のみ","目的、商号、本店の所在地、発行する株式の総数","取締役の給与額","監査役の任免手続"],"correctIndex":1},{"id":36,"category":"会社法","question":"募集株式の引受人に関する説明として正しいものはどれか。","explanation":"会社法202条により、募集株式の引受人は募集株式申込書により申し込みを行います。申し込み後、会社は株式の割当てを決定します。","choices":["必ず既存株主が引き受けなければならない","引受人は募集株式申込書により申し込みを行う","誰でも申し込めるが会社は不承認とできない","取締役会の同意なく引受人を決定できる"],"correctIndex":1},{"id":37,"category":"会社法","question":"公開会社と非公開会社の最大の違いは何か。","explanation":"会社法109条により、非公開会社は株式の譲渡について定款で承認条件を設けることができ、公開会社はそのような制限ができません。","choices":["従業員の数が異なる","株式の譲渡制限があるかないか","取締役会の設置義務の有無","資本金の多寡"],"correctIndex":1},{"id":38,"category":"会社法","question":"利益剰余金の配当に関する説明として正しいものはどれか。","explanation":"会社法454条により、利益剰余金の配当は株主総会の決議により決定されます。配当の義務や回数の制限はありません。","choices":["いかなる場合でも配当は禁止される","株主総会の決議により配当額を決定する","必ず毎年配当をしなければならない","取締役が単独で配当額を決定できる"],"correctIndex":1},{"id":39,"category":"会社法","question":"合同会社における有限責任社員に関する説明として正しいものはどれか。","explanation":"会社法577条により、合同会社は無限責任社員と有限責任社員の両方を置くことができます。有限責任社員は原則として業務執行権を持ちません。","choices":["全ての社員は無限責任を負う","無限責任社員と有限責任社員が混在できる","有限責任社員のみの構成は認められない","有限責任社員は業務執行権を持つ"],"correctIndex":1},{"id":40,"category":"会社法","question":"合併における対価の性質について正しい説明はどれか。","explanation":"会社法429条により、合併の対価は存続会社の株式、現金、その他の資産などで構成することができます。","choices":["必ず現金に限定される","存続会社の株式、現金、その他の資産で構成できる","新株引受権証のみが対価となる","対価は不要"],"correctIndex":1},{"id":41,"category":"会社法","question":"株式会社の設立手続きについて、発起人が行うべき主要な手続きを3つ説明してください。","explanation":"株式会社設立の主要な手続きは：①定款の作成・認証②発起人による出資金の払い込み③設立登記申請です。これらは会社法25条以下で規定されています。","choices":null,"correctAnswer":"株式会社設立の主要な手続きは：①定款の作成・認証②発起人による出資金の払い込み③設立登記申請です。これらは会社法25条以下で規定されています。"},{"id":42,"category":"会社法","question":"取締役の忠実義務と善管注意義務の違いについて説明してください。","explanation":"忠実義務（会社法355条）は取締役が会社の利益のために行動する義務であり、善管注意義務（会社法330条）は一般人としての注意を払う義務です。忠実義務の方がより厳格な義務です。","choices":null,"correctAnswer":"忠実義務（会社法355条）は取締役が会社の利益のために行動する義務であり、善管注意義務（会社法330条）は一般人としての注意を払う義務です。忠実義務の方がより厳格な義務です。"},{"id":43,"category":"会社法","question":"合併と事業譲渡の主な違いを説明してください。","explanation":"合併は法人格が統一される（消滅会社の権利義務が存続会社に自動承継）のに対し、事業譲渡は特定の資産を譲渡するもので、法人格は別個に存在し、債務は原則承継されません。","choices":null,"correctAnswer":"合併は法人格が統一される（消滅会社の権利義務が存続会社に自動承継）のに対し、事業譲渡は特定の資産を譲渡するもので、法人格は別個に存在し、債務は原則承継されません。"},{"id":44,"category":"会社法","question":"会社分割における分割対価として認められるものを列挙してください。","explanation":"新設分割の分割対価には、新設会社の株式、既存会社の株式、現金、その他の財産が認められます（会社法732条）。分割対価は分割契約で定めます。","choices":null,"correctAnswer":"新設分割の分割対価には、新設会社の株式、既存会社の株式、現金、その他の財産が認められます（会社法732条）。分割対価は分割契約で定めます。"},{"id":45,"category":"会社法","question":"株主総会における決議要件について、普通決議と特別決議の違いを説明してください。","explanation":"普通決議（会社法341条）は定足数が議決権を有する株主の3分の1以上で、可決には出席株主の過半数の賛成が必要です。特別決議（会社法360条など）は定足数が3分の1以上で、可決には2分の1以上の賛成が必要です。","choices":null,"correctAnswer":"普通決議（会社法341条）は定足数が議決権を有する株主の3分の1以上で、可決には出席株主の過半数の賛成が必要です。特別決議（会社法360条など）は定足数が3分の1以上で、可決には2分の1以上の賛成が必要です。"},{"id":46,"category":"会社法","question":"監査役の職務上の権限について、主要な権限を3つ説明してください。","explanation":"監査役の主要な権限は：①業務監査権（会社の業務が法令・定款に適合しているか監査）②会計監査権（会計の適法性監査）③帳簿・書類調査権（取締役に報告要求できる）です（会社法379条～397条）。","choices":null,"correctAnswer":"監査役の主要な権限は：①業務監査権（会社の業務が法令・定款に適合しているか監査）②会計監査権（会計の適法性監査）③帳簿・書類調査権（取締役に報告要求できる）です（会社法379条～397条）。"},{"id":47,"category":"民法・その他","question":"売買契約における売主の主要な義務を説明してください。","explanation":"売主の主要な義務は：①物の引き渡し②所有権の移転③瑕疵のない物の引き渡し（瑕疵担保責任）です。これらは民法561条～580条で規定されています。","choices":null,"correctAnswer":"売主の主要な義務は：①物の引き渡し②所有権の移転③瑕疵のない物の引き渡し（瑕疵担保責任）です。これらは民法561条～580条で規定されています。"},{"id":48,"category":"民法・その他","question":"不法行為に基づく損害賠償請求の要件を4つ説明してください。","explanation":"不法行為の成立要件は：①違法行為の存在②故意または過失③他人の権利侵害④損害の発生です（民法709条）。この4つの要件をすべて満たす必要があります。","choices":null,"correctAnswer":"不法行為の成立要件は：①違法行為の存在②故意または過失③他人の権利侵害④損害の発生です（民法709条）。この4つの要件をすべて満たす必要があります。"},{"id":49,"category":"民法・その他","question":"個人情報保護法における個人情報の利用制限についてどのようなルールがあるか説明してください。","explanation":"個人情報は：①本人の同意がなければ利用目的の範囲内でのみ利用可能②変更時は本人に通知③利用目的に無関係な利用は禁止（個人情報保護法16条～18条）されています。","choices":null,"correctAnswer":"個人情報は：①本人の同意がなければ利用目的の範囲内でのみ利用可能②変更時は本人に通知③利用目的に無関係な利用は禁止（個人情報保護法16条～18条）されています。"},{"id":50,"category":"民法・その他","question":"独占禁止法における不当な取引制限と私的独占の違いを説明してください。","explanation":"不当な取引制限（独占禁止法3条）は複数事業者による協力行為で価格やシェアを制限するもの、私的独占（同2条3項）は単独または少数事業者による競争妨害行為です。両者は行為の方式が異なります。","choices":null,"correctAnswer":"不当な取引制限（独占禁止法3条）は複数事業者による協力行為で価格やシェアを制限するもの、私的独占（同2条3項）は単独または少数事業者による競争妨害行為です。両者は行為の方式が異なります。"},{"id":51,"category":"民法・その他","question":"下請代金支払遅延等防止法における親事業者の義務を説明してください。","explanation":"親事業者は：①下請代金を決定する際は書面交付②下請代金を期限内に支払い（60日以内）③建設業の場合は工事完成後に支払い④有利な条件に変更できないことが義務付けられています。","choices":null,"correctAnswer":"親事業者は：①下請代金を決定する際は書面交付②下請代金を期限内に支払い（60日以内）③建設業の場合は工事完成後に支払い④有利な条件に変更できないことが義務付けられています。"},{"id":52,"category":"知的財産権","question":"特許権の出願から登録までの主要な手続きステップを説明してください。","explanation":"主要なステップは：①出願②方式審査③実質審査④審査結果通知⑤拒絶理由がなければ査定⑥特許料の納付⑦登録（特許法48条～69条）。審査請求は出願から3年以内に行う必要があります。","choices":null,"correctAnswer":"主要なステップは：①出願②方式審査③実質審査④審査結果通知⑤拒絶理由がなければ査定⑥特許料の納付⑦登録（特許法48条～69条）。審査請求は出願から3年以内に行う必要があります。"},{"id":53,"category":"知的財産権","question":"営業秘密として保護される要件を説明してください。","explanation":"営業秘密は：①秘密として管理されていること②非公知の情報であること③相応の経済的価値を有すること（不正競争防止法2条6項）。この3つの要件を満たす必要があります。","choices":null,"correctAnswer":"営業秘密は：①秘密として管理されていること②非公知の情報であること③相応の経済的価値を有すること（不正競争防止法2条6項）。この3つの要件を満たす必要があります。"},{"id":54,"category":"知的財産権","question":"商標権の保護範囲を決定する際に重要な要素を説明してください。","explanation":"商標権の保護範囲は登録商標の：①視覚的表示②指定商品または指定役務③登録番号により決定されます。同一または紛らわしい商標が同一・類似商品に使用される場合に侵害となります。","choices":null,"correctAnswer":"商標権の保護範囲は登録商標の：①視覚的表示②指定商品または指定役務③登録番号により決定されます。同一または紛らわしい商標が同一・類似商品に使用される場合に侵害となります。"},{"id":55,"category":"知的財産権","question":"著作権の譲渡と利用許諾の違いを説明してください。","explanation":"著作権の譲渡（著作権法61条）は著作権の所有権を移転する行為で、利用許諾は著作権者が他者に著作物の利用を認める行為です。譲渡は原則書面で行われます。","choices":null,"correctAnswer":"著作権の譲渡（著作権法61条）は著作権の所有権を移転する行為で、利用許諾は著作権者が他者に著作物の利用を認める行為です。譲渡は原則書面で行われます。"},{"id":56,"category":"民法・その他","question":"委任契約と請負契約における報酬支払いの義務について説明してください。","explanation":"委任では依頼者が報酬を支払うことが一般的（民法648条）で、請負では仕事が完成して初めて報酬を請求できます。これが両契約の大きな違いです。","choices":null,"correctAnswer":"委任では依頼者が報酬を支払うことが一般的（民法648条）で、請負では仕事が完成して初めて報酬を請求できます。これが両契約の大きな違いです。"},{"id":57,"category":"会社法","question":"会社法における代表取締役と取締役の法的関係について正しい説明はどれか。","explanation":"会社法363条により、代表取締役は取締役の中から選定され、代表権を持ちます。通常、複数の取締役の中から1人以上の代表取締役が選定されます。","choices":["代表取締役と取締役は全く別の職務","代表取締役は取締役の一種で、代表権を持つ取締役","代表取締役のみが役員である","取締役が必ず代表取締役になる"],"correctIndex":1},{"id":58,"category":"会社法","question":"株式会社の解散原因として法律で定められているものはどれか。","explanation":"会社法471条により、会社の解散原因は株主総会の決議、定款で定めた事由の発生、合併、破産など複数あります。","choices":["取締役の不祥事のみ","株主総会の決議、合併、破産手続き開始決定など","代表取締役の交代","営利事業から非営利事業への転換"],"correctIndex":1},{"id":59,"category":"民法・その他","question":"訪問販売における消費者のクーリングオフ権について正しいものはどれか。","explanation":"特定商取引法9条により、訪問販売の消費者は契約書を受け取ってから7日以内であれば無条件で契約を解除できます（クーリングオフ）。","choices":["消費者は14日以内に無条件で契約を解除できる","消費者は7日以内に無条件で契約を解除できる","消費者は10日以内に理由を述べて解除できる","クーリングオフ権は存在しない"],"correctIndex":1},{"id":60,"category":"民法・その他","question":"通信販売における特定商取引法の規制として正しいものはどれか。","explanation":"特定商取引法11条により、通信販売業者は商品の価格、販売条件、返品特約などを広告に明示しなければなりません。","choices":["通信販売には規制がない","事業者は広告に価格や販売条件を明示する必要がある","返品特約の表示は任意である","消費者にクーリングオフ権がある"],"correctIndex":1},{"id":61,"category":"民法・その他","question":"個人情報の漏えいが生じた場合の事業者の義務について正しい説明はどれか。","explanation":"個人情報保護法の改正により、個人情報の漏えいが判明した場合、本人への通知と個人情報保護委員会への報告が義務付けられています。","choices":["報告義務は存在しない","本人への通知と個人情報保護委員会への報告が義務付けられている","警察への届け出のみが必要","企業内での対応のみで足りる"],"correctIndex":1},{"id":62,"category":"民法・その他","question":"独占禁止法における排他的取引慣行について正しい説明はどれか。","explanation":"独占禁止法2条9項により、他の事業者の事業活動を妨害し、著しく競争を制限する排他的取引慣行は違法とされています。","choices":["全ての排他的取引は違法である","他の事業者の事業活動を妨害し、競争を制限する排他的取引慣行は違法","排他的取引慣行という概念は存在しない","小規模事業者による排他的取引は許可される"],"correctIndex":1},{"id":63,"category":"民法・その他","question":"独占禁止法における再販売価格維持行為について正しい説明はどれか。","explanation":"独占禁止法2条9項・19条により、メーカーが小売業者に販売価格を強制する再販売価格維持行為は、競争を制限する場合に違法となります。","choices":["メーカーが小売業者に販売価格を強制することは自由である","メーカーが小売業者に販売価格を強制すると違法となる場合がある","再販売価格維持行為は常に禁止される","大企業による行為のみが違法である"],"correctIndex":1},{"id":64,"category":"民法・その他","question":"消費者契約法における消費者の保護として正しいものはどれか。","explanation":"消費者契約法8条・9条により、事業者が消費者に一方的に不利な条項を定めた場合、その条項は無効となることがあります。","choices":["消費者はいかなる場合でも契約を解除できる","事業者の一方的な利益条項は無効とされる場合がある","消費者契約に関する全ての契約は無効","保護は経営規模により異なる"],"correctIndex":1},{"id":65,"category":"民法・その他","question":"景表法の適用対象について正しいものはどれか。","explanation":"景表法は、商品・役務に関する虚偽・誇大表示と不当景品類の提供を規制し、消費者の利益を保護します。","choices":["全ての広告表示が対象","商品・役務に関する虚偽・誇大表示と不当景品が対象","価格表示のみが対象","政府広告は対象外"],"correctIndex":1},{"id":66,"category":"知的財産権","question":"特許発明の侵害について、間接侵害の説明として正しいものはどれか。","explanation":"特許法101条により、特許発明の実施と、その実施を誘導する行為の双方が侵害の対象です。間接侵害も認められています。","choices":["特許発明と全く同じ発明を実施することのみ侵害である","特許発明を実施することと、その発明の実施を誘導することも侵害の対象","直接実施者のみ責任を負う","侵害かどうかは販売量で判断される"],"correctIndex":1},{"id":67,"category":"知的財産権","question":"意匠権の保護の範囲について正しい説明はどれか。","explanation":"意匠法25条により、意匠権の保護範囲は登録意匠と同一または類似する物に及びます。類似の判断は視覚的印象から判断されます。","choices":["登録意匠と全く同じ物のみ保護される","登録意匠と同一または類似する物が保護される","意匠の機能のみが保護される","登録後の全ての改変物も保護される"],"correctIndex":1},{"id":68,"category":"知的財産権","question":"商標の先願主義とは何か。","explanation":"商標法11条により、日本は先願主義を採用しており、最初に出願した者が商標権を取得します。使用開始の時期は関係ありません。","choices":["最初に使用した者が商標権を取得する","最初に出願した者が商標権を取得する","使用期間が長い者が商標権を取得する","公開市場での知名度により決定される"],"correctIndex":1},{"id":69,"category":"知的財産権","question":"意匠登録の要件として正しいものはどれか。","explanation":"意匠法3条により、意匠登録を受けるには新規性と創作非容易性を備えていることが必要です。","choices":["新規性と創作非容易性を備えていること","新規性のみで足りる","意匠公開後6ヶ月以内に出願すれば新規性喪失の例外を受ける","同一の意匠が複数登録されることはない"],"correctIndex":0},{"id":70,"category":"知的財産権","question":"著作物の利用に関する説明として正しいものはどれか。","explanation":"著作権法30条により、著作物は個人的に又は家庭内その他これに準ずる限定された範囲内での利用であれば複製できます。","choices":["全ての著作物の利用に著作権者の許諾が必要である","教育機関での利用は常に自由である","私的使用の範囲内での複製は著作権者の許諾を要しない","公衆に提供する利用は常に禁止される"],"correctIndex":2},{"id":71,"category":"民法・その他","question":"賃借人が借地・借家の明け渡しを拒否する場合、貸主が必要とする要件は何か。","explanation":"借地借家法26条（借地）・28条（借家）により、建物の賃借人が目的物を明け渡さないとき、地主・家主は正当な事由がなければ明け渡し請求をできません。","choices":["貸主が明け渡しを要求するだけで足りる","正当な事由が必要","3ヶ月の予告があれば足りる","裁判所の判断のみ"],"correctIndex":1},{"id":72,"category":"民法・その他","question":"割賦販売法における支払い能力の確認に関する説明として正しいものはどれか。","explanation":"割賦販売法6条により、割賦販売業者は分割払いの契約をする場合、消費者の支払い能力を調査する義務を負います。","choices":["確認は不要である","割賦販売業者は消費者の支払い能力を調査する義務を負う","消費者が自己申告した内容のみで足りる","金融機関に照会することは禁止されている"],"correctIndex":1},{"id":73,"category":"民法・その他","question":"独占禁止法における企業結合の届け出基準として正しいものはどれか。","explanation":"独占禁止法15条により、一定規模以上の企業結合（事業所有の場合は20億円超など）について、事前に公正取引委員会への届け出が必要です。","choices":["全ての企業結合について届け出が必須","一定規模以上の企業結合について届け出が必要","届け出は任意である","上場企業のみ届け出が必須"],"correctIndex":1},{"id":74,"category":"会社法","question":"取締役会設置会社における取締役の業務執行権と監視権について説明してください。","explanation":"取締役会設置会社では：①取締役会が経営の基本方針を決定②個々の取締役が決定を執行③取締役会が業務執行を監視（会社法362条～365条）する関係が成立しています。","choices":null,"correctAnswer":"取締役会設置会社では：①取締役会が経営の基本方針を決定②個々の取締役が決定を執行③取締役会が業務執行を監視（会社法362条～365条）する関係が成立しています。"},{"id":75,"category":"会社法","question":"非公開会社における株式譲渡制限の仕組みと機能を説明してください。","explanation":"非公開会社は定款で株式譲渡について会社の承認を条件にすることで、経営権の維持や株主構成の安定を図ります（会社法109条～112条）。","choices":null,"correctAnswer":"非公開会社は定款で株式譲渡について会社の承認を条件にすることで、経営権の維持や株主構成の安定を図ります（会社法109条～112条）。"},{"id":76,"category":"会社法","question":"合同会社の特徴と株式会社との主な違いを説明してください。","explanation":"合同会社は：①全ての社員が無限責任②出資額に関わらず経営参加可③利益分配の自由④会計書類の公開不要（株式会社と異なる）といった特徴があります。","choices":null,"correctAnswer":"合同会社は：①全ての社員が無限責任②出資額に関わらず経営参加可③利益分配の自由④会計書類の公開不要（株式会社と異なる）といった特徴があります。"},{"id":77,"category":"会社法","question":"会社の解散と清算の手続きについて説明してください。","explanation":"会社の解散から消滅まで：①解散（会社法471条）②清算人の選任③清算手続き④債権债務の清理⑤残余財産の分配⑥本店所在地における清算結了の登記（会社法478条）を経ます。","choices":null,"correctAnswer":"会社の解散から消滅まで：①解散（会社法471条）②清算人の選任③清算手続き④債権债務の清理⑤残余財産の分配⑥本店所在地における清算結了の登記（会社法478条）を経ます。"},{"id":78,"category":"知的財産権","question":"特許出願における新規性と進歩性の違いを説明してください。","explanation":"新規性（特許法29条）は過去に公知でない発明であること、進歩性（同条2項）は当該技術分野の周知の知識から容易に想到できない発明であることが要件です。両者は異なる基準です。","choices":null,"correctAnswer":"新規性（特許法29条）は過去に公知でない発明であること、進歩性（同条2項）は当該技術分野の周知の知識から容易に想到できない発明であることが要件です。両者は異なる基準です。"},{"id":79,"category":"知的財産権","question":"商標権の初期登録後の更新手続きについて説明してください。","explanation":"商標権は登録日から10年間保護されます（商標法19条）。有効期限前6ヶ月以内に更新登録出願をすれば、さらに10年間保護期間が延長されます。","choices":null,"correctAnswer":"商標権は登録日から10年間保護されます（商標法19条）。有効期限前6ヶ月以内に更新登録出願をすれば、さらに10年間保護期間が延長されます。"},{"id":80,"category":"知的財産権","question":"著作権に関する契約の種類と内容について説明してください。","explanation":"著作権契約には：①著作物利用許諾契約②著作物売買契約③出版契約④譲渡契約などがあります。利用許諾は他者に利用を認める行為で、譲渡は所有権を移転する行為です。","choices":null,"correctAnswer":"著作権契約には：①著作物利用許諾契約②著作物売買契約③出版契約④譲渡契約などがあります。利用許諾は他者に利用を認める行為で、譲渡は所有権を移転する行為です。"},{"id":81,"category":"民法・その他","question":"債権の譲渡における債務者への通知と承諾の役割を説明してください。","explanation":"債権譲渡（民法467条）は債務者に通知または承諾がなければ第三者に対抗できません。通知は譲渡人、承諾は譲受人から行われます。","choices":null,"correctAnswer":"債権譲渡（民法467条）は債務者に通知または承諾がなければ第三者に対抗できません。通知は譲渡人、承諾は譲受人から行われます。"},{"id":82,"category":"民法・その他","question":"売主が買主に対して有する瑕疵担保責任の行使期間を説明してください。","explanation":"民法570条により、買主が売主に対して瑕疵を理由とする損害賠償請求をするには、瑕疵を知ってから1年以内にしなければなりません。","choices":null,"correctAnswer":"民法570条により、買主が売主に対して瑕疵を理由とする損害賠償請求をするには、瑕疵を知ってから1年以内にしなければなりません。"},{"id":83,"category":"民法・その他","question":"貸金業法における借り手保護の主要な規制内容を説明してください。","explanation":"貸金業法の主要規制：①利息制限法による金利上限②内容明示義務③取立て規制④返済困難時の相談対応⑤過剰貸出し防止。","choices":null,"correctAnswer":"貸金業法の主要規制：①利息制限法による金利上限②内容明示義務③取立て規制④返済困難時の相談対応⑤過剰貸出し防止。"},{"id":84,"category":"会社法","question":"株式会社における利益配当と資本金減少の法的違いを説明してください。","explanation":"利益配当（会社法454条）は利益剰余金の一部を株主に分配する行為で、資本金減少（会社法447条）は資本金そのものを減少させる行為です。法的性質と手続きが異なります。","choices":null,"correctAnswer":"利益配当（会社法454条）は利益剰余金の一部を株主に分配する行為で、資本金減少（会社法447条）は資本金そのものを減少させる行為です。法的性質と手続きが異なります。"},{"id":85,"category":"知的財産権","question":"フランチャイズ契約において知的財産権の保護がなぜ重要であるかを説明してください。","explanation":"フランチャイズでは親事業者が商標・ノウハウなどの知的財産を加盟店に使用させるため、知的財産権の保護が契約の成立基盤となります。違法使用の防止が重要です。","choices":null,"correctAnswer":"フランチャイズでは親事業者が商標・ノウハウなどの知的財産を加盟店に使用させるため、知的財産権の保護が契約の成立基盤となります。違法使用の防止が重要です。"},{"id":86,"category":"民法・その他","question":"企業が遵守すべき知的財産権関連法を5つ列挙してください。","explanation":"企業が遵守すべき知的財産権法：①特許法②実用新案法③意匠法④商標法⑤著作権法。他に不正競争防止法、個人情報保護法も関連します。","choices":null,"correctAnswer":"企業が遵守すべき知的財産権法：①特許法②実用新案法③意匠法④商標法⑤著作権法。他に不正競争防止法、個人情報保護法も関連します。"},{"id":87,"category":"会社法","question":"会社法における会社の使用人と取締役の法的関係について正しいものはどれか。","explanation":"会社法において、使用人と取締役は異なる職務です。取締役は会社の機関であり、使用人は会社に雇用される労働者です。","choices":["使用人は取締役の下部組織","使用人と取締役は独立した職務","使用人も取締役も同じ権限を持つ","使用人のみが会社を代表できる"],"correctIndex":1},{"id":88,"category":"会社法","question":"監査役会とは何か。","explanation":"会社法390条により、監査役会は監査役3人以上で構成される機関です。会社の業務全般の監視と会計監査の職務を有します。","choices":["監査役が複数いる場合の呼び名","監査役3人以上で構成される監視機関","株主による監視機関","取締役の監視のみが職務"],"correctIndex":1},{"id":89,"category":"知的財産権","question":"特許技術の実施許諾における対価の形式として適切なものはどれか。","explanation":"特許技術のライセンスにおいては、契約当事者の合意により、一時金、ロイヤリティ、技術供与料など様々な対価形式を採用することができます。","choices":["対価は必ず一括払い","一時金、ロイヤリティ、技術供与料など複数の形式が可能","対価は受け取ってはならない","政府が決定する"],"correctIndex":1},{"id":90,"category":"知的財産権","question":"国際特許出願（PCT出願）の主な利点として正しいものはどれか。","explanation":"PCT（特許協力条約）出願により、国際事務局への1つの出願で複数国への出願効果が得られ、手続きが簡素化されます。ただし各国での登録手続きは必要です。","choices":["国際的に特許権が自動的に成立する","複数国への出願手続きが簡素化される","出願料が安くなる","審査が行われない"],"correctIndex":1},{"id":91,"category":"民法・その他","question":"独占禁止法における過度な返品要求について正しい説明はどれか。","explanation":"独占禁止法は著しく不公正な返品要求を禁止しており、事業者が不相応な返品を要求する場合は違法となる可能性があります。","choices":["返品は自由に要求できる","著しく不公正な返品要求は違法となることがある","返品要求は常に禁止である","大企業のみが返品できる"],"correctIndex":1},{"id":92,"category":"会社法","question":"株式会社の株主による損失補填請求に関する説明として正しいものはどれか。","explanation":"会社法360条に基づき、株主は違法行為による損失補填を株主代理訴訟で請求することができます。","choices":["株主は常に損失補填を請求できる","取締役が違法に業務を執行して損失が生じた場合、株主代理訴訟により補填請求ができる","損失補填請求は禁止されている","株主総会の決議があればいかなる損失も補填される"],"correctIndex":1},{"id":93,"category":"会社法","question":"株式会社の資本に関する規定について正しい説明はどれか。","explanation":"会社法改正により、資本金の最低額要件は廃止され、1円以上であれば株式会社の設立が可能です。","choices":["資本金は必ず1000万円以上必要","資本金の額は自由に決定できる","資本金は増加のみ可能","資本金と資本剰余金は同義"],"correctIndex":1},{"id":94,"category":"知的財産権","question":"特許権の分割出願について正しい説明はどれか。","explanation":"特許法44条により、出願人は一定期間内に分割請求書を提出することで、1つの出願を複数に分割することができます。","choices":["全ての特許出願が分割可能である","原出願と同一内容の場合のみ分割できる","一定期間内に分割請求書を提出することで分割出願ができる","分割は認められていない"],"correctIndex":2},{"id":95,"category":"知的財産権","question":"実用新案権と特許権の大きな違いは次のうちどれか。","explanation":"実用新案法は特許とは異なり、出願と同時に登録され、審査が行われず、調査済み意見書の提示が必要です。","choices":["保護期間の長さのみ","実用新案は調査済み意見書の提示が必要で、審査がない","実用新案の方が厳格な審査がある","保護対象が異なる"],"correctIndex":1},{"id":96,"category":"民法・その他","question":"借地借家法における建物賃借人の更新請求に関する説明として正しいものはどれか。","explanation":"借地借家法28条により、建物の賃借人が更新を望む場合、貸主が正当な事由を示さない限り更新が拒絶できません。","choices":["賃借人が更新を請求すれば必ず更新される","正当な理由がない限り、契約は自動的に更新される","貸主の正当な事由がなければ貸主は更新を拒絶できない","更新は貸主の一方的な決定により行われる"],"correctIndex":2},{"id":97,"category":"民法・その他","question":"不正競争防止法における営業秘密の侵害行為として正しい例はどれか。","explanation":"不正競争防止法により、営業秘密を盗む、詐欺、脅迫などにより不正に入手・使用することは侵害行為として禁止されます。","choices":["秘密として管理されている営業秘密を盗む","営業秘密の使用を許可する","営業秘密を自ら開発する","営業秘密に関する情報を一般公開する"],"correctIndex":0},{"id":98,"category":"会社法","question":"会社法での株式会社と合同会社の経営参加権の違いについて説明してください。","explanation":"株式会社では出資額に関わらず1株1議決権の原則があり、合同会社では社員全員が原則として経営に参加でき、出資額による権利差別がありません。","choices":null,"correctAnswer":"株式会社では出資額に関わらず1株1議決権の原則があり、合同会社では社員全員が原則として経営に参加でき、出資額による権利差別がありません。"},{"id":99,"category":"知的財産権","question":"特許権と商標権の侵害に対する救済方法の違いについて説明してください。","explanation":"両者とも差し止め請求と損害賠償請求が可能ですが、特許権は技術的観点から侵害判定が複雑で、商標権は視覚的混同が基準となります。","choices":null,"correctAnswer":"両者とも差し止め請求と損害賠償請求が可能ですが、特許権は技術的観点から侵害判定が複雑で、商標権は視覚的混同が基準となります。"},{"id":100,"category":"民法・その他","question":"特定商取引法における電話勧誘販売の規制内容を説明してください。","explanation":"電話勧誘販売（特定商取引法13条）では、事業者に対して説明義務、広告表示義務、契約書交付義務、クーリングオフ権の告知が義務付けられています。","choices":null,"correctAnswer":"電話勧誘販売（特定商取引法13条）では、事業者に対して説明義務、広告表示義務、契約書交付義務、クーリングオフ権の告知が義務付けられています。"},{"id":101,"category":"会社法","question":"会社の役員報酬に関する規定として正しい説明はどれか。","explanation":"会社法362条により、役員報酬は定款で定めた範囲内で株主総会の決議により決定されます。","choices":["役員報酬は自由に決定できる","定款で定めた範囲内で株主総会の決議により決定する","役員報酬の支払いは禁止されている","代表取締役のみ報酬を受け取れる"],"correctIndex":1},{"id":102,"category":"知的財産権","question":"職務発明の帰属に関する説明として正しいものはどれか。","explanation":"特許法35条により、職務発明は企業に帰属しますが、従業者は相応の報酬を受ける権利を有します。","choices":["職務発明は常に従業者に帰属する","職務発明は常に企業に帰属する","職務発明は企業に帰属するが、従業者は相応の報酬を受ける権利がある","職務発明は公有化される"],"correctIndex":2},{"id":103,"category":"民法・その他","question":"労働契約法における退職金に関する説明として正しいものはどれか。","explanation":"労働基準法では退職金の支払いについて明確な規定がなく、企業の就業規則で定めた場合に支払義務が生じます。","choices":["退職金の支払いは法律で強制されない","退職金は常に支払わなければならない","退職金は定款で定めた額の支払いが必須","退職金は退職後1年以内に支払う必要がある"],"correctIndex":0}],"jouhou":[{"id":1,"category":"IT基礎","question":"CPUの処理速度を表す単位として最も一般的なものはどれか。","explanation":"CPUの処理速度はGHz(ギガヘルツ)またはMHz(メガヘルツ)で表されます。GB/KBはメモリ容量、Mbpsは通信速度の単位です。","choices":["MHz","GB","KB","Mbps"],"correctIndex":0},{"id":2,"category":"IT基礎","question":"RAMメモリの特徴として正しいものはどれか。","explanation":"RAMは揮発性メモリで、電源を切ると内容が消えます。ROMやHDDなどは不揮発性メモリです。","choices":["電源を切ると内容が保持される","電源を切ると内容が消える","光ディスクに比べて容量が大きい","不揮発性メモリである"],"correctIndex":1},{"id":3,"category":"IT基礎","question":"オペレーティングシステム(OS)の役割として最も適切なものはどれか。","explanation":"OSはハードウェアとアプリケーションソフトウェアの仲介役として、ハードウェアリソースを管理し、複数のアプリケーション実行を調整します。","choices":["ハードウェアの制御とリソース管理","プログラミング言語の編集","ネットワークの物理的な構築","データベースの設計"],"correctIndex":0},{"id":4,"category":"IT基礎","question":"プログラミング言語の種類として挙げられるのはどれか。","explanation":"Java、Python、C++、JavaScriptはプログラミング言語です。Windowsなどはオペレーティングシステム、MySQLなどはデータベース管理システムです。","choices":["Java、Python、C++、JavaScript","Windows、macOS、Linux、Unix","MySQL、PostgreSQL、Oracle、SQLServer","HTML、CSS、XML、JSON"],"correctIndex":0},{"id":5,"category":"IT基礎","question":"スタック(Stack)データ構造の特徴として正しいものはどれか。","explanation":"スタックは後入先出(LIFO: Last In First Out)の原則に従い、最後に入れたデータが最初に取り出されます。先入先出はキュー(Queue)です。","choices":["先入先出(FIFO)の原則に従う","後入先出(LIFO)の原則に従う","優先度によって取り出し順序が決まる","任意の位置からデータを取り出せる"],"correctIndex":1},{"id":6,"category":"IT基礎","question":"キャッシュメモリの役割として最も適切なものはどれか。","explanation":"キャッシュメモリはCPUの近くに置かれた小容量の高速メモリで、頻繁にアクセスされるデータを一時保存し、処理速度を向上させます。","choices":["大容量のデータを長期保存する","CPUとメインメモリ間の高速アクセスを実現する","プログラムのバグを検出する","ネットワーク通信を最適化する"],"correctIndex":1},{"id":7,"category":"IT基礎","question":"ポインタの概念を最も正しく説明しているものはどれか。","explanation":"ポインタは、別の変数が格納されているメモリアドレスを保持する変数です。プログラミングで動的メモリ管理に使用されます。","choices":["変数を指す矢印記号","メモリアドレスを保持する変数","プログラムの流れを制御する命令","データの型を定義する仕様"],"correctIndex":1},{"id":8,"category":"IT基礎","question":"再帰処理の特徴として最も適切なものはどれか。","explanation":"再帰処理は、関数が自分自身を呼び出して問題を解く手法です。ベースケースと再帰ケースが必要です。","choices":["処理が無限に繰り返される","関数が自分自身を呼び出す","メモリ容量を削減できる","処理速度が必ず高速化される"],"correctIndex":1},{"id":9,"category":"IT基礎","question":"クラスとオブジェクトの関係として最も適切なものはどれか。","explanation":"クラスはオブジェクトの設計図であり、オブジェクトはクラスから生成されたインスタンスです。","choices":["クラスはオブジェクトと同じ意味である","クラスはオブジェクトの型である","オブジェクトがクラスを包含する","特に関連性がない"],"correctIndex":1},{"id":10,"category":"IT基礎","question":"カプセル化の利点として最も適切なものはどれか。","explanation":"カプセル化は、データとメソッドをまとめ、内部実装を隠蔽することで、保守性と安全性を向上させます。","choices":["プログラムの実行速度が向上する","データ隠蔽と保護、変更の影響範囲を限定","メモリ使用量が削減される","コード行数が減少する"],"correctIndex":1},{"id":11,"category":"データベース","question":"関係型データベース(RDBMS)の基本的な構成単位はどれか。","explanation":"RDBMSはテーブル(表)を基本単位として、複数のテーブルを相互に関連付けてデータを管理します。","choices":["テーブル(表)","ノード","オブジェクト","グラフ"],"correctIndex":0},{"id":12,"category":"データベース","question":"SQL文におけるJOIN句の役割として正しいものはどれか。","explanation":"JOINは複数のテーブルを特定の条件で関連付けて、統合されたデータセットを取得するためのSQL句です。","choices":["複数のテーブルを結合して検索する","テーブルのレコードを削除する","テーブルを新規作成する","レコードのバックアップを取得する"],"correctIndex":0},{"id":13,"category":"データベース","question":"データベースの正規化の目的として最も適切なものはどれか。","explanation":"正規化はデータの重複を排除し、データの整合性を保つことで、異常なデータ更新を防ぎます。","choices":["データの重複を排除し、整合性を確保する","クエリの実行速度を必ず高速化する","テーブル数を最大化する","ディスク容量を最大限に使用する"],"correctIndex":0},{"id":14,"category":"データベース","question":"ER図(実体関連図)の意味として最も適切なものはどれか。","explanation":"ER図(Entity-Relationship Diagram)は、データベース設計において、エンティティ(実体)、その属性、エンティティ間の関連性を視覚的に表現します。","choices":["データベースの物理的な構造を表す図","エンティティと属性、関連性を表す図","データベースのバックアップスケジュールを表す図","ネットワークの接続状況を表す図"],"correctIndex":1},{"id":15,"category":"データベース","question":"NoSQLデータベースの特徴として正しいものはどれか。","explanation":"NoSQLデータベースは、スキーマが柔軟であり、複雑なデータ構造の保存や大規模データの処理に適しています。ただしACID特性の実装度はDBMSによって異なります。","choices":["すべてのNoSQLが階層的データ構造を使用する","スキーマが固定的ではなく柔軟である","すべてのNoSQLがACID特性を完全に保証する","RDBMSよりも常に処理速度が速い"],"correctIndex":1},{"id":16,"category":"データベース","question":"トランザクション処理のACID特性における『Atomicity(原子性)』はどのような特性か。","explanation":"Atomicity(原子性)は、トランザクションが『すべて実行される』か『すべて実行されない』かのいずれかであることを保証します。","choices":["複数のトランザクションが並行実行できること","トランザクションが完全に実行されるか全く実行されないか","障害が発生してもデータが失われないこと","各トランザクションが独立して実行されること"],"correctIndex":1},{"id":17,"category":"データベース","question":"ビューの用途として最も適切なものはどれか。","explanation":"ビューは、1つ以上の実テーブルから特定のデータを抽出した仮想的なテーブルです。セキュリティと利便性の向上に用いられます。","choices":["複数のテーブルから特定データを抽出・表示する","テーブルの物理的な構造を変更する","データベースのバックアップを自動化する","インデックスの性能を監視する"],"correctIndex":0},{"id":18,"category":"データベース","question":"ストアドプロシージャの利点として最も適切なものはどれか。","explanation":"ストアドプロシージャは、データベースサーバーに保存された処理をまとめたプログラムです。ネットワークトラフィック削減と性能向上が期待できます。","choices":["テーブル容量を削減できる","複雑な処理をあらかじめ定義・保存でき、再利用と性能向上を実現","すべてのユーザーが無制限にアクセスできる","プログラミング言語が不要になる"],"correctIndex":1},{"id":19,"category":"データベース","question":"トリガーの役割として最も適切なものはどれか。","explanation":"トリガーは、テーブルに対する特定操作(INSERT、UPDATE、DELETE)が実行される際に、自動的に実行される処理です。","choices":["エラーが発生した際のシステム再起動","データベースイベント(INSERT、UPDATE、DELETE)に自動応答","テーブルのバックアップを取得する","アカウント権限を管理する"],"correctIndex":1},{"id":20,"category":"データベース","question":"分散トランザクション管理における『2フェーズコミット』の目的は何か。","explanation":"2フェーズコミットは、複数のデータベースにまたがるトランザクションで、すべてのコミットが成功するか、すべてがロールバックするかを保証します。","choices":["複数のデータベースで変更を一貫性をもって確定する","トランザクション処理を高速化する","ユーザーの権限を管理する","バックアップを定期的に取得する"],"correctIndex":0},{"id":21,"category":"ネットワーク","question":"TCP/IPモデルの階層数として正しいものはどれか。","explanation":"TCP/IPモデルは4階層からなります：応用層、トランスポート層、インターネット層、リンク層。OSI参照モデルは7階層です。","choices":["3階層","4階層","5階層","7階層"],"correctIndex":1},{"id":22,"category":"ネットワーク","question":"IPアドレスのクラスAの範囲として正しいものはどれか。","explanation":"クラスAは0.0.0.0～127.255.255.255の範囲で、ネットワークアドレスは最初の8ビット(第1オクテット)で決定されます。127.x.x.xはループバックアドレスです。","choices":["0.0.0.0～126.255.255.255","128.0.0.0～191.255.255.255","192.0.0.0～223.255.255.255","224.0.0.0～255.255.255.255"],"correctIndex":0},{"id":23,"category":"ネットワーク","question":"OSI参照モデルのレイヤー4で動作するプロトコルはどれか。","explanation":"TCPはトランスポート層(レイヤー4)で動作し、信頼性のある通信を提供します。HTTPはアプリケーション層、IPはネットワーク層、Ethernetはデータリンク層です。","choices":["HTTP","TCP","IP","Ethernet"],"correctIndex":1},{"id":24,"category":"ネットワーク","question":"ファイアウォールの役割として最も適切なものはどれか。","explanation":"ファイアウォールは、セキュリティポリシーに基づいてネットワークトラフィックをフィルタリングし、不正なアクセスを防ぎます。","choices":["データベースを自動的にバックアップする","ネットワークと内部システムの間でアクセス制御を行う","すべてのコンピュータウイルスを完全に防ぐ","ネットワーク通信の速度を高速化する"],"correctIndex":1},{"id":25,"category":"ネットワーク","question":"UDPプロトコルの特徴として最も適切なものはどれか。","explanation":"UDPは非接続型で、TCPより低遅延ですが確実性が低いプロトコルです。ライブストリーミング、VoIPなどに適しています。","choices":["確実な配信を保証する接続型プロトコル","低遅延、確実性より速度を重視する非接続型プロトコル","複数ホスト間の同期を保証する","ネットワークの信頼性を監視する"],"correctIndex":1},{"id":26,"category":"ネットワーク","question":"DHCPの役割として最も適切なものはどれか。","explanation":"DHCPは、ネットワーク管理者の手を煩わせないよう、クライアントに自動的にIPアドレスと関連設定を割り当てるプロトコルです。","choices":["ドメイン名をIPアドレスに変換する","クライアントに自動的にIPアドレスを割り当てる","ネットワークセキュリティを監視する","ファイアウォール機能を提供する"],"correctIndex":1},{"id":27,"category":"ネットワーク","question":"NAT(ネットワークアドレス変換)の目的として最も適切なものはどれか。","explanation":"NATは、プライベートIPアドレスをグローバルIPアドレスに変換し、複数のデバイスが限定的なグローバルアドレスを共用できるようにします。","choices":["ネットワーク通信を暗号化する","プライベートIPアドレスをグローバルIPアドレスに変換する","ネットワークトラフィックを監視する","ドメイン名の解決を行う"],"correctIndex":1},{"id":28,"category":"ネットワーク","question":"ロードバランシングの目的として最も適切なものはどれか
