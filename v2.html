。","explanation":"ロードバランシングは、複数サーバーにアクセスを分散して処理し、1台への負荷集中を防ぎ、システムの信頼性と性能を向上させます。","choices":["ネットワークを暗号化する","複数サーバーに負荷を分散し、可用性と性能を向上させる","ユーザー認証を実施する","ファイアウォール機能を提供する"],"correctIndex":1},{"id":29,"category":"ネットワーク","question":"プロキシサーバーの役割として最も適切なものはどれか。","explanation":"プロキシサーバーは、クライアントとサーバーの間に位置し、リクエスト・レスポンスの中継、キャッシング、フィルタリング等を行います。","choices":["クライアントとサーバー間の中継と制御を行う","データベースのバックアップを取得する","ネットワークケーブルの接続管理","プログラムのコンパイルを支援する"],"correctIndex":0},{"id":30,"category":"ネットワーク","question":"VPN(仮想プライベートネットワーク)の主な目的として最も適切なものはどれか。","explanation":"VPNは、インターネットなどの公開ネットワーク上に暗号化によって仮想的なプライベートネットワークを構築し、安全な通信を実現します。","choices":["ネットワークの速度を常に高速化する","公開ネットワーク上で安全な通信を実現する","すべてのデータの完全な匿名化を保証する","ハードウェアの購入費用を削減する"],"correctIndex":1},{"id":31,"category":"システム開発","question":"ウォーターフォール型開発の特徴として正しいものはどれか。","explanation":"ウォーターフォール型は、要件定義、設計、実装、テスト、運用といったフェーズを順序通りに進め、前のフェーズへの戻りは最小限です。","choices":["各フェーズを順序通りに実施し、前のフェーズに戻らない","小さな機能単位で反復開発を行う","ユーザーの要件が頻繁に変わることに対応する","開発期間が短いプロジェクトに最適である"],"correctIndex":0},{"id":32,"category":"システム開発","question":"アジャイル開発の特徴として最も適切なものはどれか。","explanation":"アジャイル開発は、短いイテレーション(通常2～4週間)を繰り返し、段階的に機能を完成させながら、変化する要件に対応します。","choices":["要件定義を最初に完全に確定することが重要","短いイテレーション(スプリント)を繰り返す","最初に詳細な設計書を作成することが必須","テストは開発完了後に一括実施する"],"correctIndex":1},{"id":33,"category":"システム開発","question":"ブラックボックステストの特徴として正しいものはどれか。","explanation":"ブラックボックステストは、内部実装を知らずに、入出力仕様や機能要件に基づいてテストケースを作成し、実施するテスト手法です。","choices":["ソースコードの内部構造を知って実施するテスト","入出力の仕様に基づいてテストケースを作成する","ホワイトボックステストと同じ手法である","コンパイラのテストに限定される"],"correctIndex":1},{"id":34,"category":"システム開発","question":"UML(統一モデリング言語)の使用目的として最も適切なものはどれか。","explanation":"UMLは、オブジェクト指向システムの設計を、クラス図、シーケンス図、ユースケース図など複数の図式で標準的に表現するためのモデリング言語です。","choices":["プログラミング言語の実行を可視化する","システムの構造と振る舞いを図で表現する","データベースのバックアップを自動化する","ネットワークの物理的構成を表示する"],"correctIndex":1},{"id":35,"category":"システム開発","question":"継続的インテグレーション(CI)の概念と利点を説明せよ。","explanation":"CIは、開発者がコード変更を頻繁(数回/日)に共有リポジトリにコミットし、自動テスト・ビルドを実行します。欠陥早期発見、品質向上、開発効率化が利点です。","choices":null,"correctAnswer":"CIは、開発者がコード変更を頻繁(数回/日)に共有リポジトリにコミットし、自動テスト・ビルドを実行します。欠陥早期発見、品質向上、開発効率化が利点です。"},{"id":36,"category":"システム開発","question":"テスト駆動開発(TDD)の利点と実践上の課題を説明せよ。","explanation":"TDD：テスト先に書き、後で実装。赤→緑→リファクタリングサイクル。利点：品質向上、回帰テスト自動化、ドキュメント代わり。課題：習得時間、適切粒度判断。","choices":null,"correctAnswer":"TDD：テスト先に書き、後で実装。赤→緑→リファクタリングサイクル。利点：品質向上、回帰テスト自動化、ドキュメント代わり。課題：習得時間、適切粒度判断。"},{"id":37,"category":"システム開発","question":"リファクタリングの定義と重要性を説明せよ。","explanation":"リファクタリング：機能変えずにコード改善。可読性向上、保守性改善、バグ削減が目的。テストが前提条件で、継続的実施が効果的。","choices":null,"correctAnswer":"リファクタリング：機能変えずにコード改善。可読性向上、保守性改善、バグ削減が目的。テストが前提条件で、継続的実施が効果的。"},{"id":38,"category":"経営情報管理","question":"ERP(統合基幹業務システム)の目的として最も適切なものはどれか。","explanation":"ERPは、営業、生産、財務、人事など企業内のすべての業務プロセスを統一されたシステムで管理し、情報を一元化します。","choices":["企業内の業務データを統一的に管理する","営業部門だけのデータを管理する","顧客情報の秘密を完全に守る","ハードウェアの性能を最大化する"],"correctIndex":0},{"id":39,"category":"経営情報管理","question":"CRM(顧客関係管理)の機能として最も適切なものはどれか。","explanation":"CRMは、顧客情報を一元管理し、営業機会の発掘、顧客満足度向上、営業効率の改善などを支援するシステムです。","choices":["顧客情報の管理と営業活動の支援","製品の生産計画を最適化する","企業の財務状況を分析する","従業員の勤務スケジュールを管理する"],"correctIndex":0},{"id":40,"category":"経営情報管理","question":"デジタルトランスフォーメーション(DX)の定義として最も適切なものはどれか。","explanation":"DXは、デジタル技術を活用してビジネスモデル、業務プロセス、企業文化を根本的に変革し、競争力を強化する取り組みです。","choices":["コンピュータの購入にかかる費用を削減すること","データやデジタル技術を活用して企業の競争力を高める","すべての企業がクラウドサービスを導入すること","紙ベースの帳簿をExcelに変換すること"],"correctIndex":1},{"id":41,"category":"経営情報管理","question":"ERP導入プロジェクト失敗要因と対策を説明せよ。","explanation":"失敗要因：要件定義不十分、業務理解不足、期間・予算超過、教育不足、カスタマイズ過度。対策：現状調査、段階的導入、パワーユーザー育成、プロセス改善、標準機能最大化。","choices":null,"correctAnswer":"失敗要因：要件定義不十分、業務理解不足、期間・予算超過、教育不足、カスタマイズ過度。対策：現状調査、段階的導入、パワーユーザー育成、プロセス改善、標準機能最大化。"},{"id":42,"category":"経営情報管理","question":"ビッグデータの『3V』とは何か、経営活用例を説明せよ。","explanation":"Volume(量)、Velocity(速度)、Variety(多様性)。活用：顧客分析で購買パターン抽出、異常検知で予防保全、市場トレンド分析で製品開発支援。","choices":null,"correctAnswer":"Volume(量)、Velocity(速度)、Variety(多様性)。活用：顧客分析で購買パターン抽出、異常検知で予防保全、市場トレンド分析で製品開発支援。"},{"id":43,"category":"経営情報管理","question":"IoT導入による企業への影響と課題を説明せよ。","explanation":"影響：リアルタイムデータ活用で業務効率化、予防保全、新サービス創出。課題：セキュリティ(多数デバイス管理)、プライバシー、標準化の遅れ、初期投資。","choices":null,"correctAnswer":"影響：リアルタイムデータ活用で業務効率化、予防保全、新サービス創出。課題：セキュリティ(多数デバイス管理)、プライバシー、標準化の遅れ、初期投資。"},{"id":44,"category":"経営情報管理","question":"クラウドサービス選択基準(IaaS、PaaS、SaaS)と経営判断ポイントを説明せよ。","explanation":"IaaS：柔軟性重視、既存移行、コスト中～高。PaaS：開発迅速化、コスト中。SaaS：導入速度、コスト低。判断：初期投資、カスタマイズ必要性、ベンダーロック、セキュリティ。","choices":null,"correctAnswer":"IaaS：柔軟性重視、既存移行、コスト中～高。PaaS：開発迅速化、コスト中。SaaS：導入速度、コスト低。判断：初期投資、カスタマイズ必要性、ベンダーロック、セキュリティ。"},{"id":45,"category":"経営情報管理","question":"情報セキュリティインシデント対応プロセスと事前準備を説明せよ。","explanation":"プロセス：検知→分析→対応→回復。準備：対応計画、役割明確化、訓練、ホットライン構築、ログ基盤整備。準備不足→対応遅延→被害拡大。","choices":null,"correctAnswer":"プロセス：検知→分析→対応→回復。準備：対応計画、役割明確化、訓練、ホットライン構築、ログ基盤整備。準備不足→対応遅延→被害拡大。"},{"id":46,"category":"IT基礎","question":"マイクロプロセッサのクロック周波数が高いほど、必ず処理性能が向上するか説明せよ。","explanation":"いいえ。周波数同じでもキャッシュサイズ、パイプライン構造、命令セット効率など複数要因が関係。メモリアクセス待機や命令スループット制限で周波数向上が性能直結しないことあり。","choices":null,"correctAnswer":"いいえ。周波数同じでもキャッシュサイズ、パイプライン構造、命令セット効率など複数要因が関係。メモリアクセス待機や命令スループット制限で周波数向上が性能直結しないことあり。"},{"id":47,"category":"IT基礎","question":"仮想化技術(仮想マシン、コンテナ)の利点と課題、使い分けを説明せよ。","explanation":"VM：完全隔離、多OS対応、リソースオーバーヘッド大。コンテナ：軽量、高速起動、効率的、隔離度低。完全隔離→VM、同一OS→コンテナ選択。","choices":null,"correctAnswer":"VM：完全隔離、多OS対応、リソースオーバーヘッド大。コンテナ：軽量、高速起動、効率的、隔離度低。完全隔離→VM、同一OS→コンテナ選択。"},{"id":48,"category":"IT基礎","question":"バージョン管理システム(Git)の分散アーキテクチャと集中型の違いを説明せよ。","explanation":"Git(分散)：各開発者がリポジトリ全体保持、オフライン作業可能、マージ柔軟。集中型(SVN)：中央管理のみ、ネットワーク依存。現代はGit標準。","choices":null,"correctAnswer":"Git(分散)：各開発者がリポジトリ全体保持、オフライン作業可能、マージ柔軟。集中型(SVN)：中央管理のみ、ネットワーク依存。現代はGit標準。"},{"id":49,"category":"IT基礎","question":"マイクロサービスアーキテクチャとモノリシックの比較と適用場面を説明せよ。","explanation":"モノリシック：シンプル、初期開発速い、テスト全体必要。マイクロサービス：独立スケーリング、技術多様化、複雑性増加。初期→モノリシック、大規模→マイクロサービス。","choices":null,"correctAnswer":"モノリシック：シンプル、初期開発速い、テスト全体必要。マイクロサービス：独立スケーリング、技術多様化、複雑性増加。初期→モノリシック、大規模→マイクロサービス。"},{"id":50,"category":"ネットワーク","question":"ゼロトラストセキュリティモデルの概念を説明せよ。","explanation":"ゼロトラスト：『何も信頼しない』原則、全通信検証。従来型：内部信頼、外部検査。リモートワーク拡大で従来型無効化。ユーザー・デバイス認証、最小権限、マイクロセグメンテーション。","choices":null,"correctAnswer":"ゼロトラスト：『何も信頼しない』原則、全通信検証。従来型：内部信頼、外部検査。リモートワーク拡大で従来型無効化。ユーザー・デバイス認証、最小権限、マイクロセグメンテーション。"},{"id":51,"category":"ネットワーク","question":"IPv6への移行における課題と対策を説明せよ。","explanation":"課題：既存IPv4資産保護、対応コスト、フラグメンテーション。対策：デュアルスタック、6to4等トンネル技術、段階的導入。完全移行には長時間要。","choices":null,"correctAnswer":"課題：既存IPv4資産保護、対応コスト、フラグメンテーション。対策：デュアルスタック、6to4等トンネル技術、段階的導入。完全移行には長時間要。"},{"id":52,"category":"ネットワーク","question":"ブロックチェーン技術の特徴と企業での応用例を説明せよ。","explanation":"特徴：分散型、不変性、透明性。応用：サプライチェーン(原材料から販売追跡)、契約自動実行、知的財産管理。課題：速度、スケーラビリティ。","choices":null,"correctAnswer":"特徴：分散型、不変性、透明性。応用：サプライチェーン(原材料から販売追跡)、契約自動実行、知的財産管理。課題：速度、スケーラビリティ。"},{"id":53,"category":"データベース","question":"パーティショニングとシャーディングの違いを説明せよ。","explanation":"パーティション：同一サーバー内分割。シャード：複数サーバー分散、水平スケーリング。小～中規模→パーティション、大規模→シャーディング。","choices":null,"correctAnswer":"パーティション：同一サーバー内分割。シャード：複数サーバー分散、水平スケーリング。小～中規模→パーティション、大規模→シャーディング。"},{"id":54,"category":"データベース","question":"時系列データベースの特徴を説明せよ。","explanation":"特徴：追記オンリー、タイムスタンプ主要インデックス、高圧縮率。RDBMSと異なり、時間範囲クエリ最適化、スケーラビリティ優秀。IoT・メトリクス監視向け。","choices":null,"correctAnswer":"特徴：追記オンリー、タイムスタンプ主要インデックス、高圧縮率。RDBMSと異なり、時間範囲クエリ最適化、スケーラビリティ優秀。IoT・メトリクス監視向け。"},{"id":55,"category":"システム開発","question":"レガシーシステムのモダナイゼーション戦略を説明せよ。","explanation":"戦略：リエンジニアリング、ストラングラーパターン(新機能置換)。段階：分析→マイクロサービス化→API連携→データ移行→カットオーバー。","choices":null,"correctAnswer":"戦略：リエンジニアリング、ストラングラーパターン(新機能置換)。段階：分析→マイクロサービス化→API連携→データ移行→カットオーバー。"},{"id":56,"category":"経営情報管理","question":"プライベートクラウドとパブリッククラウドの違いを説明せよ。","explanation":"プライベート：企業専用、カスタマイズ自由、セキュリティ高、コスト高。パブリック：共有、スケーラビリティ優、コスト低。選択は要件による。","choices":null,"correctAnswer":"プライベート：企業専用、カスタマイズ自由、セキュリティ高、コスト高。パブリック：共有、スケーラビリティ優、コスト低。選択は要件による。"},{"id":57,"category":"経営情報管理","question":"ハイブリッドクラウド戦略の利点と課題を説明せよ。","explanation":"利点：柔軟性(重要データはプライベート、スケーラビリティはパブリック)、コスト最適化。課題：複雑管理、統合困難、ベンダー依存。","choices":null,"correctAnswer":"利点：柔軟性(重要データはプライベート、スケーラビリティはパブリック)、コスト最適化。課題：複雑管理、統合困難、ベンダー依存。"},{"id":58,"category":"IT基礎","question":"関数型プログラミングの利点を説明せよ。","explanation":"命令型：『何をするか』ステップバイステップ。関数型：『何を計算するか』関数合成。副作用少ない、並行処理安全、形式検証可能。","choices":null,"correctAnswer":"命令型：『何をするか』ステップバイステップ。関数型：『何を計算するか』関数合成。副作用少ない、並行処理安全、形式検証可能。"},{"id":59,"category":"IT基礎","question":"型安全性とメモリ安全性の違いを説明せよ。","explanation":"型安全性：型規則遵守(コンパイル/実行時)。メモリ安全性：不正アクセス防止。セキュリティ重視→Rust/Java、高性能→C/C++。","choices":null,"correctAnswer":"型安全性：型規則遵守(コンパイル/実行時)。メモリ安全性：不正アクセス防止。セキュリティ重視→Rust/Java、高性能→C/C++。"},{"id":60,"category":"IT基礎","question":"エッジコンピューティングとクラウドの役割分担を説明せよ。","explanation":"クラウド：大規模計算・ストレージ、複雑分析。エッジ：デバイス端で局所計算、低遅延。IoT：エッジで前処理、制御、クラウドで集約・保存。","choices":null,"correctAnswer":"クラウド：大規模計算・ストレージ、複雑分析。エッジ：デバイス端で局所計算、低遅延。IoT：エッジで前処理、制御、クラウドで集約・保存。"},{"id":61,"category":"IT基礎","question":"機械学習モデルの過学習(オーバーフィッティング)原因と対策を説明せよ。","explanation":"過学習：訓練データ適合過度。原因：訓練データ少ない、モデル複雑、訓練期間長い。対策：データ増加、複雑度低減、Early Stopping、交差検証。","choices":null,"correctAnswer":"過学習：訓練データ適合過度。原因：訓練データ少ない、モデル複雑、訓練期間長い。対策：データ増加、複雑度低減、Early Stopping、交差検証。"},{"id":62,"category":"ネットワーク","question":"QoS(Quality of Service)制御手法を説明せよ。","explanation":"手法：キューイング制御、帯域幅予約、パケット破棄制御、遅延制御。実装：DiffServ、MPLS。VoIP・ビデオ会議品質維持に必須。","choices":null,"correctAnswer":"手法：キューイング制御、帯域幅予約、パケット破棄制御、遅延制御。実装：DiffServ、MPLS。VoIP・ビデオ会議品質維持に必須。"},{"id":63,"category":"ネットワーク","question":"パケットフィルタリング型とプロキシ型ファイアウォール違いを説明せよ。","explanation":"パケット型：IP/ポート条件、高速、低負荷。プロキシ型：中継、応用層検査。多段階防御で併用。","choices":null,"correctAnswer":"パケット型：IP/ポート条件、高速、低負荷。プロキシ型：中継、応用層検査。多段階防御で併用。"},{"id":64,"category":"ネットワーク","question":"CDN(内容配信ネットワーク)の仕組みと利点を説明せよ。","explanation":"仕組み：世界中エッジサーバーにキャッシュ、地理的に近いから配信。利点：遅延削減、負荷軽減、帯域幅効率化、DDoS対策。","choices":null,"correctAnswer":"仕組み：世界中エッジサーバーにキャッシュ、地理的に近いから配信。利点：遅延削減、負荷軽減、帯域幅効率化、DDoS対策。"},{"id":65,"category":"システム開発","question":"単体テスト、統合テスト、システムテストの違いを説明せよ。","explanation":"単体：個別モジュール、ロジック誤り検出。統合：複数モジュール連携、インターフェース検出。システム：全体要件適合、パフォーマンス検出。","choices":null,"correctAnswer":"単体：個別モジュール、ロジック誤り検出。統合：複数モジュール連携、インターフェース検出。システム：全体要件適合、パフォーマンス検出。"},{"id":66,"category":"システム開発","question":"コードレビューの目的と効果的方法を説明せよ。","explanation":"目的：欠陥早期発見、知識共有、標準化推進。方法：範囲明確化、建設的コメント、複数レビュアー、チェックリスト活用、定期実施。","choices":null,"correctAnswer":"目的：欠陥早期発見、知識共有、標準化推進。方法：範囲明確化、建設的コメント、複数レビュアー、チェックリスト活用、定期実施。"},{"id":67,"category":"システム開発","question":"DevOpsの概念と継続的デプロイメント(CD)の関係を説明せよ。","explanation":"DevOps：開発と運用の統合文化。CDは中心的実践で、テスト・ステージング・本番への自動デプロイ。フィードバック短い。","choices":null,"correctAnswer":"DevOps：開発と運用の統合文化。CDは中心的実践で、テスト・ステージング・本番への自動デプロイ。フィードバック短い。"},{"id":68,"category":"データベース","question":"グラフデータベースの特徴と従来RDBMSとの効率差を説明せよ。","explanation":"グラフDB：ノード・エッジ直接保存、関連走査高速。RDBMSは複数JOINで効率低い。社会ネットワーク、推奨システム向け。","choices":null,"correctAnswer":"グラフDB：ノード・エッジ直接保存、関連走査高速。RDBMSは複数JOINで効率低い。社会ネットワーク、推奨システム向け。"},{"id":69,"category":"データベース","question":"データガバナンスとデータカタログの役割を説明せよ。","explanation":"ガバナンス：CDO配置、方針・体制・プロセス構築。カタログ：資産可視化、ディスカバリー支援、血統追跡。サイロ化防止。","choices":null,"correctAnswer":"ガバナンス：CDO配置、方針・体制・プロセス構築。カタログ：資産可視化、ディスカバリー支援、血統追跡。サイロ化防止。"},{"id":70,"category":"ネットワーク","question":"ソフトウェア定義ネットワーク(SDN)の概念を説明せよ。","explanation":"SDN：制御プレーン(ルーティング)とデータプレーン(転送)分離、コントローラー一元管理。利点：柔軟性、プログラム可能、トラフィック最適化。","choices":null,"correctAnswer":"SDN：制御プレーン(ルーティング)とデータプレーン(転送)分離、コントローラー一元管理。利点：柔軟性、プログラム可能、トラフィック最適化。"},{"id":71,"category":"IT基礎","question":"並行処理とスレッドセーフの重要性を説明せよ。","explanation":"スレッドセーフ：複数スレッド同時アクセスでデータ整合保持。競合状態：予期しない状態発生。対策：ロック、アトミック操作、イミュータブル設計。テスト困難。","choices":null,"correctAnswer":"スレッドセーフ：複数スレッド同時アクセスでデータ整合保持。競合状態：予期しない状態発生。対策：ロック、アトミック操作、イミュータブル設計。テスト困難。"},{"id":72,"category":"システム開発","question":"障害復旧計画(BCP)とシステム復旧計画(DRP)の関係を説明せよ。","explanation":"BCP：重要事業継続計画。DRP：IT復旧計画(BCP一部)。RPO：許容データ喪失量、RTO：許容停止時間。重要度で設定。","choices":null,"correctAnswer":"BCP：重要事業継続計画。DRP：IT復旧計画(BCP一部)。RPO：許容データ喪失量、RTO：許容停止時間。重要度で設定。"},{"id":73,"category":"システム開発","question":"ITガバナンスフレームワーク(COBIT)と経営層関与を説明せよ。","explanation":"COBIT：APO計画、DS提供、BA支援、MEA監視。IT投資が経営目標達成に寄与確保。経営層：IT戦略整合、投資効果測定。","choices":null,"correctAnswer":"COBIT：APO計画、DS提供、BA支援、MEA監視。IT投資が経営目標達成に寄与確保。経営層：IT戦略整合、投資効果測定。"}, リ安全性がプログラミング言語選択に及ぼす影響を説明せよ。","explanation":"型安全性：変数型の規則遵守(Java型安全)。メモリ安全性：不正アクセス防止(Rust保証)。セキュリティ重視→Rust/Java、高性能→C/C++。","choices":null,"correctAnswer":"型安全性：変数型の規則遵守(Java型安全)。メモリ安全性：不正アクセス防止(Rust保証)。セキュリティ重視→Rust/Java、高性能→C/C++。"}],"chusho":[{"id":1,"category":"中小企業経営","question":"中小企業基本法上、製造業における中小企業の資本金基準はいくらか。","explanation":"中小企業基本法では、製造業における中小企業は資本金1億円以下、かつ従業員300人以下と定義されています。","choices":["3,000万円以下","5,000万円以下","1億円以下","2億円以下"],"correctIndex":2},{"id":2,"category":"中小企業政策","question":"小売業における中小企業の従業員数基準は何人以下か。","explanation":"中小企業基本法では、小売業における中小企業は資本金5,000万円以下、かつ従業員100人以下と定義されています。","choices":["30人以下","50人以下","100人以下","150人以下"],"correctIndex":2},{"id":3,"category":"中小企業経営","question":"卸売業における中小企業の資本金基準はいくらか。","explanation":"中小企業基本法では、卸売業における中小企業は資本金1億円以下、かつ従業員100人以下と定義されています。","choices":["3,000万円以下","1億円以下","5,000万円以下","2億円以下"],"correctIndex":1},{"id":4,"category":"中小企業政策","question":"サービス業における中小企業の従業員数基準は何人以下か。","explanation":"中小企業基本法では、サービス業における中小企業は資本金5,000万円以下、かつ従業員100人以下と定義されています。","choices":["50人以下","100人以下","150人以下","300人以下"],"correctIndex":1},{"id":5,"category":"中小企業経営","question":"経営革新計画の目的として最も適切なものはどれか。","explanation":"経営革新計画は、中小企業が新しい経営方針、経営組織、事業形態、商品・サービス等の導入により経営の向上を図る計画です。","choices":["既存事業の廃止計画","新しい経営方針の導入による経営の向上","組織再編による経営統合","製品の値下げによる販売増"],"correctIndex":1},{"id":6,"category":"中小企業政策","question":"ものづくり補助金の主な対象経費として含まれないものはどれか。","explanation":"ものづくり補助金の対象経費は機械装置費、外注費、専門家経費等です。専従者給与は対象外です。","choices":["機械装置費","人件費","専従者給与","外注費"],"correctIndex":2},{"id":7,"category":"中小企業経営","question":"小規模事業者持続化補助金の補助金額の上限は通常、いくらか。","explanation":"小規模事業者持続化補助金は、通常型で200万円（※最新の制度設計により変わる可能性あり）が上限です。","choices":["100万円","200万円","300万円","500万円"],"correctIndex":1},{"id":8,"category":"中小企業政策","question":"IT導入補助金における「賃上げ・離職率低下」の要件として最も適切なものはどれか。","explanation":"IT導入補助金では、「賃上げ・離職率低下」の指標について、補助金交付前に事業者が宣言することが要件です。","choices":["申請時点で既に実施済み","補助金交付後、事業年度終了日までに実施予定","補助金交付前に宣言","補助対象経費の20%以上の投資"],"correctIndex":2},{"id":9,"category":"中小企業経営","question":"事業承継補助金の対象として最も適切なものはどれか。","explanation":"事業承継補助金は、後継者確保・育成のための経営革新、事業転換、また事業承継に伴う設備投資等が対象です。","choices":["新規起業のための事業費","後継者確保・育成のための経営革新や事業転換に要する経費","既存債務の返済","株式の購入"],"correctIndex":1},{"id":10,"category":"中小企業政策","question":"セーフティネット保証制度の対象としなくても対応できる状況はどれか。","explanation":"セーフティネット保証は、経営難に陥った中小企業を対象とします。業況が好調で資金に余裕がある場合は対象外です。","choices":["取引先の経営悪化の影響を受けている場合","売上が10%以上減少している場合","業況が好調で資金に余裕がある場合","手形交換所の不渡り発生の急増"],"correctIndex":2},{"id":11,"category":"中小企業経営","question":"マル経融資の正式名称は何か。","explanation":"マル経融資は「小規模企業経営改善資金」が正式名称で、商工会議所等の支援を受ける小規模企業向けの融資制度です。","choices":["民営経営融資","無担保小口融資","小規模企業経営改善資金","中小企業短期資金融資"],"correctIndex":2},{"id":12,"category":"中小企業政策","question":"事業再構築補助金の目的として最も適切なものはどれか。","explanation":"事業再構築補助金は、新分野進出、業態転換、事業・業種転換等により、事業再構築を行う中小企業を支援します。","choices":["既存事業の単なる拡大","事業再構築により売上高を増加させる","新商品開発のみに限定","海外進出に限定"],"correctIndex":1},{"id":13,"category":"中小企業経営","question":"中小企業等経営強化法において指定される経営力強化計画の策定対象として最も適切なものはどれか。","explanation":"中小企業等経営強化法は、経営力強化計画を策定する中小企業等が、税制優遇や金融支援等を受けられる制度です。","choices":["上場企業","事業の成長、競争力強化を目指す中小企業等","国有企業","大企業グループの子会社"],"correctIndex":1},{"id":14,"category":"中小企業政策","question":"下請法における親事業者の定義として最も適切なものはどれか。","explanation":"下請法では、親事業者と下請事業者の関係を資本金や従業員数の基準により定義しています。","choices":["全ての大企業","製造業に限定された大企業","下請事業者から注文を受ける事業者","資本金や従業員数の基準に基づき定義される事業者"],"correctIndex":3},{"id":15,"category":"中小企業経営","question":"下請法で禁止される行為として適切なものはどれか。","explanation":"下請法では、下請代金の支払い期限を定めており、現金は納期から20日以内、手形は納期から120日以内が原則です。","choices":["下請事業者と協力する","納期の相談をする","下請代金を受注から60日を超えて支払わない","品質改善の指導"],"correctIndex":2},{"id":16,"category":"中小企業政策","question":"小規模企業振興基本法における小規模企業の定義として最も適切なものはどれか。","explanation":"小規模企業振興基本法では、小規模企業を従業員20人以下（商業・サービス業は5人以下）と定義しています。","choices":["従業員20人以下","従業員50人以下","資本金1,000万円以下","売上高1億円以下"],"correctIndex":0},{"id":17,"category":"中小企業経営","question":"商工会の主な機能として最も適切なものはどれか。","explanation":"商工会は、地域の商工業者の相互扶助の中核的実践機関として、経営相談、情報提供、人材育成等を行います。","choices":["融資の直接実行","商品販売の仲介","地域中小企業の経営支援と経営相談","税務署の代理処理"],"correctIndex":2},{"id":18,"category":"中小企業政策","question":"商工会議所と商工会の設置地域の違いについて最も適切なものはどれか。","explanation":"商工会議所は市部に設置され、商工会は町村部に設置されるという地域分担があります。","choices":["商工会議所は都市部、商工会は町村部","両者は同じ地域に重複して設置される","商工会議所のみが地方に設置","商工会のみが大都市に設置"],"correctIndex":0},{"id":19,"category":"中小企業経営","question":"中小企業白書における「開廃業率」の定義として最も適切なものはどれか。","explanation":"開廃業率は、開業企業数と廃業企業数の合計を企業総数で割った値で表されます。","choices":["その年に廃業した企業数の割合","その年に開業した企業と廃業した企業の合計比率","その年に開業した企業数とその年に廃業した企業数の合計を企業総数で割った値","その年の開業企業数から廃業企業数を引いた値"],"correctIndex":2},{"id":20,"category":"中小企業政策","question":"中小企業の定義で「製造業」と分類される企業の従業員数基準は何人以下か。","explanation":"中小企業基本法では、製造業は資本金1億円以下かつ従業員300人以下と定義されています。","choices":["100人","200人","300人","500人"],"correctIndex":2},{"id":21,"category":"中小企業経営","question":"事業承継において、後継者が存在しない場合の対応方法として最も適切なものはどれか。","explanation":"親族内承継が難しい場合、M&Aによる第三者への事業承継も有効な手段として認識されています。","choices":["M&Aによる第三者承継","廃業のみが選択肢","従業員への給与削減","事業規模の縮小のみ"],"correctIndex":0},{"id":22,"category":"中小企業政策","question":"経営革新計画の認定を受けるための要件として最も適切なものはどれか。","explanation":"経営革新計画は、3年以内に実現可能であることが認定の要件とされています。","choices":["既に実施済みの計画","3年以内に実現可能な計画","10年以上先の計画","個別の業界団体の承認"],"correctIndex":1},{"id":23,"category":"中小企業経営","question":"ものづくり補助金の採択審査における評価項目として最も重視されるものはどれか。","explanation":"ものづくり補助金では、事業計画の革新性、技術的難易度、成長性等が重視されます。","choices":["企業規模の大きさ","革新性と成長性","過去の受給実績","従業員数"],"correctIndex":1},{"id":24,"category":"中小企業政策","question":"小規模事業者持続化補助金の対象経費として最も適切なものはどれか。","explanation":"小規模事業者持続化補助金は、経営課題の解決に必要な広告宣伝費、設備投資等を対象とします。","choices":["従業員の給与全額","建物の購入費","広告宣伝費","融資の利息"],"correctIndex":2},{"id":25,"category":"中小企業経営","question":"IT導入補助金の対象となるIT導入の要件として最も適切なものはどれか。","explanation":"IT導入補助金は、生産性向上に資する会計ソフト、顧客管理システム等のクラウド型IT導入を支援します。","choices":["ハードウェアの購入のみ","生産性向上に資するITツールの導入","自社開発システムのみ","過去に導入したシステムの更新"],"correctIndex":1},{"id":26,"category":"中小企業政策","question":"セーフティネット保証における「貸し渋り対策」の内容として最も適切なものはどれか。","explanation":"セーフティネット保証は、経営難時に保証枠を通常より拡大し、融資を確保しやすくする措置です。","choices":["金利の引き上げ","保証承諾枠の拡大","融資期間の短縮","担保要件の厳格化"],"correctIndex":1},{"id":27,"category":"中小企業経営","question":"マル経融資の特徴として最も適切なものはどれか。","explanation":"マル経融資は、商工会議所等から経営指導を受ける小規模企業向けの制度で、指導を受けることが条件です。","choices":["金利が市場金利と同じ","担保と保証人が必須","商工会議所の経営指導を受けることが条件","返済期間は3年固定"],"correctIndex":2},{"id":28,"category":"中小企業政策","question":"事業再構築補助金の対象経費として最も適切なものはどれか。","explanation":"事業再構築補助金は、事業再構築に必要な設備投資、建物改修費、外注費等を対象とします。","choices":["既存事業で使用していた設備の売却","新分野進出に必要な設備投資","過去3年間の赤字補填","役員報酬の増額"],"correctIndex":1},{"id":29,"category":"中小企業経営","question":"中小企業等経営強化法による税制優遇の対象として最も適切なものはどれか。","explanation":"中小企業等経営強化法では、経営力強化計画に基づく設備投資について、即時償却又は税額控除が認められます。","choices":["固定資産税の免除全額","所得税の控除","機械装置の即時償却又は税額控除","法人住民税の廃止"],"correctIndex":2},{"id":30,"category":"中小企業政策","question":"下請法における買いたたきの禁止について、最も適切な説明はどれか。","explanation":"買いたたき禁止は、通常支払うべき対価を下回る下請代金を一方的に定めることを禁止します。","choices":["全ての価格交渉は禁止","通常の対価を下回る代金を一方的に定めることは禁止","値下げ交渉そのものは禁止","市場価格より高い金額を支払うことを強制"],"correctIndex":1},{"id":31,"category":"中小企業経営","question":"中小企業基本法の目的として最も適切なものはどれか。","explanation":"中小企業基本法は、中小企業の自主性を尊重し、その成長発展を図ることを基本原則としています。","choices":["大企業の成長を加速させる","中小企業の自主性を尊重し、その成長発展を促進する","中小企業を大企業に統合する","中小企業に対し統制を強化する"],"correctIndex":1},{"id":32,"category":"中小企業政策","question":"商工会の設置要件として最も適切なものはどれか。","explanation":"商工会は、商工業者が存在する町村地域において、会員の同意に基づいて設置されます。","choices":["全ての自治体に必須設置","商工業者が存在する町村に設置可能","国の指示により強制設置","民間企業による営利設置のみ"],"correctIndex":1},{"id":33,"category":"中小企業経営","question":"事業承継時における経営権と所有権の分離を最小化するための対策として最も適切なものはどれか。","explanation":"事業承継では、後継者が十分な株式を取得することにより、所有権と経営権を一致させることが重要です。","choices":["後継者に全く権限を与えない","相続人全員に平等に株式を分配する","後継者が十分な株式を取得し、経営権を確保する","経営権を外部から招聘した人物に委譲する"],"correctIndex":2},{"id":34,"category":"中小企業政策","question":"開廃業率が高い業種として中小企業白書で指摘されているものはどれか。","explanation":"中小企業白書では、飲食業、小売業、美容・理容業等のサービス業が高い開廃業率を示しています。","choices":["製造業全般","飲食業、小売業等のサービス業","建設業全般","電気・ガス・水道業"],"correctIndex":1},{"id":35,"category":"中小企業経営","question":"労働生産性の向上が特に重要とされる理由として最も適切なものはどれか。","explanation":"労働生産性の向上は、限られた経営資源で賃金上昇と労働時間短縮を実現するために重要です。","choices":["従業員数の削減のみを目指す","賃金上昇と労働時間短縮 金について、支払い義務を定めています。","choices":["下請事業者の給与決定","下請事業者の採用・解雇","発注した下請代金の支払い義務","下請事業者の経営方針決定"],"correctIndex":2},{"id":45,"category":"中小企業経営","question":"小規模企業振興基本法の目的として最も適切なものはどれか。","explanation":"小規模企業振興基本法は、小規模企業の自主性を尊重し、その経営の発展を図ることを目的としています。","choices":["小規模企業を大企業へ統合させる","小規模企業の自主性を尊重し、その経営の発展を図る","小規模企業の廃業を促進する","国による統制を強化する"],"correctIndex":1},{"id":46,"category":"中小企業政策","question":"商工会議所の会員資格として最も適切なものはどれか。","explanation":"商工会議所の会員は、設立地域内で商工業を営む個人及び法人です。","choices":["市部に住所を有する商工業者","商工会議所の設立地域内で事業を営む個人及び法人","大企業のみ","非営利組織のみ"],"correctIndex":1},{"id":47,"category":"中小企業経営","question":"経営革新計画の認定申請において、商工会等が提出する書類として最も適切なものはどれか。","explanation":"経営革新計画認定申請時は、商工会等が経営課題分析と計画の実現可能性を評価した意見書を提出します。","choices":["社長の給与明細","経営課題の分析と計画実現可能性の評価書","従業員の個人情報","過去10年間の詳細な決算書"],"correctIndex":1},{"id":48,"category":"中小企業政策","question":"ものづくり補助金の採択件数が多い業種として最も適切なものはどれか。","explanation":"ものづくり補助金は製造業を主な対象としており、採択件数が多いのは製造業です。","choices":["不動産業","製造業全般","金融・保険業","娯楽・芸術業"],"correctIndex":1},{"id":49,"category":"中小企業経営","question":"小規模事業者持続化補助金における「経営課題」の例として最も適切なものはどれか。","explanation":"小規模事業者持続化補助金は、販路開拓、生産能力向上等の経営課題解決を支援します。","choices":["役員の個人的な休暇費用","販路開拓の困難さ","役員向けの装飾品購入","役員用乗用車の高級化"],"correctIndex":1},{"id":50,"category":"中小企業政策","question":"IT導入補助金の対象外経費として最も適切なものはどれか。","explanation":"IT導入補助金はハードウェア（パソコン、プリンタ等）の購入は対象外です。","choices":["会計ソフトのクラウド利用料","顧客管理システムの導入費","パソコン本体の購入費","導入支援費"],"correctIndex":2},{"id":51,"category":"中小企業経営","question":"中小企業の経営課題として最も指摘される項目はどれか。","explanation":"中小企業白書では、後継者確保・事業承継が重要な経営課題として指摘されています。","choices":["役員給与の過多","後継者確保","設備の過剰投資","従業員数の超過"],"correctIndex":1},{"id":52,"category":"中小企業政策","question":"セーフティネット保証の認定申請において、必要な書類として最も適切なものはどれか。","explanation":"セーフティネット保証の申請時は、経営状況を説明する書類と対象となる経費等の説明が必要です。","choices":["従業員の個人情報","経営状況を説明する書類と対象経費の算出根拠","役員の趣味嗜好記録","競合企業の経営情報"],"correctIndex":1},{"id":53,"category":"中小企業経営","question":"マル経融資の返済期間として最も適切なものはどれか。","explanation":"マル経融資は、最長7年の返済期間が設定されています。","choices":["1年以内","3年以内","最長7年","10年以上"],"correctIndex":2},{"id":54,"category":"中小企業政策","question":"事業再構築補助金の売上高減少要件として最も適切なものはどれか。","explanation":"事業再構築補助金の売上高減少要件は、直近月と比較して15%以上減少（申請時点から過去3か月間）とされています。","choices":["要件なし","直近月と比較して5%以上減少","直近月と比較して15%以上減少","直近月と比較して30%以上減少"],"correctIndex":2},{"id":55,"category":"中小企業経営","question":"中小企業等経営強化法の適用対象となるための申請先として最も適切なものはどれか。","explanation":"経営力強化計画は都道府県などに認定申請され、認定支援機関の支援を受けて作成されます。","choices":["民間企業のみ","都道府県の中小企業支援センター等","経営企画庁（存在しない）","定められた認定支援機関"],"correctIndex":1},{"id":56,"category":"中小企業政策","question":"下請法における「書面交付」の要件として最も適切なものはどれか。","explanation":"下請法では、親事業者が下請事業者に発注する際、発注内容や代金等を記載した書面を交付することが義務づけられています。","choices":["口頭での発注で十分","発注に関する重要事項を書面で交付する","注文後に書面を送付すればよい","不要である"],"correctIndex":1},{"id":57,"category":"中小企業経営","question":"小規模企業振興基本法における「小規模企業」の従業員数基準で、商業・サービス業の場合はいくらか。","explanation":"小規模企業振興基本法では、商業・サービス業は従業員5人以下、その他業種は20人以下と定義されています。","choices":["5人以下","10人以下","20人以下","50人以下"],"correctIndex":0},{"id":58,"category":"中小企業政策","question":"商工会と商工会議所の両方に関する説明として最も適切なものはどれか。","explanation":"商工会と商工会議所は、どちらも中小企業の経営相談や支援を行う地域的団体です。","choices":["両者は全く異なる組織で関係がない","両者は中小企業の経営支援を行う地域的団体である","商工会議所のみが法定団体である","両者は同じ地域に必ず重複して設置される"],"correctIndex":1},{"id":59,"category":"中小企業経営","question":"中小企業白書に記載される統計データの対象期間として最も一般的なものはどれか。","explanation":"中小企業白書は毎年作成され、通常2年前のデータを基に統計が掲載されます。","choices":["1年前の1年間","2年前の1年間","直近の1年間","過去10年間"],"correctIndex":1},{"id":60,"category":"中小企業政策","question":"中小企業支援施策の総合的な情報源として最も適切なものはどれか。","explanation":"中小企業庁の「ミラサポプラス」や「Jグランプ」等が、各種支援施策の総合情報を提供しています。","choices":["新聞記事のみ","中小企業庁の「ミラサポプラス」等の情報サイト","特定の銀行のみ","民間コンサルタントのブログのみ"],"correctIndex":1},{"id":61,"category":"中小企業経営","question":"中小企業の経営理念や戦略策定の重要性が強調される理由として最も適切なものはどれか。","explanation":"経営理念や戦略は、経営判断の一貫性を確保し、組織全体の目標達成を容易にします。","choices":["大企業と差別化できるから","経営判断の一貫性を確保し、従業員の方向性を統一するため","経営者の権限を強化するため","税務署へのアピール"],"correctIndex":1},{"id":62,"category":"中小企業政策","question":"経営革新計画認定企業が受けられる特典として最も適切なものはどれか。","explanation":"経営革新計画の認定を受けると、各種支援施策（融資、補助金等）の対象となります。","choices":["税務申告の免除","中小企業等経営強化法に基づく各種支援施策の対象","給与の補助","従業員数の制限解除"],"correctIndex":1},{"id":63,"category":"中小企業経営","question":"ものづくり補助金における「事業計画書」の提出期限として最も適切なものはどれか。","explanation":"ものづくり補助金は公募期間内に事業計画書を含む申請書類を提出する必要があります。","choices":["実施後でよい","補助金交付後でよい","公募期間内に提出する必要がある","翌年度に提出"],"correctIndex":2},{"id":64,"category":"中小企業政策","question":"小規模事業者持続化補助金の補助対象経費として除外されるものはどれか。","explanation":"小規模事業者持続化補助金では、人件費は直接的には対象外です。","choices":["店舗改装費","機器・工具費","人件費","広告宣伝費"],"correctIndex":2},{"id":65,"category":"中小企業経営","question":"IT導入補助金における「労働生産性」の指標として最も適切なものはどれか。","explanation":"労働生産性は売上高を労働投入量で割った値で、IT導入による改善効果を測定します。","choices":["従業員数の削減率のみ","売上高÷労働投入量","設備投資額","役員数"],"correctIndex":1},{"id":66,"category":"中小企業政策","question":"セーフティネット保証の「金融円滑化法」との関係について最も適切なものはどれか。","explanation":"セーフティネット保証は、金融円滑化法終了後の経営難企業の資金調達を支援する仕組みです。","choices":["金融円滑化法が廃止された後の受け皿","全く無関係","金融円滑化法に統合された","現在も並行して適用"],"correctIndex":0},{"id":67,"category":"中小企業経営","question":"事業承継時の組織再編として最も適切な手法はどれか。","explanation":"事業承継は段階的に後継者を育成し、権限を移譲することで、事業継続性を確保します。","choices":["経営者の急激な交代のみ","計画的な後継者育成と段階的な権限移譲","後継者を置かず外部人材に全て委譲","経営環境の変化を無視した方針継続"],"correctIndex":1},{"id":68,"category":"中小企業政策","question":"中小企業のデジタル化支援における国の重点施策として最も適切なものはどれか。","explanation":"IT導入補助金等により、中小企業のデジタル化・DX推進を支援しています。","choices":["IT導入補助金による支援","デジタル化の強制","大企業のみを対象","技術供与の禁止"],"correctIndex":0},{"id":69,"category":"中小企業経営","question":"下請法上の「親事業者」の定義で製造業の場合、資本金基準はいくらか。","explanation":"下請法では、製造業における親事業者を資本金1億円超と定義しています。","choices":["1,000万円超","3,000万円超","1億円超","制限なし"],"correctIndex":2},{"id":70,"category":"中小企業政策","question":"商工会の会員構成として最も適切なものはどれか。","explanation":"商工会の会員は、商工会設立地域内で商工業を営む個人及び法人です。","choices":["商工業者のみ","商工業者及び一般市民","学識経験者のみ","地域の商工業者及び関係機関職員"],"correctIndex":0},{"id":71,"category":"中小企業経営","question":"経営革新とは具体的にはどのようなことか。","explanation":"経営革新は経営力強化計画と並んで、中小企業施策の重要な柱です。認定を受けると各種支援施策の対象となります。","choices":null,"correctAnswer":"経営革新とは、中小企業が新しい経営方針、経営組織、事業形態、商品・サービスなどの導入により経営の向上を図ることであり、3年以内に実現可能であることが要件である。"},{"id":72,"category":"中小企業政策","question":"ものづくり補助金の支援対象となる事業の要件を説明せよ。","explanation":"ものづくり補助金は、中小企業の製造業における競争力強化を目的とした支援制度です。","choices":null,"correctAnswer":"ものづくり補助金は、中小企業が新商品開発、新技術導入、生産プロセス改善などの製造業等の革新的な設備投資を行う場合に、その経費の一部を補助する制度である。"},{"id":73,"category":"中小企業経営","question":"小規模事業者持続化補助金の対象者と対象経費について述べよ。","explanation":"小規模事業者持続化補助金は、小規模企業の経営課題解決と経営改善を支援する制度です。","choices":null,"correctAnswer":"対象者は従業員20人以下（商業・サービス業は5人以下）の小規模事業者であり、対象経費は経営課題の解決に必要な広告宣伝費、設備投資、建物改修費などである。"},{"id":74,"category":"中小企業政策","question":"IT導入補助金の目的と対象者について説明せよ。","explanation":"IT導入補助金は、中小企業のデジタル化・DX推進を支援する重要な施策です。","choices":null,"correctAnswer":"IT導入補助金は、中小企業が会計ソフトや顧客管理システム等のクラウド型ITツールを導入し、業務効率化と生産性向上を図る場合に経費の一部を補助する制度である。"},{"id":75,"category":"中小企業経営","question":"セーフティネット保証制度の概要と対象企業について述べよ。","explanation":"セーフティネット保証は、経営難時の資金確保を支援する重要な制度です。","choices":null,"correctAnswer":"セーフティネット保証は、経営が困難になった中小企業が金融機関から融資を受ける際に、信用保証協会が一般保証より高い保証を行う制度である。売上減少、取引先経営悪化など複数の認定要件がある。"},{"id":76,"category":"中小企業政策","question":"マル経融資（小規模企業経営改善資金）の特徴と融資条件について説明せよ。","explanation":"マル経融資は、小規模企業の経営改善を支援する歴史のある制度です。","choices":null,"correctAnswer":"マル経融資は、商工会議所等から経営指導を受ける小規模企業向けの融資制度で、融資額は500万円以下、返済期間は最長7年、金利は固定金利である。担保は不要（信用保証協会保証）。"},{"id":77,"category":"中小企業経営","question":"事業再構築補助金における「事業再構築」の定義を述べよ。","explanation":"事業再構築補助金は、COVID-19の影響等から脱却し、経営基盤を強化する企業を支援します。","choices":null,"correctAnswer":"事業再構築とは、新分野進出、業態転換、事業転換、そして新製品・サービス開発による地域経済の活性化等により、経営の革新を実現することである。"},{"id":78,"category":"中小企業政策","question":"中小企業等経営強化法における経営力強化計画とは何か説明せよ。","explanation":"経営力強化計画は、中小企業の成長戦略実現を支援する重要な枠組みです。","choices":null,"correctAnswer":"経営力強化計画は、中小企業が認定支援機関と協力して、事業の成長、競争力強化を目指し、機械装置等への投資を含む3年程度の経営計画であり、認定されると税制優遇や金融支援の対象となる。"},{"id":79,"category":"中小企業経営","question":"下請法における親事業者の禁止行為（買いたたき、下請代金遅延等）を具体的に述べよ。","explanation":"下請法は、親事業者と下請事業者の取引上の立場の格差を是正する重要な法律です。","choices":null,"correctAnswer":"買いたたきは通常支払うべき対価を下回る代金を一方的に定めることであり、下請代金遅延は現金は20日以内、手形は120日以内の支払期限を超えることである。その他、一方的な納期変更や代金減額、返品等が禁止される。"},{"id":80,"category":"中小企業政策","question":"小規模企業振興基本法の基本方針について述べよ。","explanation":"小規模企業振興基本法は、小規業の経営基盤強化と持続的発展を目指す法律です。","choices":null,"correctAnswer":"小規模企業振興基本法は、小規模企業の自主性を尊重し、その経営の発展を図るため、国が経営相談、人材育成、資金確保等の施策を講じることを基本としている。"},{"id":81,"category":"中小企業経営","question":"商工会と商工会議所の主な相違点について述べよ。","explanation":"商工会と商工会議所は、日本の中小企業支援の中核的な地域機関です。","choices":null,"correctAnswer":"商工会は町村部に設置される任意団体であり、商工会議所は市部に設置される法定団体である。両者は地域的に分担して中小企業の経営支援を行っている。"},{"id":82,"category":"中小企業政策","question":"中小企業白書に記載される主要統計指標としてどのようなものがあるか述べよ。","explanation":"中小企業白書は、毎年の中小企業の統計・分析を行う重要な資料です。","choices":null,"correctAnswer":"開廃業率、従業者数、出荷額、付加価値、業種別特性、地域別特性等が記載される。これらにより日本の中小企業の現状と経営課題を把握することができる。"},{"id":83,"category":"中小企業経営","question":"事業承継における後継者確保の課題とその対策について述べよ。","explanation":"事業承継問題は、日本の中小企業の重要な経営課題です。","choices":null,"correctAnswer":"後継者確保の課題は、少子高齢化により親族内承継の候補者減少である。対策として、M&Aによる第三者承継、従業員等の社内昇格、事業の組織再編等が挙げられる。"},{"id":84,"category":"中小企業政策","question":"中小企業のデジタル化（DX）推進が重要とされる理由を述べよ。","explanation":"中小企業のデジタル化・DX推進は、国の重要な支援施策の一つです。","choices":null,"correctAnswer":"デジタル化は、業務効率化による生産性向上、遠隔勤務など働き方改革、顧客開拓の新チャネル創出、経営判断の迅速化等をもたらし、中小企業の競争力強化につながるためである。"},{"id":85,"category":"中小企業経営","question":"経営革新計画の認定要件について述べよ。","explanation":"経営革新計画の認定により、各種支援施策へのアクセスが容易になります。","choices":null,"correctAnswer":"経営革新計画の認定要件は、①新しい経営方針等の導入であること、②3年以内に実現可能であること、③経営の向上が見込まれることである。商工会等の支援により計画を策定し、都道府県に申請する。"},{"id":86,"category":"中小企業政策","question":"中小企業基本法の改正により、どのような施策が追加されたか述べよ。","explanation":"中小企業基本法は、時代の変化に応じて支援内容を拡充し続けています。","choices":null,"correctAnswer":"近年の改正により、事業承継支援、生産性向上支援、地域経済活性化支援等が重点施策として位置づけられている。特に経営革新計画認定企業への各種支援の拡充が進められている。"},{"id":87,"category":"中小企業経営","question":"中小企業における労働生産性向上の重要性と課題について述べよ。","explanation":"労働生産性向上は、中小企業の持続的発展の鍵です。","choices":null,"correctAnswer":"労働生産性向上により、賃金上昇と労働時間短縮の両立が可能になる。課題は、設備投資費用の負担、デジタル化への対応、人材育成の時間確保である。"},{"id":88,"category":"中小企業政策","question":"セーフティネット保証における「リスケジューリング対応」について述べよ。","explanation":"リスケジューリングは、経営難企業の資金繰りを緩和する重要な支援です。","choices":null,"correctAnswer":"リスケジューリング対応は、既に返済中の借入金の返済期間を延長し、返済負担を軽減する措置である。経営が著しく困難になった企業が対象となり、金融機関と協力して実施される。"},{"id":89,"category":"中小企業経営","question":"ものづくり補助金の事業計画書に記載すべき主要項目を述べよ。","explanation":"ものづくり補助金の申請では、質の高い事業計画書が採択の重要なポイントです。","choices":null,"correctAnswer":"事業計画書には、現状分析、事業の課題、経営革新の内容、投資計画、資金計画、効果測定指標等を記載する。計画の実現可能性と革新性が審査の重点となる。"},{"id":90,"category":"中小企業政策","question":"小規模事業者持続化補助金における「事業のテーマ」について説明せよ。","explanation":"テーマの設定により、補助金の使途が明確になり、経営改善効果が高まります。","choices":null,"correctAnswer":"事業のテーマは、経営課題の解決、販路開拓、生産能力向上等であり、補助対象経費はテーマに合致した必要な経費である。複数のテーマを組み合わせることも可能である。"},{"id":91,"category":"中小企業経営","question":"IT導入補助金における「労働生産性向上」の測定方法について述べよ。","explanation":"効果測定により、補助金の真の効果を把握できます。","choices":null,"correctAnswer":"労働生産性は売上高を労働投入量で割った値で測定される。IT導入前後で労働生産性の向上を実績報告時に証明することが要件である。"},{"id":92,"category":"中小企業政策","question":"事業再構築補助金の「新分野進出」と「業態転換」の違いを述べよ。","explanation":"これらは異なる経営戦略であり、それぞれ異なる支援メニューが用意されています。","choices":null,"correctAnswer":"新分野進出は全く新しい分野に進出することであり、業態転換は既存事業の形態を変更することである。例えば、製造業から卸売業への転換は業態転換である。"},{"id":93,"category":"中小企業経営","question":"認定経営革新等支援機関の役割について述べよ。","explanation":"認定支援機関は、政府支援施策の重要な実施機関です。","choices":null,"correctAnswer":"認定支援機関は、商工会、金融機関、税理士事務所等であり、経営相談、計画策定支援、融資や補助金の申請支援等を行う。制度利用企業の経営改善を実現することが使命である。"},{"id":94,"category":"中小企業政策","question":"下請法における「買いたたき禁止」の実務上の意味を述べよ。","explanation":"買いたたき禁止は、下請事業者の経営基盤を守る重要な規定です。","choices":null,"correctAnswer":"買いたたき禁止により、下請事業者の経営を支える適正な代金支払いが確保される。親事業者は、下請事業者の経営状況を考慮した対価を設定する義務がある。"},{"id":95,"category":"中小企業経営","question":"小規模企業振興基本法に基づく国の支援施策について述べよ。","explanation":"小規模企業振興基本法は、小規業の経営基盤強化を目指す基本的な枠組みです。","choices":null,"correctAnswer":"国は、経営相談、人材育成、資金確保、税制優遇、技術開発支援等を含む総合的な支援施策を講じる。商工会、商工会議所等の地域機関と連携して実施される。"},{"id":96,"category":"中小企業政策","question":"商工会による経営支援の具体的な内容について述べよ。","explanation":"商工会は、地域中小企業の経営の質的向上を図る重要な機関です。","choices":null,"correctAnswer":"経営相談、簿記記帳指導、融資制度のあっせん、研修会実施、情報提供等が含まれる。マル経融資の申請支援も重要な役割である。"},{"id":97,"category":"中小企業経営","question":"中小企業白書における「業種別特性」とは何を指すのか説明せよ。","explanation":"業種別特性の理解は、的確な支援施策の設計に不可欠です。","choices":null,"correctAnswer":"業種別特性とは、製造業、建設業、卸売業、小売業等の業種ごとの経営規模、従業者数、経営課題、成長率等の違いを指す。各業種の特性を理解することは経営支援の基本である。"},{"id":98,"category":"中小企業政策","question":"経営革新計画認定企業が受けられる支援の種類を述べよ。","explanation":"経営革新計画の認定は、複数の支援制度へのアクセスを開く重要な関門です。","choices":null,"correctAnswer":"政策金融機関による低金利融資、中小企業等経営強化法に基づく各種補助金、税制優遇（固定資産税等）、債務保証等が挙げられる。認定により複合的な支援が受けやすくなる。"},{"id":99,"category":"中小企業経営","question":"中小企業における組織文化や人材育成の重要性について述べよ。","explanation":"人的資本は、中小企業の最大の資産です。","choices":null,"correctAnswer":"組織文化は従業員のモチベーションと生産性に影響し、人材育成は企業の競争力を決定する。特に後継者育成は事業承継の成功に不可欠である。"},{"id":100,"category":"中小企業政策","question":"新型コロナウイルス感染症の影響下で、中小企業向けに導入・拡充された支援施策の例を述べよ。","explanation":"危機下での政策対応は、中小企業支援制度の充実に大きく寄与しました。","choices":null,"correctAnswer":"持続化給付金、雇用調整助成金、セーフティネット保証の要件緩和、実質無利子・無担保融資、事業再構築補助金等が挙げられる。経営基盤の回復と新たな事業展開を支援した。"},{"id":101,"category":"中小企業経営","question":"経営課題の分析手法について述べよ。","explanation":"経営課題の正確な把握が、適切な施策選択の前提条件です。","choices":null,"correctAnswer":"SWOT分析、財務分析、顧客分析等を用いて、経営の強み・弱み・機会・脅威を整理する。経営革新計画や経営力強化計画の策定時には、こうした分析が不可欠である。"},{"id":102,"category":"中小企業政策","question":"中小企業への融資における信用保証協会の役割を述べよ。","explanation":"信用保証協会は、中小企業金融の重要な支援機関です。","choices":null,"correctAnswer":"信用保証協会は、金融機関の融資に対して保証を行い、中小企業の資金調達を容易にする。セーフティネット保証やマル経融資等において重要な役割を果たしている。"}]};

    const REVIEW_INTERVALS = [1, 7, 16, 28];
    const formatDate = (date) => {
      const d = new Date(date);
      return d.getFullYear() + "/" + String(d.getMonth()+1).padStart(2,"0") + "/" + String(d.getDate()).padStart(2,"0") + " " + String(d.getHours()).padStart(2,"0") + ":" + String(d.getMinutes()).padStart(2,"0");
    };
    const addDays = (date, days) => { const r = new Date(date); r.setDate(r.getDate()+days); return r; };

    // LocalStorage helpers
    const loadState = (key, def) => { try { const v = localStorage.getItem(key); return v ? JSON.parse(v) : def; } catch(e) { return def; } };
    const saveState = (key, val) => { try { localStorage.setItem(key, JSON.stringify(val)); } catch(e) {} };

    // ============ メインApp ============
    function App() {
      const [page, setPage] = useState("home");
      const [selectedSubject, setSelectedSubject] = useState(null);
      const [startQuestionIndex, setStartQuestionIndex] = useState(null);
      const [isSubscribed, setIsSubscribed] = useState(() => loadState("shindan_sub", false));
      const [results, setResults] = useState(() => loadState("shindan_results", []));
      const [reviewLog, setReviewLog] = useState(() => loadState("shindan_review", []));

      useEffect(() => { saveState("shindan_sub", isSubscribed); }, [isSubscribed]);
      useEffect(() => { saveState("shindan_results", results); }, [results]);
      useEffect(() => { saveState("shindan_review", reviewLog); }, [reviewLog]);

      const totalQuestions = useMemo(() => {
        let t = 0;
        Object.keys(ALL_QUESTIONS).forEach(k => t += ALL_QUESTIONS[k].length);
        return t;
      }, []);

      const getReviewItems = useCallback(() => {
        const now = new Date();
        const items = [];
        reviewLog.forEach(log => {
          REVIEW_INTERVALS.forEach(days => {
            const reviewDate = addDays(log.studiedAt, days);
            const diff = (reviewDate - now) / (1000*60*60*24);
            if (diff <= 1 && diff >= -1) {
              const subjectQuestions = ALL_QUESTIONS[log.subject] || [];
              const q = subjectQuestions.find(q => q.id === log.questionId);
              if (q && !items.find(i => i.subject === log.subject && i.id === q.id && i.days === days)) {
                items.push({...q, subject: log.subject, days, reviewDate, studiedAt: log.studiedAt});
              }
            }
          });
        });
        return items;
      }, [reviewLog]);

      const handleResult = (subject, questionId, correct) => {
        setResults(prev => [...prev, {subject, questionId, correct, date: new Date().toISOString()}]);
        setReviewLog(prev => {
          const existing = prev.find(r => r.subject === subject && r.questionId === questionId);
          if (existing) return prev.map(r => (r.subject === subject && r.questionId === questionId) ? {...r, studiedAt: new Date().toISOString()} : r);
          return [...prev, {subject, questionId, studiedAt: new Date().toISOString()}];
        });
      };

      const selectSubject = (key) => {
        setSelectedSubject(key);
        setStartQuestionIndex(null);
        setPage("quiz");
      };

      const goHome = () => {
        setSelectedSubject(null);
        setStartQuestionIndex(null);
        setPage("home");
      };

      const goToQuestion = (subjectKey, questionIndex) => {
        setSelectedSubject(subjectKey);
        setStartQuestionIndex(questionIndex);
        setPage("quiz");
      };

      return (
        <div>
          <header className="header">
            <div className="header-inner">
              <h1 className="header-title" onClick={goHome}>📚 中小企業診断士 一問一答 v2</h1>
              <div>{isSubscribed ? <span className="badge-premium">Premium</span> : <span className="badge-free">Free</span>}</div>
            </div>
          </header>

          <nav className="nav">
            {[{key:"home",label:"ホーム",icon:"🏠"},{key:"list",label:"一覧",icon:"📋"},{key:"stats",label:"成績",icon:"📊"},{key:"review",label:"復習",icon:"🔔"},{key:"subscription",label:"プラン",icon:"⭐"}].map(item => (
              <button key={item.key} onClick={() => { setPage(item.key); if(item.key==="home") { setSelectedSubject(null); setStartQuestionIndex(null); } }} className={"nav-btn" + (page===item.key?" active":"")}>
                <span className="nav-icon">{item.icon}</span>
                <span className="nav-label">{item.label}</span>
              </button>
            ))}
          </nav>

          <main className="main">
            {page==="home" && <HomePage onSelect={selectSubject} totalQ={totalQuestions} totalA={results.length} reviewCount={isSubscribed ? getReviewItems().length : 0} results={results} />}
            {page==="quiz" && selectedSubject && <QuizPage subjectKey={selectedSubject} questions={ALL_QUESTIONS[selectedSubject] || []} onResult={handleResult} onBack={goHome} results={results} startIndex={startQuestionIndex} />}
            {page==="quiz" && !selectedSubject && <SubjectSelectPage onSelect={selectSubject} results={results} />}
            {page==="list" && <QuestionListPage results={results} onGoToQuestion={goToQuestion} />}
            {page==="stats" && <StatsPage results={results} isSubscribed={isSubscribed} onSubscribe={() => setPage("subscription")} />}
            {page==="review" && <ReviewPage reviewItems={getReviewItems()} isSubscribed={isSubscribed} onSubscribe={() => setPage("subscription")} onStartReview={(subj) => { setSelectedSubject(subj); setStartQuestionIndex(null); setPage("quiz"); }} />}
            {page==="subscription" && <SubscriptionPage isSubscribed={isSubscribed} onToggle={() => setIsSubscribed(!isSubscribed)} />}
          </main>
        </div>
      );
    }

    // ============ ホーム ============
    function HomePage({onSelect, totalQ, totalA, reviewCount, results}) {
      return (
        <div>
          <div className="hero">
            <div className="hero-emoji">📖</div>
            <h2 className="hero-title">中小企業診断士試験対策</h2>
            <p className="hero-sub">1次試験 全7科目 一問一答</p>
            <p className="hero-count">収録 {totalQ}問 ｜ 回答 {totalA}問 ｜ 要復習 {reviewCount}問</p>
          </div>

          <h3 style={{fontSize:16, fontWeight:700, color:"#1e293b", marginBottom:10}}>科目を選んで学習</h3>
          <div className="subject-grid">
            {Object.entries(SUBJECTS).map(([key, subj]) => {
              const qs = ALL_QUESTIONS[key] || [];
              const subResults = results.filter(r => r.subject === key);
              const answered = new Set(subResults.map(r => r.questionId)).size;
              return (
                <div key={key} className="subject-card" style={{borderLeftColor: subj.color}} onClick={() => onSelect(key)}>
                  <div className="subject-icon">{subj.icon}</div>
                  <div className="subject-info">
                    <div className="subject-name">{subj.name}</div>
                    <div className="subject-meta">{qs.length}問収録 ・ {answered}問回答済</div>
                  </div>
                  <div className="subject-arrow">›</div>
                </div>
              );
            })}
          </div>

          <div className="info-card">
            <h3 className="info-title">学習のポイント</h3>
            <p className="info-text">「最高の勉強法」（安川康介 著）に基づく復習スケジュールで効率的に記憶を定着させましょう。学習した1日後、7日後、16日後、28日後に復習することで、忘却曲線に対抗します。</p>
          </div>
        </div>
      );
    }

    // ============ 科目選択 ============
    function SubjectSelectPage({onSelect, results}) {
      return (
        <div>
          <h2 className="section-title">✏️ 科目を選択</h2>
          <div className="subject-grid">
            {Object.entries(SUBJECTS).map(([key, subj]) => {
              const qs = ALL_QUESTIONS[key] || [];
              const subResults = results.filter(r => r.subject === key);
              return (
                <div key={key} className="subject-card" style={{borderLeftColor: subj.color}} onClick={() => onSelect(key)}>
                  <div className="subject-icon">{subj.icon}</div>
                  <div className="subject-info">
                    <div className="subject-name">{subj.name}</div>
                    <div className="subject-meta">{qs.length}問 ・ 回答{subResults.length}回</div>
                  </div>
                  <div className="subject-arrow">›</div>
                </div>
              );
            })}
          </div>
        </div>
      );
    }

    // ============ 問題一覧（v2新機能） ============
    function QuestionListPage({results, onGoToQuestion}) {
      const subjectKeys = Object.keys(SUBJECTS);
      const [selectedSubject, setSelectedSubject] = useState(subjectKeys[0]);

      const questions = ALL_QUESTIONS[selectedSubject] || [];
      const subResults = results.filter(r => r.subject === selectedSubject);

      const getQuestionStatus = (qId) => {
        const qResults = subResults.filter(r => r.questionId === qId);
        if (qResults.length === 0) return "unanswered";
        return qResults[qResults.length - 1].correct ? "correct" : "incorrect";
      };

      const answeredCount = new Set(subResults.map(r => r.questionId)).size;

      const groupedByCategory = {};
      questions.forEach((q, i) => {
        if (!groupedByCategory[q.category]) groupedByCategory[q.category] = [];
        groupedByCategory[q.category].push({...q, originalIndex: i});
      });

      return (
        <div>
          <h2 className="section-title">📋 問題一覧</h2>
          <select className="list-subject-select" value={selectedSubject} onChange={e => setSelectedSubject(e.target.value)}>
            {subjectKeys.map(key => (
              <option key={key} value={key}>{SUBJECTS[key].icon} {SUBJECTS[key].name}</option>
            ))}
          </select>
          <div className="list-summary">回答済み {answeredCount} / 全{questions.length}問</div>

          {Object.entries(groupedByCategory).map(([cat, qs]) => (
            <div key={cat}>
              <div className="list-category-header">{cat}</div>
              {qs.map((q) => {
                const status = getQuestionStatus(q.id);
                const statusIcon = status === "correct" ? "✅" : status === "incorrect" ? "❌" : "⬜";
                return (
                  <div key={q.id} className="question-list-item" onClick={() => onGoToQuestion(selectedSubject, q.originalIndex)}>
                    <span className="ql-num">Q{q.originalIndex + 1}</span>
                    <span className="ql-text">{q.question.length > 40 ? q.question.substring(0, 40) + "..." : q.question}</span>
                    <span className="ql-status">{statusIcon}</span>
                  </div>
                );
              })}
            </div>
          ))}
        </div>
      );
    }

    // ============ クイズ（v2: 前の問題ボタン + 正答履歴） ============
    function QuizPage({subjectKey, questions, onResult, onBack, results, startIndex}) {
      const [idx, setIdx] = useState(0);
      const [flipped, setFlipped] = useState(false);
      const [userAnswer, setUserAnswer] = useState("");
      const [selectedChoice, setSelectedChoice] = useState(null);
      const [judged, setJudged] = useState(null);
      const [orderedQuestions, setOrderedQuestions] = useState([]);
      const [history, setHistory] = useState([]);

      useEffect(() => {
        if (startIndex !== null && startIndex !== undefined) {
          setOrderedQuestions([...questions]);
          setIdx(startIndex);
        } else {
          setOrderedQuestions([...questions].sort(() => Math.random() - 0.5));
          setIdx(0);
        }
        setFlipped(false); setUserAnswer(""); setSelectedChoice(null); setJudged(null); setHistory([]);
      }, [questions, startIndex]);

      const current = orderedQuestions[idx];
      if (!current) return <div style={{textAlign:"center",padding:40,color:"#6b7280"}}>読み込み中...</div>;
      const isChoice = current.choices !== null && current.choices !== undefined;
      const labels = ["ア","イ","ウ","エ"];
      const subj = SUBJECTS[subjectKey];

      const handleFlip = () => {
        if (!flipped) {
          const correct = isChoice ? selectedChoice === current.correctIndex : false;
          setJudged(isChoice ? (correct ? "correct" : "incorrect") : null);
          setFlipped(true);
        }
      };

      const handleNext = () => {
        if (judged) onResult(subjectKey, current.id, judged === "correct");
        setHistory(prev => [...prev, idx]);
        setFlipped(false); setUserAnswer(""); setSelectedChoice(null); setJudged(null);
        setIdx(prev => (prev + 1) % orderedQuestions.length);
      };

      const handlePrev = () => {
        if (history.length === 0) return;
        const prevIdx = history[history.length - 1];
        setHistory(prev => prev.slice(0, -1));
        setFlipped(false); setUserAnswer(""); setSelectedChoice(null); setJudged(null);
        setIdx(prevIdx);
      };

      const progress = ((idx + 1) / orderedQuestions.length) * 100;

      // v2: 正答履歴
      const questionHistory = (results || []).filter(r => r.subject === subjectKey && r.questionId === current.id).reverse().slice(0, 10);

      return (
        <div>
          <button className="btn-back" onClick={onBack}>← 科目一覧に戻る</button>
          <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:12}}>
            <span style={{fontSize:24}}>{subj.icon}</span>
            <span style={{fontSize:16,fontWeight:700,color:subj.color}}>{subj.name}</span>
          </div>
          <div className="progress-wrap">
            <div className="progress-bar"><div className="progress-fill" style={{width: progress+"%", background: subj.color}} /></div>
            <span className="progress-text">{idx+1} / {orderedQuestions.length}</span>
          </div>
          <div className="cat-badge">{current.category}</div>

          <div className="card">
            {!flipped ? (
              <div>
                <div className="card-label">Q.</div>
                <p className="q-text">{current.question}</p>
                {isChoice ? (
                  <div className="choices">
                    {current.choices.map((c,i) => (
                      <button key={i} onClick={() => setSelectedChoice(i)} className={"choice-btn" + (selectedChoice===i?" selected":"")}>
                        <span className="choice-num">{labels[i]}</span><span>{c}</span>
                      </button>
                    ))}
                  </div>
                ) : (
                  <textarea className="answer-input" placeholder="回答を入力してください..." value={userAnswer} onChange={e => setUserAnswer(e.target.value)} rows={3} />
                )}
                <button className="btn-action" onClick={handleFlip} disabled={isChoice && selectedChoice===null} style={{opacity: isChoice && selectedChoice===null ? 0.5 : 1}}>
                  解答を確認する 🔄
                </button>
                {history.length > 0 && (
                  <div style={{marginTop:8}}>
                    <button className="btn-prev" onClick={handlePrev}>← 前の問題</button>
                  </div>
                )}
              </div>
            ) : (
              <div>
                {isChoice && <div className={"result-banner " + (judged==="correct"?"result-correct":"result-incorrect")}>{judged==="correct" ? "⭕ 正解！" : "❌ 不正解"}</div>}
                <div className="card-label">A.</div>
                <p className="answer-text">{isChoice ? labels[current.correctIndex] + ". " + current.choices[current.correctIndex] : current.correctAnswer}</p>
                <div className="explain-box">
                  <div className="explain-label">解説</div>
                  <p className="explain-text">{current.explanation}</p>
                </div>
                {!isChoice && judged === null && (
                  <div className="self-judge">
                    <p className="self-judge-label">正解できましたか？</p>
                    <div className="judge-btns">
                      <button className="judge-btn judge-ok" onClick={() => setJudged("correct")}>⭕ 正解</button>
                      <button className="judge-btn judge-ng" onClick={() => setJudged("incorrect")}>❌ 不正解</button>
                    </div>
                  </div>
                )}
                {(isChoice || judged !== null) && (
                  <div className="quiz-nav-btns">
                    {history.length > 0 && <button className="btn-prev" onClick={handlePrev}>← 前の問題</button>}
                    <button className="btn-next" onClick={handleNext}>次の問題へ →</button>
                  </div>
                )}
                {questionHistory.length > 0 && (
                  <div className="history-timeline">
                    <div className="history-timeline-title">📊 この問題の回答履歴</div>
                    {questionHistory.map((h, i) => (
                      <div key={i} className="history-timeline-item">
                        <span className="ht-icon">{h.correct ? "⭕" : "❌"}</span>
                        <span className={"ht-label " + (h.correct ? "ht-correct" : "ht-incorrect")}>{h.correct ? "正解" : "不正解"}</span>
                        <span className="ht-date">{formatDate(h.date)}</span>
                      </div>
                    ))}
                  </div>
                )}
              </div>
            )}
          </div>
        </div>
      );
    }

    // ============ 成績 ============
    function StatsPage({results, isSubscribed, onSubscribe}) {
      if (!isSubscribed) return (
        <div className="lock-card">
          <div className="lock-icon">🔒</div>
          <h2 className="lock-title">成績カウント機能</h2>
          <p className="lock-text">成績の記録・閲覧にはPremiumプランへの登録が必要です。</p>
          <button className="btn-premium" onClick={onSubscribe}>Premiumプランを見る</button>
        </div>
      );

      const total = results.length;
      const correct = results.filter(r => r.correct).length;
      const accuracy = total > 0 ? Math.round((correct/total)*100) : 0;

      return (
        <div>
          <h2 className="section-title">📊 学習成績</h2>
          <div className="stats-row">
            <div className="stat-card"><div className="stat-num">{total}</div><div className="stat-label">総回答数</div></div>
            <div className="stat-card"><div className="stat-num" style={{color:"#27ae60"}}>{correct}</div><div className="stat-label">正答数</div></div>
            <div className="stat-card"><div className="stat-num" style={{color:"#2980b9"}}>{accuracy}%</div><div className="stat-label">正答率</div></div>
          </div>

          <h3 className="sub-title">科目別正答率</h3>
          {Object.entries(SUBJECTS).map(([key, subj]) => {
            const subResults = results.filter(r => r.subject === key);
            const subCorrect = subResults.filter(r => r.correct).length;
            const pct = subResults.length > 0 ? Math.round((subCorrect/subResults.length)*100) : 0;
            const qs = ALL_QUESTIONS[key] || [];
            return (
              <div key={key} className="subject-stats-card">
                <div className="subject-stats-icon">{subj.icon}</div>
                <div className="subject-stats-info">
                  <div className="subject-stats-name">{subj.name}</div>
                  <div className="subject-stats-detail">{subResults.length}回答 / {qs.length}問中 ・ 正答{subCorrect}</div>
                  <div className="subject-stats-bar"><div className="subject-stats-fill" style={{width:pct+"%",background:subj.color}} /></div>
                </div>
                <div className="subject-stats-pct" style={{color: subResults.length > 0 ? subj.color : "#d1d5db"}}>{subResults.length > 0 ? pct+"%" : "—"}</div>
              </div>
            );
          })}

          <h3 className="sub-title">最近の学習履歴</h3>
          <div className="history-list">
            {results.length === 0 ? <p style={{padding:16,color:"#9ca3af",textAlign:"center"}}>まだ学習記録がありません</p> :
              [...results].reverse().slice(0,30).map((r,i) => {
                const subj = SUBJECTS[r.subject];
                const qs = ALL_QUESTIONS[r.subject] || [];
                const q = qs.find(q => q.id === r.questionId);
                return (
                  <div key={i} className="history-item">
                    <span>{r.correct ? "⭕" : "❌"}</span>
                    <span style={{fontSize:10,marginRight:-4}}>{subj ? subj.icon : ""}</span>
                    <span className="history-q">{q ? (q.question.length>30 ? q.question.substring(0,30)+"..." : q.question) : "不明"}</span>
                    <span className="history-date">{formatDate(r.date)}</span>
                  </div>
                );
              })
            }
          </div>
        </div>
      );
    }

    // ============ 復習 ============
    function ReviewPage({reviewItems, isSubscribed, onSubscribe, onStartReview}) {
      if (!isSubscribed) return (
        <div className="lock-card">
          <div className="lock-icon">🔒</div>
          <h2 className="lock-title">復習タイミング通知</h2>
          <p className="lock-text">「最高の勉強法」に基づく最適な復習タイミング通知にはPremiumプランへの登録が必要です。</p>
          <div className="review-schedule">
            <h4 className="review-schedule-title">復習スケジュール</h4>
            <div className="timeline">
              {REVIEW_INTERVALS.map((d,i) => <div key={i} className="timeline-item"><div className="timeline-dot"/><span className="timeline-text">{d}日後</span></div>)}
            </div>
          </div>
          <button className="btn-premium" onClick={onSubscribe}>Premiumプランを見る</button>
        </div>
      );

      return (
        <div>
          <h2 className="section-title">🔔 復習リマインダー</h2>
          <div className="info-card" style={{marginBottom:16}}>
            <p className="info-text">学習した日から1日後・7日後・16日後・28日後のタイミングで復習すると効果的です。</p>
          </div>
          {reviewItems.length === 0 ? (
            <div className="empty-state">
              <div className="empty-emoji">✨</div>
              <p className="empty-title">現在、復習が必要な問題はありません</p>
              <p className="empty-text">問題を解くと復習スケジュールが自動設定されます</p>
            </div>
          ) : (
            <div className="review-list">
              {reviewItems.map((item,i) => {
                const subj = SUBJECTS[item.subject];
                return (
                  <div key={i} className="review-item">
                    <div className="review-item-header">
                      <span className="cat-badge-sm">{subj ? subj.icon+" "+subj.name : item.category}</span>
                      <span className="review-timing">{item.days}日後復習</span>
                    </div>
                    <p className="review-q">{item.question}</p>
                    <p className="review-meta">学習日: {formatDate(item.studiedAt)}</p>
                  </div>
                );
              })}
              <button className="btn-premium" onClick={() => onStartReview(reviewItems[0].subject)}>復習を始める</button>
            </div>
          )}
        </div>
      );
    }

    // ============ サブスクリプション ============
    function SubscriptionPage({isSubscribed, onToggle}) {
      return (
        <div>
          <h2 className="section-title">⭐ プラン選択</h2>
          <div className="plan-container">
            <div className={"plan-card" + (!isSubscribed?" active":"")}>
              <h3 className="plan-name">Free</h3>
              <div className="plan-price"><span className="price-amount">¥0</span><span className="price-period">/月</span></div>
              <ul className="plan-features">
                <li className="plan-feature">✅ 一問一答（暗記カード）</li>
                <li className="plan-feature">✅ 全7科目の問題</li>
                <li className="plan-feature-off">❌ 成績カウント機能</li>
                <li className="plan-feature-off">❌ 復習タイミング通知</li>
              </ul>
              {isSubscribed && <button className="btn-secondary" onClick={onToggle}>Freeに戻す</button>}
            </div>
            <div className={"plan-card" + (isSubscribed?" active":"")}>
              <div className="plan-badge">おすすめ</div>
              <h3 className="plan-name">Premium</h3>
              <div className="plan-price"><span className="price-amount">¥980</span><span className="price-period">/月</span></div>
              <ul className="plan-features">
                <li className="plan-feature">✅ 一問一答（暗記カード）</li>
                <li className="plan-feature">✅ 全7科目の問題</li>
                <li className="plan-feature">✅ 成績カウント機能</li>
                <li className="plan-feature">✅ 復習タイミング通知</li>
              </ul>
              {!isSubscribed ? <button className="btn-premium" onClick={onToggle}>Premiumに登録（テスト）</button> : <div className="current-plan">現在のプラン</div>}
            </div>
          </div>
          <p className="test-note">※ これはテスト版です。実際の課金は発生しません。ボタンを押すとPremium機能が有効になります。</p>
        </div>
      );
    }

    // ============ レンダリング ============
    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
